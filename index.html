<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Relay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Josefin+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
  --text:#e8e6e1;--muted:#6b6860;--accent:#F3B53A;--accent-light:#1a1500;
  --danger:#e05555;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'Josefin Sans',system-ui,sans-serif;
  --radius:12px;--radius-sm:8px;
}
html,body{height:100%;margin:0;padding:0;background:#0f0f0f;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;overflow:hidden;background:var(--bg);}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:100px;}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);width:14px;height:14px;pointer-events:none;}
#search{width:100%;padding:9px 10px 9px 30px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--surface2);color:var(--text);font-family:var(--sans);}
#search:focus{outline:none;border-color:#F3B53A;}
.filter-row{display:flex;gap:5px;overflow-x:auto;width:100%;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-pill{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;cursor:pointer;font-family:var(--sans);color:var(--muted);white-space:nowrap;flex-shrink:0;}
.filter-pill.active{background:#000C1F;color:#F3B53A;border-color:#F3B53A;}
.top-bar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.count-badge{font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;color:var(--muted);white-space:nowrap;}
.add-btn{padding:8px 14px;background:#F3B53A;color:#000C1F;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.list-header{display:grid;grid-template-columns:44px 1fr 48px 48px;padding:0 14px;height:34px;align-items:center;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;}
.list-header-cell{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:500;padding:0 4px;}
.main-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:60px;}
.main-list::-webkit-scrollbar{width:3px;}
.main-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.contact-row{display:grid;grid-template-columns:44px 1fr 48px 48px;padding:0 14px;min-height:64px;align-items:center;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.contact-row:active{background:var(--surface);}
.row-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.row-cell{padding:6px 4px;min-width:0;}
.row-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.row-loc{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.status-pill{display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;letter-spacing:.04em;padding:3px 6px;border-radius:20px;text-transform:uppercase;}
.pill-pastor{background:#1a3a28;color:#4cd68a;}
.pill-voicemail{background:#1e2244;color:#8899ee;}
.pill-secretary{background:#2a1f35;color:#c9a0f0;}
.pill-reminder{background:#2e1f00;color:#f0b429;}
.pill-none{background:var(--surface2);color:var(--muted);}
.pill-noanswer1{background:#2a2a2a;color:#e8e6e1;border:1.5px solid #666;font-size:9px;padding:3px 7px;border-radius:20px;font-weight:700;letter-spacing:.04em;}
.pill-noanswer2{background:transparent;color:#b0aea9;border:1.5px solid #6b6860;font-size:9px;padding:3px 7px;border-radius:20px;font-weight:700;letter-spacing:.04em;}
.row-pill-cell{display:flex;align-items:center;justify-content:center;}
.row-actions{display:flex;align-items:center;justify-content:flex-end;}
.log-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;cursor:pointer;border:1px solid #F3B53A44;background:none;color:#F3B53A;}
.log-btn svg{width:16px;height:16px;}
.log-btn:active{background:#1e2244;}
.reminder-dot{width:7px;height:7px;border-radius:50%;background:#f0b429;display:inline-block;margin-left:5px;vertical-align:middle;}
.empty-state{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:14px;}
.proximity-screen{position:absolute;inset:0;z-index:100;background:var(--bg);flex-direction:column;overflow:hidden;display:none;}
.proximity-screen.visible{display:flex;animation:slideInRight .22s cubic-bezier(0.25,0.46,0.45,0.94);}
.proximity-screen.slide-out{animation:slideOutRight .2s cubic-bezier(0.55,0,1,0.45);}
.prox-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.fullscreen-card{position:absolute;inset:0;z-index:100;background:var(--bg);flex-direction:column;overflow:hidden;display:none;}
.fullscreen-card.slide-in{animation:slideInRight .22s cubic-bezier(0.25,0.46,0.45,0.94);}
.fullscreen-card.slide-out{animation:slideOutRight .2s cubic-bezier(0.55,0,1,0.45);}
.fullscreen-card.visible{display:flex;}
.card-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.card-back-btn{background:none;border:1px solid var(--border);border-radius:50%;width:36px;height:36px;font-family:var(--sans);font-size:16px;font-weight:500;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.card-topbar-center{flex:1;text-align:center;}
.card-progress-label{font-size:11px;color:var(--muted);}
.card-progress-bar-wrap{width:80px;height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin:5px auto 0;}
.card-progress-bar-fill{height:100%;background:#F3B53A;border-radius:3px;transition:width .3s;}
.card-edit-btn{background:none;border:1px solid var(--border);border-radius:50%;width:36px;height:36px;font-family:var(--sans);font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.card-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.card-body::-webkit-scrollbar{width:3px;}
.card-body::-webkit-scrollbar-thumb{background:var(--border);}
.card-hero{padding:20px 20px 16px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);}
.card-hero-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;flex-shrink:0;}
.card-hero-name{font-family:var(--serif);font-size:26px;line-height:1.1;margin-bottom:3px;}
.card-hero-church{font-size:13px;color:var(--muted);margin-bottom:5px;}
.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;}
.card-action-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px 8px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:var(--sans);cursor:pointer;color:var(--text);min-height:72px;}
.card-action-btn:active{transform:scale(.97);}
.btn-icon{line-height:1;display:flex;align-items:center;justify-content:center;width:24px;height:24px;}
.btn-icon svg{width:22px;height:22px;}
.btn-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
.card-action-btn.green{border-color:#4a9e6b44;background:#1a2e2244;}
.card-action-btn.green:active{background:var(--accent-light);border-color:var(--accent);}
.card-action-btn.blue{border-color:#6b7fd444;background:#1e224422;}
.card-action-btn.blue:active{background:#1e2244;border-color:#8899ee;}
.card-action-btn.yellow{border-color:#f0b42944;background:#2e1f0022;}
.card-action-btn.yellow:active{background:#2e1f00;border-color:#f0b429;}
.card-action-btn.teal{border-color:#2a7a8a44;background:#0e222622;}
.card-action-btn.teal:active{background:#0e2226;border-color:#4ac4d4;}
.contact-submenu{display:none;flex-direction:column;gap:8px;padding:0 16px 16px;opacity:0;}
.contact-submenu.open{display:flex;animation:fadeInUp .2s ease forwards;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.contact-sub-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;color:var(--text);text-decoration:none;}
.contact-sub-btn:active{transform:scale(.98);}
.call-sub{border-color:#4a9e6b44;color:#4cd68a;}
.text-sub{border-color:#6b7fd444;color:#8899ee;}
.email-sub{border-color:#d4b06b44;color:#d4b06b;}
.card-history{padding:16px;}
.history-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px;font-weight:500;}
.call-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;position:relative;}
.call-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px;padding-right:28px;}
.outcome-badge{font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;}
.outcome-pastor{background:#1a3a28;color:#4cd68a;}
.outcome-voicemail{background:#1e2244;color:#8899ee;}
.outcome-secretary{background:#2a1f35;color:#c9a0f0;}
.outcome-noanswer1{background:#1e1e1e;color:#e8e6e1;border:1px solid #555;}
.outcome-noanswer2{background:#e8e6e1;color:#1e1e1e;}
.outcome-imported{background:var(--surface2);color:var(--muted);}
.outcome-reminder{background:#2e1f00;color:#f0b429;}
.outcome-note{background:var(--surface2);color:var(--muted);}
.call-date{font-size:10px;color:var(--muted);margin-left:auto;}
.call-details-text{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;margin-top:5px;}
.call-del{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:4px 6px;border-radius:4px;line-height:1;}
.call-del:hover{color:var(--danger);}
.no-calls{font-size:13px;color:var(--muted);font-style:italic;}
.card-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom));}
.nav-btn{display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);font-family:var(--sans);font-size:18px;font-weight:600;cursor:pointer;color:var(--text);}
.nav-btn:active:not(:disabled){background:var(--surface);}
.nav-btn:disabled{opacity:.25;cursor:default;}
.nav-btn.next{background:#F3B53A;border-color:#F3B53A;color:#000C1F;}
.nav-btn.next:active:not(:disabled){opacity:.85;}
.nav-center{font-size:11px;color:var(--muted);text-align:center;flex:1;padding:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0;animation:fadeInBg .2s ease;}
.modal-box{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;border:1px solid var(--border);animation:slideUp .28s cubic-bezier(0.34,1.4,0.64,1);padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));box-sizing:border-box;overflow-x:hidden;}
.modal-box h2{font-family:var(--serif);font-size:22px;margin-bottom:5px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:18px;}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.fg label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:500;}
.fg input,.fg textarea,.fg select{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:16px;background:var(--bg);color:var(--text);width:100%;}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--accent);}
.fg textarea{resize:vertical;height:80px;}
.outcome-opts{display:flex;flex-direction:column;gap:8px;}
.outcome-opt{border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);background:var(--surface2);font-family:var(--sans);text-align:left;display:flex;align-items:center;gap:12px;}
.outcome-opt:active{transform:scale(.99);}
.outcome-opt.selected{border-color:#F3B53A;background:#1a1500;color:#F3B53A;}
.opt-icon{font-size:20px;}
.meeting-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:14px;}
.meeting-row label{font-size:14px;flex:1;}
.toggle-wrap{display:flex;gap:6px;}
.toggle-btn{padding:7px 16px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-family:var(--sans);cursor:pointer;background:none;color:var(--muted);}
.toggle-btn.on{background:#F3B53A;border-color:#F3B53A;color:#000C1F;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:10px;}
.btn-cancel{padding:12px 20px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;cursor:pointer;color:var(--text);flex:1;}
.btn-save{padding:12px 20px;background:#F3B53A;color:#000C1F;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;flex:2;}
.cal-open-btn{width:100%;padding:14px;background:#1a73e8;color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.fgi{display:flex;flex-direction:column;gap:5px;}
.fgi.full{grid-column:1/-1;}
.fgi label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:500;}
.fgi input,.fgi select{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:16px;background:var(--bg);color:var(--text);width:100%;min-width:0;}
.fgi input:focus,.fgi select:focus{outline:none;border-color:var(--accent);}
.fgi select option{background:var(--surface);}
.bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding-bottom:max(16px,env(safe-area-inset-bottom));position:fixed;bottom:0;left:0;right:0;z-index:60;}
.bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;background:none;border:none;cursor:pointer;font-family:var(--sans);color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;transition:color .15s;}
.bottom-nav-btn.active{color:#F3B53A;}
.bottom-nav-btn svg{width:20px;height:20px;}
.tides-screen{position:absolute;top:0;left:0;right:0;bottom:0;z-index:50;background:var(--bg);flex-direction:column;overflow:hidden;display:none;}
.wing-fade{position:fixed;inset:0;background:#000;z-index:55;opacity:0;pointer-events:none;transition:opacity .15s ease;}
.wing-fade.show{opacity:1;pointer-events:all;}
.tides-screen.visible{display:flex;}
.tides-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:60px;}
.tides-list::-webkit-scrollbar{width:3px;}
.tides-list::-webkit-scrollbar-thumb{background:var(--border);}
.tide-entry{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s;}
.tide-entry:active{background:var(--surface);}
.tide-entry.overdue{border-left:3px solid #e05555;}
.tide-entry.upcoming{border-left:3px solid #f0b429;}
.tide-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}

/* ── TIDES — warm bronze ──────────────────────────────── */
#app[data-wing="tides"] {
  --bg: #251D0A;
  --surface: #2E2208;
  --surface2: #23190A;
  --border: #563E0C;
  --accent: #C8860A;
  --accent-light: #1a1000;
  --muted: #9A7A45;
}
#app[data-wing="tides"] .bottom-nav { background: #211708; border-top-color: #563E0C; }
#app[data-wing="tides"] .bottom-nav-btn.active { color: #C8860A; }
#app[data-wing="tides"] #tides-screen .card-topbar { background: #211708; border-bottom: none; }
#app[data-wing="tides"] .tide-entry { background: var(--surface); }
#app[data-wing="tides"] .tides-list { background: var(--bg); }

/* ── MANIFEST WING ── */
#app[data-wing="manifest"] {
  --bg: #01162B;
  --surface: #001122;
  --surface2: #01162B;
  --border: rgba(22,35,54,0.35);
  --accent: #D99B2D;
  --accent-light: #0a0800;
  --muted: #7AAFD4;
}
#app[data-wing="manifest"] .bottom-nav { background: #001122; border-top-color: rgba(22,35,54,0.35); }
#app[data-wing="manifest"] .bottom-nav-btn.active { color: #D99B2D; }
/* Topbar */
#app[data-wing="manifest"] .card-topbar { background: #001122; border-bottom: 1px solid rgba(22,35,54,0.35); }
/* Search row */
#app[data-wing="manifest"] #manifest-screen > div:nth-child(2) { background: #001122; border-bottom: none; }
/* List background */
#app[data-wing="manifest"] .tides-list { background: #01162B; }
/* Contact rows — inset divider at 50% */
#app[data-wing="manifest"] .manifest-list-row { border-bottom: none; position: relative; }
#app[data-wing="manifest"] .manifest-list-row .tide-entry { border-bottom: none; }
#app[data-wing="manifest"] .manifest-list-row::after { content:''; position:absolute; bottom:0; left:14px; right:14px; height:1px; background:rgba(22,35,54,0.35); }
#app[data-wing="manifest"] .manifest-list-row:active { background: rgba(217,155,45,0.06); }
/* Placeholder muted color */
#app[data-wing="manifest"] #manifest-search::placeholder { color: #7AAFD4; }
/* Filter pill text color */
#app[data-wing="manifest"] #manifest-filter { color: #E8E6E1; -webkit-text-fill-color: #E8E6E1; background: #001122; }
/* ── MANIFEST CARD COLORS ── */
#app[data-wing="manifest"] #manifest-card-screen { background: #01162B; }
#app[data-wing="manifest"] #manifest-card-content { background: #01162B; }
#app[data-wing="manifest"] #manifest-card-screen .card-topbar { background: #011B38 !important; border-bottom: none; padding: 8px 16px; }
#app[data-wing="manifest"] .mc-upper-card { background: #093A65 !important; border-color: #426788 !important; }
#app[data-wing="manifest"] .mc-action-btn { background: #01274A !important; border-color: #426788 !important; color: var(--muted) !important; }
#app[data-wing="manifest"] .mc-lower-card { background: #093A65 !important; border-color: #426788 !important; }
#app[data-wing="manifest"] .mc-info-bar { background: #01274A !important; border-color: #426788 !important; }
#app[data-wing="manifest"] .mc-supporting-pill { background: #001830 !important; border-color: #4cd68a44 !important; }

body.wing-tides .bottom-nav { background:#211708; border-top-color:rgba(86,62,12,0.35); }
body.wing-tides #nav-tides { color:#C8860A; }
.tide-content{flex:1;min-width:0;}
.tide-pastor{font-size:13px;font-weight:600;color:#E8E6E1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tide-church{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tide-details{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tide-due{font-size:11px;font-weight:600;}
.tide-due.overdue{color:#e05555;}
.tide-due.upcoming{color:#f0b429;}
.tide-due.today{color:#4cd68a;}
.tide-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.tide-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.tide-btn:active{background:var(--surface2);}
.tide-btn.complete{border-color:#f0b42944;color:#f0b429;}
.tide-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--muted);}
.tide-entry-wrap{position:relative;overflow:hidden;}
.tide-swipe-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:#2a6b3a;display:flex;align-items:center;justify-content:center;color:#4cd68a;font-size:11px;font-weight:600;gap:4px;transform:translateX(100%);transition:transform .2s;}
.snooze-modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));border:1px solid var(--border);}
@media(min-width:600px){
  .top-bar{flex-wrap:nowrap;padding:8px 20px;}
  .list-header{grid-template-columns:44px 1.5fr 1fr 60px 48px;}
  .contact-row{grid-template-columns:44px 1.5fr 1fr 60px 48px;min-height:52px;}
  .card-hero-name{font-size:30px;}
  .card-actions{grid-template-columns:repeat(4,1fr);}
  .contact-submenu.open{flex-direction:row;}
  .modal-backdrop{align-items:center;padding:20px;}
  .modal-box{border-radius:16px;max-height:85vh;}
  .outcome-opts{display:grid;grid-template-columns:1fr 1fr 1fr;}
}
@keyframes fadeInBg{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOutBg{from{opacity:1}to{opacity:0}}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOutRight{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
.manifest-list-row{transition:background .12s;}
.manifest-list-row:active{background:rgba(243,181,58,.06);}
#manifest-card-screen.visible{animation:slideInRight .22s cubic-bezier(0.25,0.46,0.45,0.94);}
#manifest-card-screen.slide-out{animation:slideOutRight .2s cubic-bezier(0.55,0,1,0.45);}
@keyframes expandDown{0%{opacity:0;transform:translateY(-4px)}100%{opacity:1;transform:translateY(0)}}
@keyframes collapseUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-4px)}}
@keyframes slideDownOut{from{transform:translateY(0);opacity:1}to{transform:translateY(30px);opacity:0}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.contact-row{transition:background .12s;}
.contact-row:active{background:rgba(243,181,58,.06);}
.tide-entry:active{background:rgba(255,255,255,.03);}

/* Anchor divider */

// ── KEY FIX: parse remDate safely as local date, no UTC shift ──
function fmtRemDate(remDate,remTime){
  const parts2=parseRemDate(remDate);
  if(!parts2)return '';
  const [y,m,d]=parts2;
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let str=`${months[m-1]} ${d}`;
  if(remTime){
    const [hh,mm]=remTime.split(':').map(Number);
    const ampm=hh>=12?'PM':'AM';
    const h12=hh%12||12;
    str+=` at ${h12}:${String(mm).padStart(2,'0')} ${ampm}`;
  }
  return str;
}

function haversine(lat1,lon1,lat2,lon2){const R=3958.8;const dLat=(lat2-lat1)*Math.PI/180;const dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function api(params){return new Promise((resolve,reject)=>{const cbName='relay_cb_'+Date.now();const url=SCRIPT_URL+'?'+new URLSearchParams({...params,secret:SECRET,callback:cbName});const script=document.createElement('script');window[cbName]=function(data){delete window[cbName];if(document.body.contains(script))document.body.removeChild(script);resolve(data);};script.src=url;document.body.appendChild(script);setTimeout(()=>{if(window[cbName]){delete window[cbName];if(document.body.contains(script))document.body.removeChild(script);reject(new Error('Timeout'));}},30000);});}
let sheetsReady=false,callsCache={};
async function load(){
  try{
    showLoadingOverlay('Hoisting Sails…');
    const rawContacts=await api({action:'getContacts'});
    let rawCalls=[];try{rawCalls=await api({action:'getCalls'});}catch(e){rawCalls=[];}
    callsCache={};
    rawCalls.forEach(call=>{if(!callsCache[call.contactId])callsCache[call.contactId]=[];callsCache[call.contactId].push({id:String(call.id),date:call.date,outcome:call.outcome,meetingBooked:call.meetingBooked===true||call.meetingBooked==='true',meetingDate:call.meetingDate||'',details:call.details||'',remDate:(call.remDate||'').toString().includes('T')?(call.remDate||'').toString().split('T')[0]:(call.remDate||''),remTime:call.remTime||'',remType:call.remType||'',completed:call.completed===true||call.completed==='true'});});
    contacts=rawContacts.map(c=>({id:String(c.id??''),pastor:String(c.pastor??''),church:String(c.church??''),city:String(c.city??''),state:String(c.state??''),region:String(c.region??''),phone:String(c.phone??''),email:String(c.email??''),address:String(c.address??''),starred:c.starred===true||c.starred==='true'||c.starred==='TRUE',lat:String(c.lat??''),lng:String(c.lng??''),photo:'',notes:[],calls:callsCache[String(c.id??'')]||[]}));
    sheetsReady=true;hideLoadingOverlay();showStatus('Sheets connected','ok');
  }catch(err){hideLoadingOverlay();console.error('Sheets load error:',err);contacts=JSON.parse(localStorage.getItem('relay_v7')||'null')||SAMPLE.map(c=>({...c}));showStatus('Local backup','err');}
}
async function save(){localStorage.setItem('relay_v7',JSON.stringify(contacts));}
async function saveContact(c){save();if(!sheetsReady)return;try{await api({action:'saveContact',data:JSON.stringify({id:c.id,pastor:c.pastor,church:c.church,city:c.city,state:c.state,region:c.region,phone:c.phone,email:c.email,address:c.address,starred:c.starred?'true':'false',lat:c.lat||'',lng:c.lng||''})});}catch(err){console.error('saveContact error:',err);}}
async function saveCallEntry(contactId,call){save();if(!sheetsReady)return;try{await api({action:'saveCall',data:JSON.stringify({id:call.id,contactId:contactId,date:call.date,outcome:call.outcome,meetingBooked:call.meetingBooked?'true':'false',meetingDate:call.meetingDate||'',details:call.details||'',remDate:(call.remDate||'').toString().includes('T')?(call.remDate||'').toString().split('T')[0]:(call.remDate||''),remTime:call.remTime||'',remType:call.remType||'',completed:call.completed?'true':'false'})});}catch(err){console.error('saveCall error:',err);}}
async function deleteCallEntry(callId){save();if(!sheetsReady)return;try{await api({action:'deleteCall',id:callId});}catch(err){console.error('deleteCall error:',err);}}
async function deleteContactEntry(contactId){save();if(!sheetsReady)return;try{await api({action:'deleteContact',id:contactId});}catch(err){console.error('deleteContact error:',err);}}
function showStatus(msg,type){let el=document.getElementById('save-status');if(!el){el=document.createElement('div');el.id='save-status';document.body.appendChild(el);}const colors={ok:'background:#1a3a28;color:#4cd68a;border:1px solid #4a9e6b44',err:'background:#3a0a0a;color:#e05555;border:1px solid #5a1a1a44',info:'background:#1a1a2e;color:#F3B53A;border:1px solid #F3B53A44'};el.style.cssText=(colors[type]||colors.info)+';position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:11px;padding:5px 14px;border-radius:20px;z-index:300;pointer-events:none;font-family:var(--sans);transition:opacity .3s;';el.textContent=msg;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',2500);}

function hideLoadingOverlay(){const el=document.getElementById('loading-overlay');if(el)el.style.display='none';}
function lc(c){const r=(c.calls||[]).filter(x=>x.outcome!=='imported');return r.length?r[r.length-1]:null;}
function lastContactedStr(c){const r=(c.calls||[]).filter(x=>x.outcome!=='imported'&&x.outcome!=='reminder');if(!r.length)return null;const last=r[r.length-1];return `${last.date} \u00b7 ${OM[last.outcome]?.label||last.outcome}`;}
function toggleInfo(){
  haptic(8);
  infoExpanded=!infoExpanded;
  const body=document.getElementById('more-info-body');
  const chevron=document.getElementById('more-info-chevron');
  if(!body) return;
  if(infoExpanded){
    body.style.display='grid';
    body.style.animation='expandDown .3s cubic-bezier(0.4,0,0.2,1)';
  } else {
    body.style.animation='collapseUp .2s cubic-bezier(0.4,0,0.2,1)';
    setTimeout(()=>{ if(!infoExpanded) body.style.display='none'; },180);
  }
  if(chevron) chevron.innerHTML=infoExpanded?ICONS.chevronUp:ICONS.chevronDown;
}
function toggleStar(cid){haptic(8);const c=contacts.find(x=>x.id===cid);if(!c)return;c.starred=!c.starred;save();saveContact(c);renderList();refreshCallingCard();}
function toggleManifestStar(mid){haptic(8);const m=manifestContacts.find(x=>x.id===mid);if(!m)return;m.starred=!m.starred;saveManifestContact(m);openManifestCard(mid);}

function getReminders(){
  const now=new Date();const result=[];
  contacts.forEach(c=>{
    const rems=(c.calls||[]).filter(x=>x.outcome==='reminder');if(!rems.length)return;
    const sorted=rems.slice().sort((a,b)=>{
      const da=a.remDate?new Date(a.remDate+'T'+(a.remTime||'12:00')+':00'):new Date(0);
      const db=b.remDate?new Date(b.remDate+'T'+(b.remTime||'12:00')+':00'):new Date(0);
      return da-db;
    });
    const soonest=sorted[0];
    const due=soonest.remDate?new Date(soonest.remDate+'T'+(soonest.remTime||'12:00')+':00'):null;
    result.push({contact:c,reminder:soonest,due,overdue:due&&due<now});
  });
  result.sort((a,b)=>{if(a.overdue&&!b.overdue)return -1;if(!a.overdue&&b.overdue)return 1;if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;return a.due-b.due;});
  return result;
}
let showingReminders=false;
function toggleRemindersView(){showingReminders=!showingReminders;renderFilters();renderList();}

function setSF(s){fState=(fState===s&&s!=='All')?'All':s;proxResults=null;proxLabel='';showingReminders=false;renderFilters();renderList();}
function togglePhoneFilter(){filterHasPhone=!filterHasPhone;renderFilters();renderList();}
function clearProximity(){proxResults=null;proxLabel='';renderFilters();renderList();}

function fuzzyMatch(str, q) {
  if (!q) return true;
  str = (str||'').toLowerCase();
  q = q.toLowerCase();
  if (str.includes(q)) return true;
  // Check if all chars of q appear in order in str
  let si = 0;
  for (let i = 0; i < q.length; i++) {
    si = str.indexOf(q[i], si);
    if (si === -1) return false;
    si++;
  }
  return true;
}

function contactMatchesQuery(c, q) {
  if (!q) return true;
  return fuzzyMatch(c.pastor, q) || fuzzyMatch(c.church, q) || 
         fuzzyMatch(c.city, q) || fuzzyMatch(c.phone, q) || fuzzyMatch(c.state, q);
}

function buildFilteredList(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  if(proxResults){let f=proxResults.map(r=>contacts.find(c=>c.id===r.id)).filter(Boolean);if(q)f=f.filter(c=>contactMatchesQuery(c,q));if(filterHasPhone)f=f.filter(c=>splitField(c.phone).length>0);return f;}
  if(showingReminders){let f=getReminders().map(r=>r.contact);if(q)f=f.filter(c=>contactMatchesQuery(c,q));if(filterHasPhone)f=f.filter(c=>splitField(c.phone).length>0);return f;}
  let f=contacts.filter(c=>{const ms=fState==='All'||(fState==='Starred'?c.starred:(c.state||'').toUpperCase()===fState);const mq=!q||contactMatchesQuery(c,q);const mp=!filterHasPhone||splitField(c.phone).length>0;return ms&&mq&&mp;});
  f.sort((a,b)=>(a.pastor||a.church||'').localeCompare(b.pastor||b.church||''));return f;
}

function openCallingCard(idx){filteredList=buildFilteredList();callingIdx=idx;contactMenuOpen=false;infoExpanded=false;renderCallingCard();}
function refreshCallingCard(){
  const card=document.getElementById('fullscreen-card');
  if(!card||!card.classList.contains('visible'))return;
  // Save scroll position
  const body=card.querySelector('.card-body');
  const scrollTop=body?body.scrollTop:0;
  // Re-render without animation
  renderCallingCard(true);
  // Restore scroll
  requestAnimationFrame(()=>{
    const newBody=card.querySelector('.card-body');
    if(newBody)newBody.scrollTop=scrollTop;
  });
}
function renderCallingCard(noAnimation){
  const c=filteredList[callingIdx];if(!c){closeCard();return;}
  const rc=getRegionColor(c);const total=filteredList.length;const pct=Math.round(((callingIdx+1)/total)*100);
  const calls=(c.calls||[]).slice().reverse();const realCalls=calls.filter(x=>x.outcome!=='imported');
  const card=document.getElementById('fullscreen-card');card.classList.remove('slide-out');card.classList.add('visible');if(!noAnimation){requestAnimationFrame(()=>{ card.classList.add('slide-in'); setTimeout(()=>card.classList.remove('slide-in'),250); });}
  card.innerHTML=`<div class="card-topbar"><button class="card-back-btn" onclick="closeCard()">\u2190</button><div class="card-topbar-center"><div class="card-progress-label">${callingIdx+1} of ${total}</div><div class="card-progress-bar-wrap"><div class="card-progress-bar-fill" style="width:${pct}%"></div></div></div><button class="card-edit-btn" onclick="openContactModal('${c.id}')" style="padding:6px 10px;display:flex;align-items:center;">${ICONS.pencil}</button></div>
    <div class="card-body">
      <div class="card-hero" style="background:var(--bg)">
        <div class="card-hero-avatar" style="background:#000A16;color:${rc.text};border:2px solid #D99B2D">${ini(c.pastor||c.church||'?')}</div>
        <div style="flex:1;min-width:0"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
          <div style="min-width:0;flex:1">
            <div class="card-hero-name" style="display:flex;align-items:center;gap:8px">${esc(c.pastor||'Unknown Pastor')}<button onclick="toggleStar('${c.id}')" style="background:none;border:none;cursor:pointer;padding:0;line-height:1;flex-shrink:0;display:flex;align-items:center;">${starIcon(c.starred)}</button></div>
            <div class="card-hero-church" style="color:#D99B2D">${esc(c.church||'\u2014')}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:15px;line-height:1.1;display:flex;align-items:center;gap:5px;"><span style="color:#D99B2D;display:flex;align-items:center;">${ICONS.pin}</span><span style="font-family:var(--serif);font-weight:600;color:#D99B2D">${esc(c.city||'\u2014')}</span></div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(c.state||'')}</div>
            ${(c.lat&&c.lng&&c.lat!=='Unkown')?`<div style="font-size:9px;color:var(--muted);margin-top:3px;opacity:.7">${parseFloat(c.lat).toFixed(4)}, ${parseFloat(c.lng).toFixed(4)}</div>`:''}
          </div>
        </div></div>
      </div>
      <div class="card-actions">

function toggleContactMenu(){
  contactMenuOpen=!contactMenuOpen;
  const sub=document.querySelector('.contact-submenu');
  if(sub){
    if(contactMenuOpen){
      sub.classList.add('open');
      document.querySelector('.card-action-btn.contact-btn')?.classList.add('active');
    } else {
      sub.classList.remove('open');
      document.querySelector('.card-action-btn.contact-btn')?.classList.remove('active');
    }
  } else {
    renderCallingCard();
  }
}
function closeCard(){
  const card=document.getElementById('fullscreen-card');
  card.classList.add('slide-out');
  setTimeout(()=>{
    card.classList.remove('visible','slide-out');
    card.innerHTML='';
    contactMenuOpen=false;
    renderList();

}

Secretary</span></button><button class="outcome-opt" id="op-note" onclick="selOut('note')"><span class="opt-icon" style="display:flex;align-items:center;color:var(--muted);">${ICONS.noteSm}</span><span>Add Note</span></button></div></div><div id="mtg-sec" style="display:none"><div class="meeting-row"><label>Meeting booked?</label><div class="toggle-wrap"><button class="toggle-btn off" id="mtg-yes" onclick="setMtg(true)">Yes</button><button class="toggle-btn on" id="mtg-no" onclick="setMtg(false)">No</button></div></div><div id="mtg-date" style="display:none"><div class="fg"><label>Meeting date</label><input type="date" id="mtg-d"/></div></div></div><div class="fg"><label>Details <span style="color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label><textarea id="call-det" placeholder="Who you spoke with, what was discussed\u2026"></textarea></div><div class="modal-actions"><button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button><button class="btn-save" onclick="saveLog('${cid}')">Save call</button></div></div></div>`);}
function selOut(o){logOut=o;['pastor','noanswer1','noanswer2','voicemail','secretary','note'].forEach(k=>{const el=document.getElementById('op-'+k);if(el)el.classList.toggle('selected',k===o);});const ms=document.getElementById('mtg-sec');if(ms)ms.style.display=(o==='pastor'||o==='secretary')?'block':'none';if(o!=='pastor'&&o!=='secretary')logMtg=false;}

function saveLog(cid){haptic(10);if(!logOut){alert('Please select an outcome.');return;}const c=contacts.find(x=>x.id===cid);if(!c)return;if(!c.calls)c.calls=[];const md=(document.getElementById('mtg-d')||{}).value||'';const newCall={id:uid(),date:fmtDate(new Date()),outcome:logOut,meetingBooked:logMtg,meetingDate:md.trim(),details:(document.getElementById('call-det').value||'').trim()};c.calls.push(newCall);save();saveCallEntry(cid,newCall);closeMKeepCard();setTimeout(()=>refreshCallingCard(),180);renderList();}

-bottom:0"><label>Time</label><input type="time" id="rem-time"/></div></div><div class="fg"><label>Details <span style="color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label><textarea id="rem-note" placeholder="What do you need to do?" style="height:70px">${esc(autoNote)}</textarea></div><div class="modal-actions"><button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button><button class="btn-save" onclick="saveReminder('${cid}')">Save reminder</button></div></div></div>`);
  setTimeout(()=>{window._remType='call';},50);

function saveReminder(cid){haptic(10);

// ── SWIPE TO COMPLETE ──
function initTidesSwipe() {
  document.querySelectorAll('.tide-entry[data-cid]').forEach(el => {
    let startX = 0, startY = 0, dx = 0, swiping = false;
    const cid = el.dataset.cid;
    const xid = el.dataset.xid;
    const bg = document.getElementById('swipebg-' + xid);

    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      dx = 0; swiping = false;
    }, {passive:true});

    el.addEventListener('touchmove', e => {
      dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (!swiping && Math.abs(dy) > Math.abs(dx)) return;
      swiping = true;
      if (dx < 0) {
        el.style.transform = `translateX(${dx}px)`;
        if (bg) bg.style.transform = `translateX(${Math.max(dx + 80, 0)}px)`;
        e.preventDefault();
      }
    }, {passive:false});

    el.addEventListener('touchend', () => {
      if (dx < -60) {
        el.style.transform = 'translateX(-100%)';
        el.style.transition = 'transform .25s';
        setTimeout(() => completeTideReminder(cid, xid), 250);
      } else {
        el.style.transform = '';
        if (bg) bg.style.transform = '';
      }
      swiping = false;
    });
  });
}

// ── TIDES BADGE ──
function updateTidesBadge() {
  const now = new Date();
  const todayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  let count = 0;
  contacts.forEach(c => {
    (c.calls || []).forEach(call => {
      if (call.outcome !== 'reminder' || call.completed) return;
      const parts = parseRemDate(call.remDate);
      if (!parts) return;
      const due = new Date(parts[0], parts[1]-1, parts[2], 23, 59, 59);
      if (due < todayEnd) count++;
    });
  });
  const badge = document.getElementById('tides-badge');
  if (!badge) return;
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

let currentWing = 'helm';

function switchWing(wing) {
  if (currentWing === wing) return;
  closeTideDetail();
  const fade = document.getElementById('wing-fade');
  fade.classList.add('show');

  setTimeout(() => {
    currentWing = wing;
    document.body.classList.remove('wing-voyage','wing-manifest','wing-tides');
    document.body.classList.add('wing-' + wing);
    document.getElementById('app').dataset.wing = wing;
    const tidesScreen = document.getElementById('tides-screen');
    const manifestScreen = document.getElementById('manifest-screen');
    const voyageEls = ['state-filter-row','list-header','main-list','proximity-screen'];

    document.querySelectorAll('.bottom-nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-' + wing)?.classList.add('active');

    // Always close any open calling card cleanly without animation
    const card = document.getElementById('fullscreen-card');
    if (card) { card.classList.remove('visible','slide-out','slide-in'); card.innerHTML=''; contactMenuOpen=false; }

    // Always close manifest card screen too
    const manifestCardScreen = document.getElementById('manifest-card-screen');
    if (manifestCardScreen) { manifestCardScreen.classList.remove('visible','slide-out'); }
    window._currentManifestId = null;

    // Hide all
    document.getElementById('helm-screen').classList.remove('visible');
    tidesScreen.classList.remove('visible');
    manifestScreen.classList.remove('visible');
    voyageEls.forEach(id => { const el = document.getElementById(id); if(el) el.style.display = 'none'; });

    if (wing === 'helm') {
      document.getElementById('helm-screen').classList.add('visible');
      renderHelm();
    } else if (wing === 'tides') {
      tidesScreen.classList.add('visible');
      renderTides();
    } else if (wing === 'manifest') {
      manifestScreen.classList.add('visible');
      renderManifest();
      // If no data yet, kick off a fresh load
      if (manifestContacts.length === 0) { loadManifest(); loadVisits(); }
    } else {
      voyageEls.forEach(id => { const el = document.getElementById(id); if(el) el.style.display = ''; });
      renderList();
    }

    setTimeout(() => { fade.classList.remove('show'); }, 20);
  }, 150);
}

// ── TIDES WING ──
function fmtCallDate(d) {
  if (!d) return '';
  const s = String(d).trim();
  if (s.includes('T')) {
    const parts = s.split('T')[0].split('-').map(Number);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parts[1]-1] + ' ' + parts[2] + ', ' + parts[0];
  }
  if (s.match(/^\d{4}-\d{2}-\d{2}$/)) {
    const parts = s.split('-').map(Number);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parts[1]-1] + ' ' + parts[2] + ', ' + parts[0];
  }
  return s;
}

function parseRemDate(remDate) {
  if (!remDate || !String(remDate).trim()) return null;
  const s = String(remDate).trim();
  // ISO timestamp: 2026-05-23T05:00:00.000Z
  if (s.includes('T')) return s.split('T')[0].split('-').map(Number); // [y,m,d]
  // YYYY-MM-DD
  if (s.match(/^\d{4}-\d{2}-\d{2}$/)) return s.split('-').map(Number);
  // M/D/YYYY or MM/DD/YYYY (from getDisplayValues)
  if (s.includes('/')) {
    const parts = s.split('/').map(Number);
    if (parts.length === 3) return [parts[2], parts[0], parts[1]]; // [y,m,d]
  }
  return null;
}

function fmtDueLabel(remDate, remTime) {
  const parts = parseRemDate(remDate);
  if (!parts) return { label: 'No date set', cls: 'upcoming' };
  const [y, m, d] = parts;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const due = new Date(y, m - 1, d);
  const diff = Math.round((due - today) / (1000 * 60 * 60 * 24));

  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let dateStr = `${months[m-1]} ${d}`;
  if (remTime) {
    const [hh, mm] = remTime.split(':').map(Number);
    const ampm = hh >= 12 ? 'PM' : 'AM';
    const h12 = hh % 12 || 12;
    dateStr += ` at ${h12}:${String(mm).padStart(2,'0')} ${ampm}`;
  }

  if (diff < 0) return { label: `Overdue · ${dateStr}`, cls: 'overdue' };
  if (diff === 0) return { label: `Today · ${dateStr}`, cls: 'today' };
  if (diff === 1) return { label: `Tomorrow · ${dateStr}`, cls: 'upcoming' };
  return { label: dateStr, cls: 'upcoming' };
}

function renderTides() {
  const list = document.getElementById('tides-list');
  if (!list) return;

  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const todayEnd = new Date(todayStart.getTime() + 86400000);

  // Gather all active (non-completed) reminders
  const allItems = [];
  contacts.forEach(c => {
    (c.calls || []).forEach(call => {
      if (call.outcome !== 'reminder') return;
      if (call.completed) return;
      const rdParts = parseRemDate(call.remDate); const due = rdParts ? new Date(rdParts[0], rdParts[1]-1, rdParts[2], 12, 0, 0) : null;
      allItems.push({ contact: c, call, due });
    });
  });

  // Gather completed reminders for history
  // Supports both old format (outcome=reminder,completed=true) and new (outcome=note,completed=true)
  const completedItems = [];
  contacts.forEach(c => {
    (c.calls || []).forEach(call => {
      if (!call.completed) return;
      if (call.outcome !== 'note' && call.outcome !== 'reminder') return;
      completedItems.push({ contact: c, call });
    });
  });
  completedItems.sort((a,b) => (b.call.date||'').localeCompare(a.call.date||''));

  if (!allItems.length) {
    let emptyHtml = `<div class="tide-empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12c1.5-3 3.5-4 6-4s4.5 1 6 4 3.5 4 6 4"/><path d="M2 18c1.5-3 3.5-4 6-4s4.5 1 6 4 3.5 4 6 4"/></svg><div style="font-size:14px">No active reminders</div><div style="font-size:12px;color:var(--muted)">All clear — smooth sailing</div></div>`;
    if (completedItems.length) emptyHtml += renderCompletedSection(completedItems);
    list.innerHTML = emptyHtml;
    return;
  }

  // Split into due today/overdue vs upcoming
  const dueToday = allItems.filter(i => !i.due || i.due < todayEnd);
  const upcoming = allItems.filter(i => i.due && i.due >= todayEnd);

  // Sort each group
  const sortMode = document.getElementById('tides-sort')?.value || 'date';
  const regionOrder = {'Northeast':1,'North':2,'Central East':3,'Central':4,'Central West':5,'East':6,'West':7,'South':8,'Southeast':9,'Southwest':10,'Northwest':11,'NonCon':12};
  const sortItems = (items) => items.sort((a, b) => {
    if (sortMode === 'region') {
      const ra = regionOrder[a.contact.region] || 99;
      const rb = regionOrder[b.contact.region] || 99;
      if (ra !== rb) return ra - rb;
    }
    if (!a.due && !b.due) return 0;
    if (!a.due) return 1;
    if (!b.due) return -1;
    return a.due - b.due;
  });
  sortItems(dueToday);
  sortItems(upcoming);

  function renderItem({ contact: c, call }) {
    const rc = getRegionColor(c);
    const { label, cls } = fmtDueLabel(call.remDate, call.remTime);
    const isOverdue = cls === 'overdue';
    const detailLine = call.details ? call.details.split('\n').slice(1).join(' ').trim() : '';
    const churchCity = [c.church, c.city && c.state ? c.city+', '+c.state : c.city].filter(Boolean).join(' · ');
    return `<div class="tide-entry-wrap" id="wrap-${call.id}" style="padding:0 12px 8px;"><div class="tide-swipe-bg" id="swipebg-${call.id}" style="border-radius:12px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Done</div><div class="tide-entry ${isOverdue ? 'overdue' : 'upcoming'}" onclick="openTideDetail('${c.id}','${call.id}')" data-cid="${c.id}" data-xid="${call.id}" style="border-radius:12px;border:1px solid #563E0C;border-left:${isOverdue?'3px solid #e05555':'3px solid #C8860A'};">
      <div class="tide-avatar" style="background:#23190A;color:#C8860A;border:1.5px solid #563E0C;">${ini(c.pastor || c.church || '?')}</div>
      <div class="tide-content" style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;">
          <div style="flex:1;min-width:0;">
            <div class="tide-pastor">${esc(c.pastor || '—')}</div>
            <div style="font-size:11px;color:#9A7A45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(churchCity)}</div>
            ${detailLine ? `<div style="font-size:11px;color:#9A7A45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;">${esc(detailLine)}</div>` : ''}
            <div class="tide-due ${cls}" style="margin-top:2px;">${label}</div>
          </div>
          <div onclick="event.stopPropagation()" style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
            <button class="tide-btn" onclick="openCallingCardFromTides('${c.id}')" title="Go to contact" style="border-color:#5b9fd444;color:#5b9fd4;width:26px;height:26px;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
            <button class="tide-btn complete" onclick="completeTideReminder('${c.id}','${call.id}')" title="Mark done" style="width:26px;height:26px;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div></div>`;
  }

  let html = '';

  if (dueToday.length) {
    html += `<div style="padding:10px 16px 6px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#C8860A;font-weight:500;">Due Today</span>
      <span style="background:#e05555;color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:1px 7px;">${dueToday.length}</span>
    </div>`;
    html += dueToday.map(renderItem).join('');
  }

  if (upcoming.length) {
    html += `<div style="padding:14px 16px 6px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#C8860A;font-weight:500;">Upcoming</span>
      <span style="background:#2e1f00;color:#C8860A;font-size:10px;font-weight:700;border-radius:20px;padding:1px 7px;">${upcoming.length}</span>
    </div>`;
    html += upcoming.map(renderItem).join('');
  }

function renderCompletedSection(items) {
  const shown = items.slice(0, 10);
  const rows = shown.map(({contact: c, call}) => {
    const rc = getRegionColor(c);
    const dateLabel = call.date ? fmtCallDate(call.date) : '';
    return `<div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">
      <div class="tide-avatar" style="width:28px;height:28px;font-size:10px;background:${rc.bg};color:${rc.text};border:1px solid ${rc.border};border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0.5;">${ini(c.pastor||c.church||'?')}</div>
      <div style="flex:1;min-width:0;opacity:0.5;">
        <div style="font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.pastor||'—')}</div>
        <div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.church||'')}${c.city?' · '+esc(c.city):''}${dateLabel?' · '+dateLabel:''}</div>
      </div>
      <button onclick="undoCompleteReminder('${c.id}','${call.id}')" style="background:#23190A;border:1px solid #563E0C;border-radius:12px;padding:4px 10px;font-family:var(--sans);font-size:11px;color:#9A7A45;cursor:pointer;flex-shrink:0;">Put back</button>
    </div>`;
  }).join('');
  return `<div style="padding:14px 16px 6px;display:flex;align-items:center;gap:8px;">
    <span style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#C8860A;font-weight:500;">Completed</span>
    <span style="background:#23190A;color:#9A7A45;font-size:10px;font-weight:600;border-radius:20px;padding:1px 7px;border:1px solid #563E0C;">${items.length}</span>
  </div>${rows}`;
}

function openCallingCardFromTides(cid) {
  // Set up contact state before switching wing
  filteredList = buildFilteredList();
  const idx = filteredList.findIndex(c => c.id === cid);
  if (idx >= 0) {
    callingIdx = idx;
  } else {
    fState = 'All';
    proxResults = null;
    showingReminders = false;
    filteredList = buildFilteredList();
    callingIdx = Math.max(0, filteredList.findIndex(c => c.id === cid));
  }
  contactMenuOpen = false; infoExpanded = false;
  switchWing('voyage');
  // Render card just after switchWing's inner timeout (150ms) completes
  setTimeout(() => { renderCallingCard(); }, 160);
}

function closeTideDetail(callback) {
  const l = document.getElementById('modal-layer');
  const overlay = l ? l.firstElementChild : null;
  if (overlay) {
    overlay.style.animation = 'slideOutRight .2s cubic-bezier(0.55,0,1,0.45) forwards';
    setTimeout(() => {
      l.innerHTML = '';
      l.style.pointerEvents = 'none';
      if (callback) callback();
    }, 190);
  } else {
    if (l) { l.innerHTML = ''; l.style.pointerEvents = 'none'; }
    if (callback) callback();
  }
}

function openTideDetail(cid, xid) {
  const c = contacts.find(x => x.id === cid); if (!c) return;
  const call = c.calls.find(x => x.id === xid); if (!call) return;

  const initials = ini(c.pastor||c.church||'?');
  const note = (call.details || '').split('\n').slice(1).join('\n').trim();

  const parts = parseRemDate(call.remDate);
  let dueDate = '';
  let dueDateMs = 0;
  if (parts) {
    const [y,m,d] = parts;
    dueDate = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    dueDateMs = new Date(dueDate).getTime();
  }
  const todayMs = new Date().setHours(0,0,0,0);
  const isOverdue = dueDateMs && dueDateMs < todayMs;
  const isToday = dueDateMs && dueDateMs === todayMs;
  const statusLabel = isOverdue ? 'Overdue' : isToday ? 'Due Today' : 'Upcoming';
  const statusColor = isOverdue ? '#e05555' : isToday ? '#F2B632' : '#4cd68a';
  const statusBg = isOverdue ? '#2a0808' : isToday ? '#2e1f00' : '#0a2a1a';
  const ringColor = isOverdue ? '#e05555' : '#F2B632';

  const typeLabel = call.remType === 'email' ? 'Email' : call.remType === 'other' ? 'Other' : 'Call';
  const phone = c.cell || c.phone || '';
  const email = c.email || '';
  const address = [c.address, c.city && c.state ? `${c.city}, ${c.state}` : c.city||c.state].filter(Boolean).join('\n');

  const actionBtn = (href, icon, label) => href
    ? `<a href="${href}" style="display:flex;align-items:center;gap:5px;padding:7px 12px;background:#251C00;border:1px solid #8A6A18;border-radius:20px;text-decoration:none;color:#F2B632;font-size:11px;font-weight:600;">${icon}${label}</a>`
    : '';

  const phoneIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.34a2 2 0 0 1 1.99-2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`;
  const textIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
  const emailIcon2 = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`;

  showM(`<div style="position:fixed;top:0;left:0;right:0;bottom:max(60px,calc(60px + env(safe-area-inset-bottom)));background:#291B04;z-index:55;display:flex;flex-direction:column;overflow:hidden;animation:slideInRight .22s cubic-bezier(0.25,0.46,0.45,0.94);">

    <!-- HEADER -->
    <div style="background:#382800;padding:12px 16px 14px;flex-shrink:0;border-bottom:1px solid rgba(138,106,24,0.25);">  
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <button onclick="closeTideDetail()" style="width:34px;height:34px;background:none;border:1px solid #8A6A1844;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#F2B632;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div style="width:34px;"></div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
        <div style="width:52px;height:52px;border-radius:50%;background:#362600;color:#F2B632;border:2.5px solid ${ringColor};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;">${initials}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:var(--serif);font-size:20px;font-weight:700;color:#E8E6E1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.pastor||'—')}</div>
          <div style="font-size:12px;color:#E8E6E1;opacity:.8;margin-top:1px;">${esc(c.church||'')}</div>
          ${c.city ? `<div style="font-size:11px;color:#E8E6E1;opacity:.6;margin-top:1px;">${esc(c.city)}${c.state?', '+esc(c.state):''}</div>` : ''}
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:${statusBg};border:1px solid ${statusColor}44;color:${statusColor};">${statusLabel}</span>
        <div style="display:flex;gap:6px;">
          ${actionBtn(phone?`tel:${phone}`:'', phoneIcon, 'Call')}
          ${actionBtn(phone?`sms:${phone}`:'', textIcon, 'Text')}
          ${actionBtn(email?`mailto:${email}`:'', emailIcon2, 'Email')}
        </div>
      </div>
    </div>

    <!-- BODY -->
    <div style="flex:1;overflow-y:hidden;padding:12px 16px;display:flex;flex-direction:column;gap:10px;">

      <!-- 2-COL: REMINDER DETAILS + CONTACT INFO -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;min-height:0;">
        <div style="background:#3A2700;border:1px solid #8A6A18;border-radius:12px;padding:14px;display:flex;flex-direction:column;">
          <div style="font-size:12px;font-weight:700;color:#F2B632;margin-bottom:10px;">Reminder Details</div>
          <div style="font-size:10px;color:#9A7A45;margin-bottom:2px;">Due</div>
          <div style="font-size:14px;font-weight:600;color:${statusColor};margin-bottom:12px;">${dueDate ? fmtCallDate(dueDate) : '—'}${call.remTime?`<div style="font-size:11px;color:#E8E6E1;margin-top:2px;">${call.remTime}</div>`:''}</div>
          <div style="margin-top:auto;">
            <button onclick="openTideEdit('${cid}','${xid}')" style="width:100%;padding:9px;background:#372701;border:1px solid #8A6A18;border-radius:8px;font-family:var(--sans);font-size:12px;font-weight:600;color:#F2B632;cursor:pointer;">Edit Reminder</button>
          </div>
        </div>
        <div style="background:#3A2700;border:1px solid #8A6A18;border-radius:12px;padding:14px;display:flex;flex-direction:column;">
          <div style="font-size:12px;font-weight:700;color:#F2B632;margin-bottom:10px;">Contact Info</div>
          <div style="font-size:12px;color:#E8E6E1;line-height:1.5;margin-bottom:12px;">${address ? esc(address).replace('\n','<br>') : '<span style="color:#4a3a10;">—</span>'}</div>

            <button onclick="closeTideDetail(()=>openCallingCardFromTides('${cid}'))" style="width:100%;padding:9px;background:#372701;border:1px solid #8A6A18;border-radius:8px;font-family:var(--sans);font-size:12px;font-weight:600;color:#F2B632;cursor:pointer;">Go to Contact</button>

        Mark as Complete
      </button>

      <!-- 2-COL: NOTES + DETAILS -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;min-height:0;">
        <div style="background:#3A2700;border:1px solid #8A6A18;border-radius:12px;padding:14px;overflow-y:auto;">
          <div style="font-size:12px;font-weight:700;color:#F2B632;margin-bottom:8px;">Notes</div>
          <div style="font-size:12px;color:#E8E6E1;line-height:1.5;white-space:pre-wrap;">${note ? esc(note) : '<span style="color:#4a3a10;">—</span>'}</div>

        <div style="background:#3A2700;border:1px solid #8A6A18;border-radius:12px;padding:14px;overflow-y:auto;">
          <div style="font-size:12px;font-weight:700;color:#F2B632;margin-bottom:8px;">Details</div>
          <div style="font-size:10px;color:#9A7A45;margin-bottom:2px;">Type</div>
          <div style="font-size:12px;color:#E8E6E1;margin-bottom:8px;">${typeLabel}</div>
          <div style="font-size:10px;color:#9A7A45;margin-bottom:2px;">Created</div>
          <div style="font-size:12px;color:#E8E6E1;">${call.date ? fmtCallDate(call.date) : '—'}</div>
        </div>
      </div>

    </div>
  </div>`);
}

function openTideEdit(cid, xid) {
  const c = contacts.find(x => x.id === cid); if (!c) return;
  const call = c.calls.find(x => x.id === xid); if (!call) return;

  const existingNote = (call.details || '').split('\n').slice(1).join('\n').trim();
  const existingType = call.remType || 'call';
  const existingDate = (()=>{
    const parts = parseRemDate(call.remDate);
    if (!parts) return '';
    const [y,m,d] = parts;
    return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  })();
  const existingTime = call.remTime || '';

  window._editRemCid = cid;
  window._editRemXid = xid;
  window._remType = existingType;

  function typeBtn(t, label, icon) {
    const active = existingType === t;

function saveTideDetail() {
  const cid = window._editRemCid;
  const xid = window._editRemXid;
  const c = contacts.find(x => x.id === cid); if (!c) return;
  const call = c.calls.find(x => x.id === xid); if (!call) return;

  const d = document.getElementById('td-date')?.value;
  const t = document.getElementById('td-time')?.value || '';
  const note = (document.getElementById('td-note')?.value || '').trim();
  const rtype = window._remType || 'call';

function snoozeBy(cid, xid, days) {
  const c = contacts.find(x => x.id === cid); if (!c) return;
  const call = c.calls.find(x => x.id === xid); if (!call) return;
  const base = call.remDate ? new Date(call.remDate + 'T12:00:00') : new Date();
  base.setDate(base.getDate() + days);
  call.remDate = base.toISOString().split('T')[0];
  const [y,m,d] = call.remDate.split('-').map(Number);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const typeLabel = call.remType === 'call' ? 'Call' : call.remType === 'email' ? 'Email' : 'Other';
  call.details = `${typeLabel} reminder · ${months[m-1]} ${d}`;
  save(); saveCallEntry(cid, call); closeMKeepCard(); renderTides();
}

function snoozeToDate(cid, xid) {

}

// ── SCROLL HAPTICS ──
function initScrollHaptics() {
  if (!navigator.vibrate) return;
  let lastTick = 0;

  function onScroll() {
    const now = Date.now();
    if (now - lastTick < 40) return;
    const rows = document.querySelectorAll('.contact-row, .tide-entry-wrap');
    const midY = window.innerHeight / 2;
    rows.forEach(row => {
      const rect = row.getBoundingClientRect();
      const rowMid = rect.top + rect.height / 2;
      if (Math.abs(rowMid - midY) < rect.height * 0.5) {
        navigator.vibrate(3);
        lastTick = now;
      }
    });
  }

  // Attach to every scrollable container and window
  ['main-list','tides-list','app','fullscreen-card'].forEach(id => {
    const el = document.getElementById(id);
    if (el && !el._hapticBound) {
      el._hapticBound = true;
      el.addEventListener('scroll', onScroll, {passive:true});
    }
  });
  if (!window._hapticWindowBound) {
    window._hapticWindowBound = true;
    window.addEventListener('scroll', onScroll, {passive:true});
  }
}

function reInitScrollHaptics() {
  if (!navigator.vibrate) return;
  setTimeout(initScrollHaptics, 150);
}

function initPullToRefresh() {
  const app = document.getElementById('app');
  const ptr = document.getElementById('ptr-area');
  if (!app || !ptr) return;
  let startY = 0, pulling = false, triggered = false;

  app.addEventListener('touchstart', e => {
    if (app.scrollTop === 0 && currentWing === 'voyage') {
      startY = e.touches[0].clientY;
      pulling = true; triggered = false;
    }
  }, {passive:true});

  app.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0 && dy < 160) {
      ptr.style.height = (dy * 0.3) + 'px';
    }
    if (dy > 140 && !triggered) {
      triggered = true;
      haptic(15);
    }
  }, {passive:true});

  app.addEventListener('touchend', async () => {
    if (!pulling) return;
    pulling = false;
    if (triggered) {
      ptr.style.height = '36px';
      await load();
      renderFilters(); renderList(); updateTidesBadge();
    }
    ptr.style.height = '0';
  });
}

      manifestContacts = (data || []).map(m => ({...m, support_status: m.support_status || 'Non-supporting'}));
      delete window[cbName];
      if (currentWing === 'manifest') renderManifest();
      resolve();
    };
    const s = document.createElement('script');
    s.src = SCRIPT_URL + '?action=getManifest&secret=' + SECRET + '&callback=' + cbName;
    document.head.appendChild(s);
  });
}

function loadVisits() {
  return new Promise((resolve) => {
    const cbName = 'relay_vcb_' + Date.now();
    const timer = setTimeout(() => {
      if (window[cbName]) {
        delete window[cbName];
        manifestVisits = SAMPLE_VISITS;
        if (currentWing === 'manifest') renderManifest();
        resolve();
      }
    }, 5000);
    window[cbName] = (data) => {
      clearTimeout(timer);
      manifestVisits = data || [];
      delete window[cbName];
      if (currentWing === 'manifest') renderManifest();
      resolve();
    };
    const s = document.createElement('script');
    s.src = SCRIPT_URL + '?action=getVisits&secret=' + SECRET + '&callback=' + cbName;
    document.head.appendChild(s);
  });
}

function saveManifestContact(m) {
  save();
  if (sheetsReady) api({action:'saveManifest', data: JSON.stringify(m)}).catch(()=>{});
}

function saveVisitEntry(v) {
  if (sheetsReady) api({action:'saveVisit', data: JSON.stringify(v)}).catch(()=>{});
}

// ── MANIFEST RENDER ──
function renderManifest() {
  const list = document.getElementById('manifest-list');
  if (!list) return;

  const filter = document.getElementById('manifest-filter')?.value || 'all';
  const mq = (document.getElementById('manifest-search')?.value || '').trim().toLowerCase();
  let items = [...manifestContacts];

  if (filter === 'Supporting') items = items.filter(m => m.support_status === 'Supporting');
  else if (filter === 'Non-supporting') items = items.filter(m => m.support_status === 'Non-supporting');
  else if (filter === 'Scheduled') {
    const todayF = new Date().toISOString().slice(0,10);
    items = items.filter(m => {
      const todayMs2 = Date.now();
      const nvMs = t => { if(!t)return 0; const c=t.split(' – ')[0].split(' - ')[0].trim(); const x=new Date(c).getTime(); return isNaN(x)?0:x; };
      const nv = manifestVisits.filter(v => v.manifestId === m.id && v.date).find(v => nvMs(v.endDate||v.date) >= todayMs2);
      return nv || (m.next_visit_date && nvMs(m.next_visit_end_date||m.next_visit_date) >= todayMs2);
    });
  }
  else if (filter === 'prayer') items = items.filter(m => m.prayer_list === 'Yes');
  else if (filter === 'lodging') items = items.filter(m => m.lodging === 'Yes');
  else if (filter === 'rv') items = items.filter(m => m.rv_hookup === 'Yes');
  else if (filter === 'handouts') items = items.filter(m => m.bible_handouts === 'Yes');
  if (manifestStarFilter) items = items.filter(m => m.starred === true || m.starred === 'true' || m.starred === 'TRUE');

  if (mq) items = items.filter(m =>
    (m.pastor||'').toLowerCase().includes(mq) ||
    (m.church||'').toLowerCase().includes(mq) ||
    (m.city||'').toLowerCase().includes(mq) ||
    (m.state||'').toLowerCase().includes(mq)
  );

  if (filter === 'sort-scheduled') {
    const todayMs = Date.now();
    const toMs = d => { if (!d) return Infinity; const clean = d.split(' – ')[0].split(' - ')[0].trim(); const t = new Date(clean).getTime(); return isNaN(t) ? Infinity : t; };
    const getNextMs = m => {
      const fromVisits = manifestVisits
        .filter(v => v.manifestId===m.id && v.date && toMs(v.date) >= todayMs)
        .map(v => toMs(v.date))
        .filter(t => t !== Infinity)
        .sort((a,b) => a-b)[0] || Infinity;
      const fromContact = toMs(m.next_visit_date) >= todayMs ? toMs(m.next_visit_date) : Infinity;
      return Math.min(fromVisits, fromContact);
    };
    items = items.filter(m => getNextMs(m) !== Infinity);
    items.sort((a,b) => getNextMs(a) - getNextMs(b));
  } else {
    items.sort((a,b) => (a.pastor||'').localeCompare(b.pastor||''));
  }

  if (!items.length) {
    // If manifestContacts is truly empty (not just filtered), show loading
    if (manifestContacts.length === 0) {
      list.innerHTML = '<div class="tide-empty"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg><div style="font-size:13px;color:var(--muted);margin-top:8px;">Loading...</div></div>';
    } else {
      list.innerHTML = '<div class="tide-empty"><div style="font-size:14px">No contacts</div></div>';
    }
    return;
  }

  list.innerHTML = items.map(m => {
    const initials = (m.pastor||m.church||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
    const mRegion = m.groups ? (m.groups.toLowerCase().includes('illinois')||m.state==='IL' ? 'central' : STATE_REGION[m.state] || 'noncont') : (STATE_REGION[m.state] || 'noncont');
    const mFakeContact = {region: mRegion, state: m.state};

    const pastVisits = visits.filter(v => !v.date || new Date(v.date) < now).sort((a,b)=>(b.date||'').localeCompare(a.date||''));

// ── MANIFEST CARD ──
function openManifestCard(mid) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;
  const screen = document.getElementById('manifest-card-screen');
  const cardContent = document.getElementById('manifest-card-content');
  if (!screen || !cardContent) return;
  haptic(8);

  const now = new Date();
  const visits = manifestVisits.filter(v => v.manifestId === mid).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const todayStr2 = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0"); const nextVisit = manifestVisits.filter(v => v.manifestId === mid && v.date && v.date >= todayStr2).sort((a,b)=>a.date.localeCompare(b.date))[0] || null;
  const lastVisit = visits.filter(v => !v.date || v.date < todayStr2)[0];
  const visitCount = visits.filter(v => v.date && v.date < todayStr2).length;

  // Manifest contact's own call log (stored in Calls sheet with mfst- id)
  const mCalls = (contacts.find(c=>c.id===mid)||{calls:[]}).calls || 
    Object.values(window._manifestCallsCache||{}).filter(x=>x.contactId===mid) ||
    [];
  // Build manifest calls from main calls data
  const allManifestCalls = [];
  // Check if we have a pseudo-contact entry for this manifest id
  const mPseudo = contacts.find(c => c.id === mid);
  if (mPseudo) allManifestCalls.push(...(mPseudo.calls||[]));
  
  const manifestCallLog = allManifestCalls.filter(x=>x.outcome&&x.outcome!=='imported').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const lastCall = manifestCallLog[0] || null;

  // Active reminder from manifest calls
  const activeRem = allManifestCalls.find(x=>x.outcome==='reminder'&&!x.completed) || null;

  // Derived tag pills
  // Compute Scheduled derived tag
  const todayTagStr = new Date().toISOString().slice(0,10);
  const nvMs2 = t => { if(!t)return 0; const c=t.split(' – ')[0].split(' - ')[0].trim(); const x=new Date(c).getTime(); return isNaN(x)?0:x; };
  const todayMs3 = Date.now();
  const scheduledVisit = manifestVisits.filter(v => v.manifestId === mid && v.date).find(v => nvMs2(v.endDate||v.date) >= todayMs3);
  const isScheduled = !!(scheduledVisit || (m.next_visit_date && nvMs2(m.next_visit_end_date||m.next_visit_date) >= todayMs3));

  const tagDefs = [
    isScheduled                             ? {label:'Scheduled',    bg:'#1a2e22', border:'#4a9e6b44', color:'#4cd68a', readonly:true} : null,
    m.support_status==='Supporting'         ? {label:'Supporting',   bg:'#0a2a1a', border:'#4cd68a44', color:'#4cd68a'} : null,
    m.support_status==='Non-supporting'     ? {label:'Non-supporting',bg:'#2a0a0a', border:'#e0555544', color:'#e05555'} : null,
    m.bible_handouts==='Yes'                ? {label:'Handouts',     bg:'#2e1f00', border:'#f0b42944', color:'#f0b429'} : null,
    m.lodging==='Yes'                       ? {label:'Lodging',      bg:'#1a1f35', border:'#8899ee44', color:'#8899ee'} : null,
    m.rv_hookup==='Yes'                     ? {label:'RV',           bg:'#1a1f35', border:'#8899ee44', color:'#8899ee'} : null,

function openManifestLog(mid) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;

  if (!pseudo) {
    pseudo = { id: mid, pastor: m.pastor, church: m.church, city: m.city, state: m.state, calls: [] };
    contacts.push(pseudo);
  }

  const callLog = (pseudo.calls||[]).filter(x=>x.outcome!=='imported').sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const logRows = callLog.length ? callLog.map(x => {
    const outcomeLabels = {pastor:'Pastor',secretary:'Secretary',voicemail:'Voicemail',no_answer:'No Answer',note:'Note',reminder:'Reminder',call:'Call',text:'Text',email:'Email'};
    const label = outcomeLabels[x.outcome] || x.outcome || 'Note';
    return `<div style="padding:10px 16px;border-bottom:1px solid var(--border);">

  }).join('') : '<div style="padding:14px 16px;font-size:13px;color:var(--muted);">No logs yet</div>';

  showM(`<div class="modal-backdrop" onclick="if(event.target===this){const l=document.getElementById('modal-layer');l.innerHTML='';l.style.pointerEvents='none';}">

function setMLogType(t) {
  window._mlogType = t;
  ['call','text','email','note'].forEach(type => {

    if (!btn) return;
    const active = type === t;
    btn.style.borderColor = active ? '#F3B53A' : 'var(--border)';
    btn.style.background  = active ? '#2e1f00' : 'var(--surface2)';
    btn.style.color       = active ? '#F3B53A' : 'var(--muted)';
  });
}

function saveManifestLogEntry(mid) {
  const details = document.getElementById('mlog-details')?.value?.trim() || '';
  const type = window._mlogType || 'call';
  const now = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dateStr = `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

  let pseudo = contacts.find(c => c.id === mid);
  if (!pseudo) {
    const m = manifestContacts.find(x => x.id === mid);
    pseudo = { id: mid, pastor: m?.pastor||'', church: m?.church||'', city: m?.city||'', state: m?.state||'', calls: [] };
    contacts.push(pseudo);
  }
  if (!pseudo.calls) pseudo.calls = [];

  const entry = { id: uid(), contactId: mid, date: dateStr, outcome: type, meetingBooked: false, meetingDate: '', details, remDate: '', remTime: '', remType: '', completed: false };
  pseudo.calls.push(entry);
  save();
  saveCallEntry(mid, entry);
  haptic(10);
  closeMKeepCard();
  setTimeout(() => openManifestCard(mid), 220);
}

function setSailToManifest(cid) {
  const c = contacts.find(x => x.id === cid); if (!c) return;
  haptic(20);

  // Find the most recent booked meeting date
  const meetingCall = (c.calls||[]).filter(x=>x.meetingBooked).sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0];
  const nextVisitDate = meetingCall?.meetingDate || '';

  const newId = 'mfst-' + uid();
  const m = {
    id: newId,
    pastor: c.pastor || '',
    church: c.church || '',
    city: c.city || '',
    state: c.state || '',
    phone: c.phone || '',
    cell: c.cell || '',
    email: c.email || '',
    church_email: '',
    address: c.address || '',
    website: '',
    groups: 'Scheduled',
    lodging: '',
    rv_hookup: '',
    bible_handouts: '',
    support_status: 'Non-supporting',
    support_amount: '',
    support_cadence: '',
    relay_group: '',
    prayer_list: '',
    notes: c.notes ? (Array.isArray(c.notes) ? c.notes.join('\n') : c.notes) : '',
    starred: c.starred || false,
    next_visit_date: nextVisitDate,
    lat: c.lat || '',
    lng: c.lng || '',
  };
  manifestContacts.push(m);
  saveManifestContact(m);

  // Create a manifestVisit entry for the booked meeting date if one exists
  if (nextVisitDate) {
    const cleanDate = nextVisitDate.split(' – ')[0].split(' - ')[0].trim();
    const parsedDate = new Date(cleanDate);
    if (!isNaN(parsedDate.getTime())) {
      const isoDate = parsedDate.toISOString().slice(0,10);
      const endPart = meetingCall?.meetingEndDate || '';
      const visit = { id: uid(), manifestId: newId, date: isoDate, endDate: endPart, sermon: '', capacity: '', days: '', handout: '', notes: '' };
      manifestVisits.push(visit);
      saveVisitEntry(visit);
    }
  }

  // Migrate full call history — re-save each call under the new manifest ID
  if (c.calls && c.calls.length) {
    c.calls.forEach(call => {
      const migratedCall = {...call, contactId: newId};
      // Add to contacts array under new ID so manifest card can show them
      let pseudo = contacts.find(x => x.id === newId);
      if (!pseudo) {
        pseudo = {id: newId, pastor: m.pastor, church: m.church, city: m.city, state: m.state, calls: []};
        contacts.push(pseudo);
      }
      pseudo.calls = pseudo.calls || [];
      pseudo.calls.push(migratedCall);
      saveCallEntry(newId, migratedCall);
    });
  }

  // Remove from Voyage (including any pseudo entry we just created)
  contacts = contacts.filter(x => x.id !== cid && x.id !== newId);
  save();
  deleteContactEntry(cid);
  closeMKeepCard();
  closeCard();
  renderFilters();
  renderList();
  showStatus('Set sail to Manifest ⚓', 'ok');
}
