<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Relay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
  --text:#e8e6e1;--muted:#6b6860;--accent:#F3B53A;--accent-light:#1a1500;
  --danger:#e05555;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --radius:12px;--radius-sm:8px;
}
html,body{height:100%;margin:0;padding:0;background:#0f0f0f;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;overflow:hidden;}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:100px;}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);width:14px;height:14px;pointer-events:none;}
#search{width:100%;padding:9px 10px 9px 30px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--surface2);color:var(--text);font-family:var(--sans);}
#search:focus{outline:none;border-color:#F3B53A;}
.filter-row{display:flex;gap:5px;overflow-x:auto;width:100%;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-pill{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;cursor:pointer;font-family:var(--sans);color:var(--muted);white-space:nowrap;flex-shrink:0;}
.filter-pill.active{background:#000C1F;color:#F3B53A;border-color:#F3B53A;}
.top-bar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.count-badge{font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;color:var(--muted);white-space:nowrap;}
.add-btn{padding:8px 14px;background:#F3B53A;color:#000C1F;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.list-header{display:grid;grid-template-columns:44px 1fr 48px 48px;padding:0 14px;height:34px;align-items:center;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;}
.list-header-cell{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:500;padding:0 4px;}
.main-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.main-list::-webkit-scrollbar{width:3px;}
.main-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.contact-row{display:grid;grid-template-columns:44px 1fr 48px 48px;padding:0 14px;min-height:64px;align-items:center;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.contact-row:active{background:var(--surface);}
.row-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.row-cell{padding:6px 4px;min-width:0;}
.row-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.row-loc{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.status-pill{display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;letter-spacing:.04em;padding:3px 6px;border-radius:20px;text-transform:uppercase;}
.pill-pastor{background:#1a3a28;color:#4cd68a;}
.pill-voicemail{background:#1e2244;color:#8899ee;}
.pill-secretary{background:#2a1f35;color:#c9a0f0;}
.pill-reminder{background:#2e1f00;color:#f0b429;}
.pill-none{background:var(--surface2);color:var(--muted);}
.pill-noanswer1{background:#2a2a2a;color:#e8e6e1;border:1.5px solid #666;font-size:9px;padding:3px 7px;border-radius:20px;font-weight:700;letter-spacing:.04em;}
.pill-noanswer2{background:transparent;color:#b0aea9;border:1.5px solid #6b6860;font-size:9px;padding:3px 7px;border-radius:20px;font-weight:700;letter-spacing:.04em;}
.row-pill-cell{display:flex;align-items:center;justify-content:center;}
.row-actions{display:flex;align-items:center;justify-content:flex-end;}
.log-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;cursor:pointer;border:1px solid #F3B53A44;background:none;color:#F3B53A;}
.log-btn svg{width:16px;height:16px;}
.log-btn:active{background:#1e2244;}
.reminder-dot{width:7px;height:7px;border-radius:50%;background:#f0b429;display:inline-block;margin-left:5px;vertical-align:middle;}
.empty-state{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:14px;}
.proximity-screen{position:absolute;inset:0;z-index:100;background:var(--bg);flex-direction:column;overflow:hidden;display:none;}
.proximity-screen.visible{display:flex;}
.prox-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.fullscreen-card{position:absolute;inset:0;z-index:100;background:var(--bg);flex-direction:column;overflow:hidden;display:none;}
.fullscreen-card.visible{display:flex;}
.card-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.card-back-btn{background:none;border:1px solid var(--border);border-radius:50%;width:36px;height:36px;font-family:var(--sans);font-size:16px;font-weight:500;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.card-topbar-center{flex:1;text-align:center;}
.card-progress-label{font-size:11px;color:var(--muted);}
.card-progress-bar-wrap{width:80px;height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin:5px auto 0;}
.card-progress-bar-fill{height:100%;background:#F3B53A;border-radius:3px;transition:width .3s;}
.card-edit-btn{background:none;border:1px solid var(--border);border-radius:50%;width:36px;height:36px;font-family:var(--sans);font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.card-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.card-body::-webkit-scrollbar{width:3px;}
.card-body::-webkit-scrollbar-thumb{background:var(--border);}
.card-hero{padding:20px 20px 16px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);}
.card-hero-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;flex-shrink:0;}
.card-hero-name{font-family:var(--serif);font-size:26px;line-height:1.1;margin-bottom:3px;}
.card-hero-church{font-size:13px;color:var(--muted);margin-bottom:5px;}
.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;}
.card-action-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px 8px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:var(--sans);cursor:pointer;color:var(--text);min-height:72px;}
.card-action-btn:active{transform:scale(.97);}
.btn-icon{line-height:1;display:flex;align-items:center;justify-content:center;width:24px;height:24px;}
.btn-icon svg{width:22px;height:22px;}
.btn-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
.card-action-btn.green{border-color:#4a9e6b44;background:#1a2e2244;}
.card-action-btn.green:active{background:var(--accent-light);border-color:var(--accent);}
.card-action-btn.blue{border-color:#6b7fd444;background:#1e224422;}
.card-action-btn.blue:active{background:#1e2244;border-color:#8899ee;}
.card-action-btn.yellow{border-color:#f0b42944;background:#2e1f0022;}
.card-action-btn.yellow:active{background:#2e1f00;border-color:#f0b429;}
.card-action-btn.teal{border-color:#2a7a8a44;background:#0e222622;}
.card-action-btn.teal:active{background:#0e2226;border-color:#4ac4d4;}
.contact-submenu{display:none;flex-direction:column;gap:8px;padding:0 16px 16px;}
.contact-submenu.open{display:flex;}
.contact-sub-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;color:var(--text);text-decoration:none;}
.contact-sub-btn:active{transform:scale(.98);}
.call-sub{border-color:#4a9e6b44;color:#4cd68a;}
.text-sub{border-color:#6b7fd444;color:#8899ee;}
.email-sub{border-color:#d4b06b44;color:#d4b06b;}
.card-history{padding:16px;}
.history-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px;font-weight:500;}
.call-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;position:relative;}
.call-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px;padding-right:28px;}
.outcome-badge{font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;}
.outcome-pastor{background:#1a3a28;color:#4cd68a;}
.outcome-voicemail{background:#1e2244;color:#8899ee;}
.outcome-secretary{background:#2a1f35;color:#c9a0f0;}
.outcome-noanswer1{background:#1e1e1e;color:#e8e6e1;border:1px solid #555;}
.outcome-noanswer2{background:#e8e6e1;color:#1e1e1e;}
.outcome-imported{background:var(--surface2);color:var(--muted);}
.outcome-reminder{background:#2e1f00;color:#f0b429;}
.outcome-note{background:var(--surface2);color:var(--muted);}
.call-date{font-size:10px;color:var(--muted);margin-left:auto;}
.call-details-text{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;margin-top:5px;}
.call-del{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:4px 6px;border-radius:4px;line-height:1;}
.call-del:hover{color:var(--danger);}
.no-calls{font-size:13px;color:var(--muted);font-style:italic;}
.card-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom));}
.nav-btn{display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);font-family:var(--sans);font-size:18px;font-weight:600;cursor:pointer;color:var(--text);}
.nav-btn:active:not(:disabled){background:var(--surface);}
.nav-btn:disabled{opacity:.25;cursor:default;}
.nav-btn.next{background:#F3B53A;border-color:#F3B53A;color:#000C1F;}
.nav-btn.next:active:not(:disabled){opacity:.85;}
.nav-center{font-size:11px;color:var(--muted);text-align:center;flex:1;padding:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0;}
.modal-box{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;border:1px solid var(--border);padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));box-sizing:border-box;overflow-x:hidden;}
.modal-box h2{font-family:var(--serif);font-size:22px;margin-bottom:5px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:18px;}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.fg label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:500;}
.fg input,.fg textarea,.fg select{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:16px;background:var(--bg);color:var(--text);width:100%;}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--accent);}
.fg textarea{resize:vertical;height:80px;}
.outcome-opts{display:flex;flex-direction:column;gap:8px;}
.outcome-opt{border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);background:var(--surface2);font-family:var(--sans);text-align:left;display:flex;align-items:center;gap:12px;}
.outcome-opt:active{transform:scale(.99);}
.outcome-opt.selected{border-color:#F3B53A;background:#1a1500;color:#F3B53A;}
.opt-icon{font-size:20px;}
.meeting-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:14px;}
.meeting-row label{font-size:14px;flex:1;}
.toggle-wrap{display:flex;gap:6px;}
.toggle-btn{padding:7px 16px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-family:var(--sans);cursor:pointer;background:none;color:var(--muted);}
.toggle-btn.on{background:#F3B53A;border-color:#F3B53A;color:#000C1F;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:10px;}
.btn-cancel{padding:12px 20px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;cursor:pointer;color:var(--text);flex:1;}
.btn-save{padding:12px 20px;background:#F3B53A;color:#000C1F;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;flex:2;}
.cal-open-btn{width:100%;padding:14px;background:#1a73e8;color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.fgi{display:flex;flex-direction:column;gap:5px;}
.fgi.full{grid-column:1/-1;}
.fgi label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:500;}
.fgi input,.fgi select{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:16px;background:var(--bg);color:var(--text);width:100%;min-width:0;}
.fgi input:focus,.fgi select:focus{outline:none;border-color:var(--accent);}
.fgi select option{background:var(--surface);}
@media(min-width:600px){
  .top-bar{flex-wrap:nowrap;padding:8px 20px;}
  .list-header{grid-template-columns:44px 1.5fr 1fr 60px 48px;}
  .contact-row{grid-template-columns:44px 1.5fr 1fr 60px 48px;min-height:52px;}
  .card-hero-name{font-size:30px;}
  .card-actions{grid-template-columns:repeat(4,1fr);}
  .contact-submenu.open{flex-direction:row;}
  .modal-backdrop{align-items:center;padding:20px;}
  .modal-box{border-radius:16px;max-height:85vh;}
  .outcome-opts{display:grid;grid-template-columns:1fr 1fr 1fr;}
}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA0MCA0MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHJ4PSI4IiBmaWxsPSIjMDAwQzFGIi8+PHRleHQgeD0iMjAiIHk9IjI2IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iR2VvcmdpYSxzZXJpZiIgZm9udC1zaXplPSIyMCIgZmlsbD0iI0YzQjUzQSI+UjwvdGV4dD48L3N2Zz4=" style="height:36px;width:auto;flex-shrink:0;border-radius:8px;" alt="Relay"/>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search…" oninput="renderList()"/>
    </div>
    <div class="top-bar-right">
      <span id="count-label" class="count-badge">0</span>
      <button class="add-btn" onclick="openContactModal(null)" style="font-size:22px;padding:4px 12px;line-height:1;">+</button>
    </div>
  </div>
  <div class="filter-row" id="state-filter-row" style="padding:6px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;"></div>
  <div class="list-header">
    <div></div>
    <div class="list-header-cell">Pastor / Church</div>
    <div class="list-header-cell" id="lh-loc" style="display:none">City, State</div>
    <div class="list-header-cell" style="text-align:center">Status</div>
    <div class="list-header-cell" style="text-align:right">Log</div>
  </div>
  <div class="main-list" id="main-list"></div>
  <div id="fullscreen-card" class="fullscreen-card"></div>
  <div id="proximity-screen" class="proximity-screen"></div>
  <div id="modal-layer" style="position:fixed;inset:0;z-index:200;pointer-events:none;"></div>
</div>
<script>
const STATE_REGION={AL:'south',AK:'noncont',AZ:'west',AR:'south',CA:'west',CO:'west',CT:'northeast',DE:'northeast',FL:'south',GA:'south',HI:'noncont',ID:'west',IL:'midwest',IN:'midwest',IA:'midwest',KS:'midwest',KY:'south',LA:'south',ME:'northeast',MD:'northeast',MA:'northeast',MI:'midwest',MN:'midwest',MS:'south',MO:'midwest',MT:'west',NE:'midwest',NV:'west',NH:'northeast',NJ:'northeast',NM:'west',NY:'northeast',NC:'south',ND:'midwest',OH:'midwest',OK:'south',OR:'west',PA:'northeast',RI:'northeast',SC:'south',SD:'midwest',TN:'south',TX:'south',UT:'west',VT:'northeast',VA:'south',WA:'west',WV:'south',WI:'midwest',WY:'west',DC:'northeast'};
const REGION_COLORS={northeast:{bg:'#2a1018',text:'#c45c7a',border:'#c45c7a44'},south:{bg:'#2a1520',text:'#e8a0b4',border:'#e8a0b444'},midwest:{bg:'#101e2a',text:'#5b9fd4',border:'#5b9fd444'},west:{bg:'#2a2010',text:'#d4a84b',border:'#d4a84b44'},noncont:{bg:'#0e2228',text:'#4ec9d4',border:'#4ec9d444'},default:{bg:'#1a1a1a',text:'#6b6860',border:'#2e2e2e'}};
function getRegionColor(c){const st=(c.state||'').toUpperCase().trim();const key=STATE_REGION[st]||'default';return REGION_COLORS[key]||REGION_COLORS.default;}
const AC=[['#1a2e22','#4a9e6b'],['#1a1f35','#6b7fd4'],['#2e1a1a','#d46b6b'],['#2e2a1a','#d4b06b'],['#251a2e','#a06bd4'],['#1a2a2e','#6bc4d4'],['#222','#999'],['#1e2a1a','#7ab06b']];
const OM={pastor:{label:'Spoke to Pastor',cls:'outcome-pastor',icon:'personCheck'},noanswer1:{label:'No Answer (1st attempt)',cls:'outcome-noanswer1',icon:'na1'},noanswer2:{label:'No Answer (2nd attempt)',cls:'outcome-noanswer2',icon:'na2'},voicemail:{label:'Left Voicemail',cls:'outcome-voicemail',icon:'vm'},secretary:{label:'Spoke to Secretary',cls:'outcome-secretary',icon:'chair'},imported:{label:'Imported note',cls:'outcome-imported',icon:''},reminder:{label:'Reminder',cls:'outcome-reminder',icon:'bellSm'},note:{label:'Note',cls:'outcome-note',icon:'noteSm'}};
function starIcon(starred){return starred?ICONS.starFilled:ICONS.starEmpty;}
function outcomeIcon(key){
  if(key==='personCheck')return ICONS.personCheck;
  if(key==='chair')return ICONS.chair;
  if(key==='bellSm')return ICONS.bellSm;
  if(key==='vm')return '<span style="font-size:10px;font-weight:700;letter-spacing:.04em">M</span>';
  if(key==='noteSm')return ICONS.noteSm;
  if(key==='na1')return '<span style="width:16px;height:16px;background:#2a2a2a;border:1.5px solid #666;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#e8e6e1">1</span>';
  if(key==='na2')return '<span style="width:16px;height:16px;background:transparent;border:1.5px solid #888;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#b0aea9">2</span>';
  return '';
}

function fmtRemDate(remDate,remTime){
  if(!remDate)return '';
  const [y,m,d]=remDate.split('-').map(Number);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let str=`${months[m-1]} ${d}`;
  if(remTime){
    const [hh,mm]=remTime.split(':').map(Number);
    const ampm=hh>=12?'PM':'AM';
    const h12=hh%12||12;
    str+=` at ${h12}:${String(mm).padStart(2,'0')} ${ampm}`;
  }
  return str;
}

function getReminders(){
  const now=new Date();const result=[];
  contacts.forEach(c=>{
    const rems=(c.calls||[]).filter(x=>x.outcome==='reminder');if(!rems.length)return;
    const sorted=rems.slice().sort((a,b)=>{
      const da=a.remDate?new Date(a.remDate+'T'+(a.remTime||'12:00')+':00'):new Date(0);
      const db=b.remDate?new Date(b.remDate+'T'+(b.remTime||'12:00')+':00'):new Date(0);
      return da-db;
    });
    const soonest=sorted[0];
    const due=soonest.remDate?new Date(soonest.remDate+'T'+(soonest.remTime||'12:00')+':00'):null;
    result.push({contact:c,reminder:soonest,due,overdue:due&&due<now});
  });
  result.sort((a,b)=>{if(a.overdue&&!b.overdue)return -1;if(!a.overdue&&b.overdue)return 1;if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;return a.due-b.due;});
  return result;
}

  const nearbyPill=`<button class="filter-pill${proxResults?' active':''}" onclick="openProximityScreen()" style="display:flex;align-items:center;gap:4px;" title="Nearby"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4ec9d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>${proxResults?' ('+proxResults.length+')':''}</button>`;
  const clearPill=proxResults?`<button class="filter-pill" onclick="clearProximity()" style="color:var(--danger);border-color:var(--danger)44;">\u2715 Clear</button>`:'';
  const starredPill=`<button class="filter-pill${fState==='Starred'?' active':''}" onclick="setSF('Starred')" style="display:flex;align-items:center;" title="Starred"><span style="color:#f0b429;font-size:14px;">\u2605</span></button>`;
  const remPill=`<button class="filter-pill${showingReminders?' active':''}" onclick="toggleRemindersView()" style="display:flex;align-items:center;gap:4px;" title="Reminders">${overdueCount?`<span style="width:7px;height:7px;background:#e05555;border-radius:50%;display:inline-block;margin-right:2px;"></span>`:''}<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#c9a0f0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>${remCount?' ('+remCount+')':''}</button>`;
  const phonePill=`<button class="filter-pill${filterHasPhone?' active':''}" onclick="togglePhoneFilter()" title="Has Phone" style="display:flex;align-items:center;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="${filterHasPhone?'#4ec9d4':'currentColor'}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></button>`;
  const stateOpts2=['All',...Array.from(new Set(contacts.map(c=>(c.state||'').trim()).filter(Boolean))).sort()].map(s=>`<option value="${s}"${fState===s?' selected':''}>${s==='All'?'All States':s+' ('+(STATE_NAMES[s]||s)+')'}</option>`).join('');
  const stateDropPill=`<select onchange="setSF(this.value)" style="padding:5px 8px;border:1px solid var(--border);border-radius:20px;font-family:var(--sans);font-size:12px;background:var(--surface);color:${fState!=='All'?'var(--accent)':'var(--text)'};cursor:pointer;font-weight:${fState!=='All'?'600':'400'};">${stateOpts2}</select>`;
  document.getElementById('state-filter-row').innerHTML=nearbyPill+clearPill+starredPill+remPill+phonePill+stateDropPill;
}
function setSF(s){fState=s;proxResults=null;proxLabel='';showingReminders=false;renderFilters();renderList();}
function togglePhoneFilter(){filterHasPhone=!filterHasPhone;renderFilters();renderList();}
function clearProximity(){proxResults=null;proxLabel='';renderFilters();renderList();}

function buildFilteredList(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  if(proxResults){let f=proxResults.map(r=>contacts.find(c=>c.id===r.id)).filter(Boolean);if(q)f=f.filter(c=>(c.pastor||'').toLowerCase().includes(q)||(c.church||'').toLowerCase().includes(q)||(c.city||'').toLowerCase().includes(q));if(filterHasPhone)f=f.filter(c=>splitField(c.phone).length>0);return f;}
  if(showingReminders){let f=getReminders().map(r=>r.contact);if(q)f=f.filter(c=>(c.pastor||'').toLowerCase().includes(q)||(c.church||'').toLowerCase().includes(q)||(c.city||'').toLowerCase().includes(q));if(filterHasPhone)f=f.filter(c=>splitField(c.phone).length>0);return f;}
  let f=contacts.filter(c=>{const ms=fState==='All'||(fState==='Starred'?c.starred:(c.state||'').toUpperCase()===fState);const mq=!q||(c.pastor||'').toLowerCase().includes(q)||(c.church||'').toLowerCase().includes(q)||(c.city||'').toLowerCase().includes(q)||(c.phone||'').toLowerCase().includes(q);const mp=!filterHasPhone||splitField(c.phone).length>0;return ms&&mq&&mp;});
  f.sort((a,b)=>(a.pastor||a.church||'').localeCompare(b.pastor||b.church||''));return f;
}

function renderList(){
  filteredList=buildFilteredList();
  document.getElementById('count-label').textContent=filteredList.length+'/'+contacts.length;
  const list=document.getElementById('main-list');const isDesktop=window.innerWidth>=600;
  const lhLoc=document.getElementById('lh-loc');if(lhLoc)lhLoc.style.display=isDesktop?'block':'none';
  if(!filteredList.length){list.innerHTML='<div class="empty-state">No contacts found</div>';return;}
  const pillMap={pastor:['P','pill-pastor'],noanswer1:['1','pill-noanswer1'],noanswer2:['2','pill-noanswer2'],voicemail:['M','pill-voicemail'],secretary:['S','pill-secretary'],reminder:['R','pill-reminder']};
  list.innerHTML=filteredList.map((c,i)=>{
    const lcall=lc(c);const pillData=lcall&&pillMap[lcall.outcome]?pillMap[lcall.outcome]:null;
    const pill=pillData?`<span class="status-pill ${pillData[1]}">${pillData[0]}</span>`:`<span class="status-pill pill-none">\u2014</span>`;
    const loc=[c.city,c.state].filter(Boolean).join(', ');const hasReminder=(c.calls||[]).some(x=>x.outcome==='reminder');
    const rcList=getRegionColor(c);
    const proxItem=proxResults?proxResults.find(r=>r.id===c.id):null;
    const remItem=showingReminders?getReminders().find(r=>r.contact.id===c.id):null;
    const remBadge=remItem?`<span style="font-size:9px;font-weight:500;color:${remItem.overdue?'#e05555':'#f0b429'};margin-left:4px;">${remItem.reminder.remDate?fmtRemDate(remItem.reminder.remDate,''):'Reminder'}</span>`:'';
    const distBadge=proxItem?`<span style="font-size:10px;font-weight:600;color:var(--accent);margin-left:4px;">${proxItem.dist<10?proxItem.dist.toFixed(1):Math.round(proxItem.dist)} mi</span>`:'';
    if(isDesktop){return `<div class="contact-row" onclick="openCallingCard(${i})"><div style="padding:0 4px"><div class="row-avatar" style="background:${rcList.bg};color:${rcList.text};border:1.5px solid ${rcList.border}">${ini(c.pastor||c.church||'?')}</div></div><div class="row-cell"><div class="row-name">${esc(c.pastor||'\u2014')}${hasReminder?'<span class="reminder-dot"></span>':''}${distBadge}</div><div class="row-sub">${esc(c.church||'')}</div></div><div class="row-cell"><div class="row-loc">${esc(loc)||'\u2014'}</div></div><div class="row-pill-cell">${pill}</div><div class="row-actions" onclick="event.stopPropagation()"><button class="log-btn" onclick="openLogModal('${c.id}')">${ICONS.phone}</button></div></div>`;}
    return `<div class="contact-row" onclick="openCallingCard(${i})"><div style="padding:0 4px"><div class="row-avatar" style="background:${rcList.bg};color:${rcList.text};border:1.5px solid ${rcList.border}">${ini(c.pastor||c.church||'?')}</div></div><div class="row-cell"><div class="row-name">${esc(c.pastor||'\u2014')}${hasReminder?'<span class="reminder-dot"></span>':''}${distBadge}${remBadge}</div><div class="row-sub">${esc(c.church||'')}</div><div class="row-loc">${esc(loc)||''}</div></div><div class="row-pill-cell">${pill}</div><div class="row-actions" onclick="event.stopPropagation()"><button class="log-btn" onclick="openLogModal('${c.id}')">${ICONS.phone}</button></div></div>`;
  }).join('');
}

function openCallingCard(idx){filteredList=buildFilteredList();callingIdx=idx;contactMenuOpen=false;infoExpanded=false;renderCallingCard();}

  const c=filteredList[callingIdx];if(!c){closeCard();return;}

            ${(c.lat&&c.lng&&c.lat!=='Unkown')?`<div style="font-size:9px;color:var(--muted);margin-top:3px;opacity:.7">${parseFloat(c.lat).toFixed(4)}, ${parseFloat(c.lng).toFixed(4)}</div>`:''}

      </div>
      <div class="contact-submenu${contactMenuOpen?' open':''}">${(()=>{const phones=splitField(c.phone);const emails=splitField(c.email);const msgSvg=`<svg width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z'/></svg>`;const emailSvg=`<svg width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z'/><polyline points='22,6 12,13 2,6'/></svg>`;let out='';if(phones.length){phones.forEach(p=>{const n=p.replace(/[^+0-9]/g,'');out+=`<a href="tel:${n}" class="contact-sub-btn call-sub" style="text-decoration:none;">${ICONS.cellPhone} ${phones.length>1?p:'Call'}</a>`;});phones.forEach(p=>{const n=p.replace(/[^+0-9]/g,'');out+=`<a href="sms:${n}" class="contact-sub-btn text-sub" style="text-decoration:none;">${msgSvg} ${phones.length>1?'Text '+p:'Text'}</a>`;});}else{out+=`<span class="contact-sub-btn" style="opacity:.3;">${ICONS.phone} No phone</span>`;}if(emails.length){emails.forEach(e=>{out+=`<a href="mailto:${e}" class="contact-sub-btn email-sub" style="text-decoration:none;">${emailSvg} ${emails.length>1?e:'Email'}</a>`;});}else{out+=`<span class="contact-sub-btn" style="opacity:.3;">${emailSvg} No email</span>`;}return out;})()}</div>
      <div class="card-history"><div class="history-title">Timeline (${realCalls.length})</div>
        ${calls.length?calls.map(x=>{
          const m=OM[x.outcome]||OM.imported;
          const mb=x.meetingBooked?`<span style="font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;background:#1a2e22;color:#4a9e6b;margin-left:4px">\ud83d\udcc5 ${x.meetingDate?esc(x.meetingDate):'Booked'}</span>`:'';
          const isCompleted=x.outcome==='note'&&x.completed;
          const detailStyle=isCompleted?'text-decoration:line-through;opacity:.45;':'';
          const checkBtn=x.outcome==='reminder'?`<button onclick="completeReminder('${c.id}','${x.id}')" title="Mark done" style="position:absolute;top:8px;right:34px;background:none;border:1px solid #f0b42944;border-radius:50%;width:22px;height:22px;cursor:pointer;color:#f0b429;display:flex;align-items:center;justify-content:center;padding:0;">${ICONS.checkCircle}</button>`:'';
          return `<div class="call-entry"><div class="call-top" style="padding-right:${x.outcome==='reminder'?'60px':'28px'}">${x.outcome==='note'?`<span style="display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:12px;">${outcomeIcon('noteSm')} Note</span>`:`<span class="outcome-badge ${m.cls}" style="display:inline-flex;align-items:center;gap:5px;">${outcomeIcon(m.icon)} ${m.label}</span>`}${mb}<span class="call-date">${x.date}</span></div>${x.details?`<div class="call-details-text" style="${detailStyle}">${esc(x.details)}</div>`:''}<button class="call-del" onclick="delCall('${c.id}','${x.id}')">\u00d7</button>${checkBtn}</div>`;
        }).join(''):`<div class="no-calls">Empty log.</div>`}

    <div style="background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;">

      ${infoExpanded?`<div style="padding:0 16px 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;">${(()=>{const phones=splitField(c.phone);const emails=splitField(c.email);let out='';if(phones.length){phones.forEach((p,i)=>{out+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px">Phone${phones.length>1?' '+(i+1):''}</div><div style="font-size:12px;color:var(--text)">${esc(p)}</div></div>`;});}else{out+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px">Phone</div><div style="font-size:12px;color:var(--muted)">\u2014</div></div>`;}if(emails.length){emails.forEach((e,i)=>{out+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;overflow:hidden;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px">Email${emails.length>1?' '+(i+1):''}</div><div style="font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e)}</div></div>`;});}else{out+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px">Email</div><div style="font-size:12px;color:var(--muted)">\u2014</div></div>`;}out+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px">Address</div><div style="font-size:12px;color:var(--text)">${c.address?`<a href="maps://?q=${encodeURIComponent(c.address+' '+c.city+' '+c.state)}" style="color:var(--accent);text-decoration:none;">${esc(c.address)}</a>`:'\u2014'}</div></div>`;out+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px">Last Contacted</div><div style="font-size:12px;color:var(--text)">${lastContactedStr(c)||'\u2014'}</div></div>`;return out;})()}</div>`:''}
    </div>
    <div class="card-nav"><button class="nav-btn" onclick="navCard(-1)" ${callingIdx===0?'disabled':''}>\u2190</button><span class="nav-center">${esc(c.pastor||c.church||'')}</span><button class="nav-btn next" onclick="navCard(1)" ${callingIdx===total-1?'disabled':''}>\u2192</button></div>`;
}
function toggleContactMenu(){contactMenuOpen=!contactMenuOpen;renderCallingCard();}
function closeCard(){const card=document.getElementById('fullscreen-card');card.classList.remove('visible');card.innerHTML='';contactMenuOpen=false;renderList();}
function navCard(dir){const next=callingIdx+dir;if(next<0||next>=filteredList.length)return;callingIdx=next;contactMenuOpen=false;infoExpanded=false;renderCallingCard();}

function openLogModal(cid){const c=contacts.find(x=>x.id===cid);if(!c)return;logOut=null;logMtg=false;const suggested=suggestedNext(c);if(suggested){setTimeout(()=>selOut(suggested),50);}const suggestionHTML=suggested?`<div style="background:#1a150044;border:1px solid #F3B53A33;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;font-size:13px;color:#F3B53A;">\ud83d\udca1 Suggested: <strong>${OM[suggested]?.label||suggested}</strong></div>`:'';showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)"><div class="modal-box" onclick="event.stopPropagation()"><h2>Log a call</h2><div class="modal-sub">${esc(c.pastor||c.church||'')} \u00b7 ${esc([c.city,c.state].filter(Boolean).join(', '))}</div><div id="log-suggestion">${suggestionHTML}</div><div class="fg"><label>Outcome *</label><div class="outcome-opts"><button class="outcome-opt" id="op-pastor" onclick="selOut('pastor')" style="border-color:#4a9e6b44;"><span class="opt-icon" style="display:flex;align-items:center;color:#4cd68a;">${ICONS.personCheck}</span><span style="color:#4cd68a;">Spoke to Pastor</span></button><button class="outcome-opt" id="op-noanswer1" onclick="selOut('noanswer1')"><span class="opt-icon" style="font-size:14px;font-weight:700;color:#e8e6e1;">\u2460</span>No Answer (1st)</button><button class="outcome-opt" id="op-noanswer2" onclick="selOut('noanswer2')"><span class="opt-icon" style="font-size:14px;font-weight:700;color:#b0aea9;">\u2461</span>No Answer (2nd)</button><button class="outcome-opt" id="op-voicemail" onclick="selOut('voicemail')" style="border-color:#8899ee44;"><span class="opt-icon" style="display:flex;align-items:center;color:#8899ee;">${ICONS.phoneOff}</span><span style="color:#8899ee;">Left Voicemail</span></button><button class="outcome-opt" id="op-secretary" onclick="selOut('secretary')" style="border-color:#c9a0f044;"><span class="opt-icon" style="display:flex;align-items:center;color:#c9a0f0;">${ICONS.chair}</span><span style="color:#c9a0f0;">Spoke to Secretary</span></button><button class="outcome-opt" id="op-note" onclick="selOut('note')"><span class="opt-icon" style="display:flex;align-items:center;color:var(--muted);">${ICONS.noteSm}</span><span>Add Note</span></button></div></div><div id="mtg-sec" style="display:none"><div class="meeting-row"><label>Meeting booked?</label><div class="toggle-wrap"><button class="toggle-btn off" id="mtg-yes" onclick="setMtg(true)">Yes</button><button class="toggle-btn on" id="mtg-no" onclick="setMtg(false)">No</button></div></div><div id="mtg-date" style="display:none"><div class="fg"><label>Meeting date</label><input type="date" id="mtg-d"/></div></div></div><div class="fg"><label>Details <span style="color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label><textarea id="call-det" placeholder="Who you spoke with, what was discussed\u2026"></textarea></div><div class="modal-actions"><button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button><button class="btn-save" onclick="saveLog('${cid}')">Save call</button></div></div></div>`);}
function selOut(o){logOut=o;['pastor','noanswer1','noanswer2','voicemail','secretary','note'].forEach(k=>{const el=document.getElementById('op-'+k);if(el)el.classList.toggle('selected',k===o);});const ms=document.getElementById('mtg-sec');if(ms)ms.style.display=(o==='pastor'||o==='secretary')?'block':'none';if(o!=='pastor'&&o!=='secretary')logMtg=false;}
function setMtg(v){logMtg=v;const y=document.getElementById('mtg-yes');if(y)y.className='toggle-btn '+(v?'on':'off');const n=document.getElementById('mtg-no');if(n)n.className='toggle-btn '+(v?'off':'on');const d=document.getElementById('mtg-date');if(d)d.style.display=v?'block':'none';}
function saveLog(cid){if(!logOut){alert('Please select an outcome.');return;}const c=contacts.find(x=>x.id===cid);if(!c)return;if(!c.calls)c.calls=[];const md=(document.getElementById('mtg-d')||{}).value||'';const newCall={id:uid(),date:fmtDate(new Date()),outcome:logOut,meetingBooked:logMtg,meetingDate:md.trim(),details:(document.getElementById('call-det').value||'').trim()};c.calls.push(newCall);save();saveCallEntry(cid,newCall);closeMKeepCard();renderCallingCard();renderList();}
function delCall(cid,xid){const c=contacts.find(x=>x.id===cid);if(!c)return;c.calls=(c.calls||[]).filter(x=>x.id!==xid);save();deleteCallEntry(xid);renderCallingCard();renderList();}
function completeReminder(cid,xid){const c=contacts.find(x=>x.id===cid);if(!c)return;const call=c.calls.find(x=>x.id===xid);if(!call)return;call.outcome='note';call.completed=true;save();saveCallEntry(cid,call);renderCallingCard();renderList();}

function openReminderModal(cid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)"><div class="modal-box" onclick="event.stopPropagation()"><h2 style="display:flex;align-items:center;gap:8px;">${ICONS.bell} Set Reminder</h2><div class="modal-sub">${esc(c.pastor||c.church||'this contact')}</div><div class="fg"><label>Type</label><div style="display:flex;gap:8px;"><button id="rtype-call" class="toggle-btn on" onclick="setRType('call')" style="flex:1;">\ud83d\udcde Call</button><button id="rtype-email" class="toggle-btn off" onclick="setRType('email')" style="flex:1;">\u2709\ufe0f Email</button><button id="rtype-other" class="toggle-btn off" onclick="setRType('other')" style="flex:1;">\ud83d\udccb Other</button></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;"><div class="fg" style="margin-bottom:0"><label>Date</label><input type="date" id="rem-date"/></div><div class="fg" style="margin-bottom:0"><label>Time</label><input type="time" id="rem-time"/></div></div><div class="fg"><label>Details <span style="color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label><textarea id="rem-note" placeholder="What do you need to do?" style="height:70px"></textarea></div><div class="modal-actions"><button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button><button class="btn-save" onclick="saveReminder('${cid}')">Save reminder</button></div></div></div>`);
  setTimeout(()=>{window._remType='call';},50);
}
function setRType(t){window._remType=t;['call','email','other'].forEach(k=>{const el=document.getElementById('rtype-'+k);if(el)el.className='toggle-btn '+(k===t?'on':'off');});}

function saveReminder(cid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  const d=document.getElementById('rem-date').value;
  const t=document.getElementById('rem-time').value||'';
  const note=(document.getElementById('rem-note').value||'').trim();
  const rtype=window._remType||'call';
  if(!d){alert('Please pick a date.');return;}
  // ── FIX: parse date parts directly, no UTC shift ──
  const dateLabel=fmtRemDate(d,t);
  const typeLabel=rtype==='call'?'Call':rtype==='email'?'Email':'Other';
  const details=`${typeLabel} reminder \u00b7 ${dateLabel}${note?'\n'+note:''}`;
  if(!c.calls)c.calls=[];
  const remCall={id:uid(),date:fmtDate(new Date()),outcome:'reminder',meetingBooked:false,meetingDate:'',details,remDate:d,remTime:t,remType:rtype};
  c.calls.push(remCall);
  save();saveCallEntry(cid,remCall);closeMKeepCard();renderCallingCard();renderList();
}

function openCalendarModal(cid){const c=contacts.find(x=>x.id===cid);if(!c)return;showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)"><div class="modal-box" onclick="event.stopPropagation()"><h2 style="display:flex;align-items:center;gap:8px;">${ICONS.calendar} Add to Calendar</h2><div class="modal-sub">Pick a date and we'll open Google Calendar with the event pre-filled.</div><div class="fg"><label>Meeting date</label><input type="date" id="cal-date"/></div><div class="fg"><label>Meeting time <span style="color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label><input type="time" id="cal-time"/></div><button class="cal-open-btn" onclick="openGCal('${cid}')">${ICONS.calendar} Open Google Calendar</button><div class="modal-actions" style="margin-top:10px"><button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button></div></div></div>`);}
function openGCal(cid){const c=contacts.find(x=>x.id===cid);if(!c)return;const d=document.getElementById('cal-date').value;const t=document.getElementById('cal-time').value;if(!d){alert('Please pick a date.');return;}const title=encodeURIComponent(`${c.city||''} ${c.state?', '+c.state:''} | ${c.pastor||'Pastor'} | ${c.church||''}`).replace(/%20/g,'+');const loc=encodeURIComponent([c.address,c.city,c.state].filter(Boolean).join(', '));const details=encodeURIComponent(`Pastor: ${c.pastor||''}\nChurch: ${c.church||''}\nPhone: ${c.phone||''}\nEmail: ${c.email||''}`);let dates='';if(t){const s=d.replace(/-/g,'')+'T'+t.replace(':','')+'00';const eh=String(Number(t.split(':')[0])+1).padStart(2,'0');const e=d.replace(/-/g,'')+'T'+eh+t.split(':')[1]+'00';dates=`${s}/${e}`;}else{const day=d.replace(/-/g,'');dates=`${day}/${day}`;}window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&location=${loc}&details=${details}`,'_blank');if(!c.calls)c.calls=[];const [y,m,dy]=d.split('-').map(Number);const months=['January','February','March','April','May','June','July','August','September','October','November','December'];const lbl=`${months[m-1]} ${dy}, ${y}`;const calCall={id:uid(),date:fmtDate(new Date()),outcome:'pastor',meetingBooked:true,meetingDate:lbl,details:`Meeting scheduled for ${lbl}`};c.calls.push(calCall);save();saveCallEntry(cid,calCall);closeMKeepCard();renderCallingCard();renderList();}

function openContactModal(id){const c=id?contacts.find(x=>x.id===id):null;const v=f=>c?(c[f]||''):'';showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)"><div class="modal-box" onclick="event.stopPropagation()"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;"><h2 style="margin-bottom:0">${c?'Edit contact':'New contact'}</h2>${id?`<button onclick="deleteContact('${id}')" style="background:#3a0a0a;border:1px solid #5a1a1a;border-radius:6px;padding:6px 8px;cursor:pointer;color:#e05555;display:flex;align-items:center;">${ICONS.trash}</button>`:''}</div><div class="form-row"><div class="fgi"><label>Pastor name</label><input id="fp" value="${esc(v('pastor'))}" placeholder="First Last"/></div><div class="fgi"><label>Church</label><input id="fc" value="${esc(v('church'))}" placeholder="Church name"/></div></div><div class="form-row"><div class="fgi"><label>City</label><input id="fci" value="${esc(v('city'))}" placeholder="City"/></div><div class="fgi"><label>State</label>${stateDropdown('fst',v('state')||'IL')}</div></div><div class="form-row"><div class="fgi full"><label>Phone Numbers <span style="color:var(--muted);font-weight:400;font-style:italic;text-transform:none;letter-spacing:0">(up to 4)</span></label>${(()=>{const phones=splitField(v('phone'));while(phones.length<4)phones.push('');return phones.slice(0,4).map((p,i)=>`<input id="fph${i}" value="${esc(p)}" placeholder="${i===0?'Primary number':'Additional number'}" style="margin-bottom:${i<3?'6px':'0'};"/>`).join('');})()}</div></div><div class="form-row"><div class="fgi full"><label>Address</label><input id="fa" value="${esc(v('address'))}" placeholder="Street address"/></div></div><div class="form-row"><div class="fgi full"><label>Email Addresses <span style="color:var(--muted);font-weight:400;font-style:italic;text-transform:none;letter-spacing:0">(up to 4)</span></label>${(()=>{const emails=splitField(v('email'));while(emails.length<4)emails.push('');return emails.slice(0,4).map((e,i)=>`<input id="fe${i}" type="email" value="${esc(e)}" placeholder="${i===0?'Primary email':'Additional email'}" style="margin-bottom:${i<3?'6px':'0'};"/>`).join('');})()}</div></div><div class="modal-actions"><button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button><button class="btn-save" onclick="saveCM('${id||''}')">Save</button></div></div></div>`);}
function saveCM(id){const ch=(document.getElementById('fc')||{}).value||'';const pa=(document.getElementById('fp')||{}).value||'';if(!ch.trim()&&!pa.trim()){alert('Church or pastor name required.');return;}const phones=[0,1,2,3].map(i=>(document.getElementById('fph'+i)||{}).value?.trim()||'').filter(Boolean).join(', ');const emails=[0,1,2,3].map(i=>(document.getElementById('fe'+i)||{}).value?.trim()||'').filter(Boolean).join(', ');const d={pastor:pa.trim(),church:ch.trim(),city:(document.getElementById('fci')||{}).value?.trim()||'',state:((document.getElementById('fst')||{}).value||'').trim().toUpperCase(),phone:phones,address:(document.getElementById('fa')||{}).value?.trim()||'',email:emails};let savedContact;if(id){const c=contacts.find(x=>x.id===id);Object.assign(c,d);savedContact=c;}else{savedContact={id:uid(),calls:[],notes:[],photo:'',...d};contacts.push(savedContact);}save();saveContact(savedContact);closeMKeepCard();renderFilters();renderList();if(id)renderCallingCard();}
function deleteContact(id){if(!confirm('Delete this contact? This cannot be undone.'))return;contacts=contacts.filter(c=>c.id!==id);save();deleteContactEntry(id);closeMKeepCard();closeCard();renderFilters();renderList();}
function showM(h){const l=document.getElementById('modal-layer');l.innerHTML=h;l.style.pointerEvents='all';}
function closeMKeepCard(e){if(e&&e.target!==e.currentTarget)return;logOut=null;logMtg=false;const l=document.getElementById('modal-layer');l.innerHTML='';l.style.pointerEvents='none';}

load().then(()=>{renderFilters();renderList();});
window.addEventListener('resize',renderList);
</script>
</body>
</html>
