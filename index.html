<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Relay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
  --text:#e8e6e1;--muted:#6b6860;--accent:#F3B53A;--accent-light:#1a1500;
  --danger:#e05555;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --radius:12px;--radius-sm:8px;
}
html,body{height:100%;margin:0;padding:0;background:#0f0f0f;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;overflow:hidden;}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:100px;}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);width:14px;height:14px;pointer-events:none;}
#search{width:100%;padding:9px 10px 9px 30px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--surface2);color:var(--text);font-family:var(--sans);}
#search:focus{outline:none;border-color:#F3B53A;}
.filter-row{display:flex;gap:5px;overflow-x:auto;width:100%;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-pill{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;cursor:pointer;font-family:var(--sans);color:var(--muted);white-space:nowrap;flex-shrink:0;}
.filter-pill.active{background:#000C1F;color:#F3B53A;border-color:#F3B53A;}
.top-bar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.count-badge{font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;color:var(--muted);white-space:nowrap;}
.add-btn{padding:8px 14px;background:#F3B53A;color:#000C1F;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.list-header{display:grid;grid-template-columns:44px 1fr 48px 48px;padding:0 14px;height:34px;align-items:center;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;}
.list-header-cell{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:500;padding:0 4px;}
.main-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:60px;}
.main-list::-webkit-scrollbar{width:3px;}
.main-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.contact-row{display:grid;grid-template-columns:44px 1fr 48px 48px;padding:0 14px;min-height:64px;align-items:center;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.contact-row:active{background:var(--surface);}
.row-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.row-cell{padding:6px 4px;min-width:0;}
.row-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.row-loc{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.status-pill{display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;letter-spacing:.04em;padding:3px 6px;border-radius:20px;text-transform:uppercase;}
.pill-pastor{background:#1a3a28;color:#4cd68a;}
.pill-voicemail{background:#1e2244;color:#8899ee;}
.pill-secretary{background:#2a1f35;color:#c9a0f0;}
.pill-reminder{background:#2e1f00;color:#f0b429;}
.pill-none{background:var(--surface2);color:var(--muted);}
.pill-noanswer1{background:#2a2a2a;color:#e8e6e1;border:1.5px solid #666;font-size:9px;padding:3px 7px;border-radius:20px;font-weight:700;letter-spacing:.04em;}
.pill-noanswer2{background:transparent;color:#b0aea9;border:1.5px solid #6b6860;font-size:9px;padding:3px 7px;border-radius:20px;font-weight:700;letter-spacing:.04em;}
.row-pill-cell{display:flex;align-items:center;justify-content:center;}
.row-actions{display:flex;align-items:center;justify-content:flex-end;}
.log-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;cursor:pointer;border:1px solid #F3B53A44;background:none;color:#F3B53A;}
.log-btn svg{width:16px;height:16px;}
.log-btn:active{background:#1e2244;}
.reminder-dot{width:7px;height:7px;border-radius:50%;background:#f0b429;display:inline-block;margin-left:5px;vertical-align:middle;}
.empty-state{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:14px;}
.proximity-screen{position:absolute;inset:0;z-index:100;background:var(--bg);flex-direction:column;overflow:hidden;display:none;}
.proximity-screen.visible{display:flex;animation:slideInRight .22s cubic-bezier(0.25,0.46,0.45,0.94);}
.proximity-screen.slide-out{animation:slideOutRight .2s cubic-bezier(0.55,0,1,0.45);}
.prox-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.fullscreen-card{position:absolute;inset:0;z-index:100;background:var(--bg);flex-direction:column;overflow:hidden;display:none;}
.fullscreen-card.slide-in{animation:slideInRight .22s cubic-bezier(0.25,0.46,0.45,0.94);}
.fullscreen-card.slide-out{animation:slideOutRight .2s cubic-bezier(0.55,0,1,0.45);}
.fullscreen-card.visible{display:flex;}
.card-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.card-back-btn{background:none;border:1px solid var(--border);border-radius:50%;width:36px;height:36px;font-family:var(--sans);font-size:16px;font-weight:500;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.card-topbar-center{flex:1;text-align:center;}
.card-progress-label{font-size:11px;color:var(--muted);}
.card-progress-bar-wrap{width:80px;height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin:5px auto 0;}
.card-progress-bar-fill{height:100%;background:#F3B53A;border-radius:3px;transition:width .3s;}
.card-edit-btn{background:none;border:1px solid var(--border);border-radius:50%;width:36px;height:36px;font-family:var(--sans);font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.card-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.card-body::-webkit-scrollbar{width:3px;}
.card-body::-webkit-scrollbar-thumb{background:var(--border);}
.card-hero{padding:20px 20px 16px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);}
.card-hero-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;flex-shrink:0;}
.card-hero-name{font-family:var(--serif);font-size:26px;line-height:1.1;margin-bottom:3px;}
.card-hero-church{font-size:13px;color:var(--muted);margin-bottom:5px;}
.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;}
.card-action-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px 8px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:var(--sans);cursor:pointer;color:var(--text);min-height:72px;}
.card-action-btn:active{transform:scale(.97);}
.btn-icon{line-height:1;display:flex;align-items:center;justify-content:center;width:24px;height:24px;}
.btn-icon svg{width:22px;height:22px;}
.btn-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
.card-action-btn.green{border-color:#4a9e6b44;background:#1a2e2244;}
.card-action-btn.green:active{background:var(--accent-light);border-color:var(--accent);}
.card-action-btn.blue{border-color:#6b7fd444;background:#1e224422;}
.card-action-btn.blue:active{background:#1e2244;border-color:#8899ee;}
.card-action-btn.yellow{border-color:#f0b42944;background:#2e1f0022;}
.card-action-btn.yellow:active{background:#2e1f00;border-color:#f0b429;}
.card-action-btn.teal{border-color:#2a7a8a44;background:#0e222622;}
.card-action-btn.teal:active{background:#0e2226;border-color:#4ac4d4;}
.contact-submenu{display:none;flex-direction:column;gap:8px;padding:0 16px 16px;opacity:0;}
.contact-submenu.open{display:flex;animation:fadeInUp .2s ease forwards;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.contact-sub-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;color:var(--text);text-decoration:none;}
.contact-sub-btn:active{transform:scale(.98);}
.call-sub{border-color:#4a9e6b44;color:#4cd68a;}
.text-sub{border-color:#6b7fd444;color:#8899ee;}
.email-sub{border-color:#d4b06b44;color:#d4b06b;}
.card-history{padding:16px;}
.history-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px;font-weight:500;}
.call-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;position:relative;}
.call-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px;padding-right:28px;}
.outcome-badge{font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;}
.outcome-pastor{background:#1a3a28;color:#4cd68a;}
.outcome-voicemail{background:#1e2244;color:#8899ee;}
.outcome-secretary{background:#2a1f35;color:#c9a0f0;}
.outcome-noanswer1{background:#1e1e1e;color:#e8e6e1;border:1px solid #555;}
.outcome-noanswer2{background:#e8e6e1;color:#1e1e1e;}
.outcome-imported{background:var(--surface2);color:var(--muted);}
.outcome-reminder{background:#2e1f00;color:#f0b429;}
.outcome-note{background:var(--surface2);color:var(--muted);}
.call-date{font-size:10px;color:var(--muted);margin-left:auto;}
.call-details-text{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;margin-top:5px;}
.call-del{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:4px 6px;border-radius:4px;line-height:1;}
.call-del:hover{color:var(--danger);}
.no-calls{font-size:13px;color:var(--muted);font-style:italic;}
.card-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom));}
.nav-btn{display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);font-family:var(--sans);font-size:18px;font-weight:600;cursor:pointer;color:var(--text);}
.nav-btn:active:not(:disabled){background:var(--surface);}
.nav-btn:disabled{opacity:.25;cursor:default;}
.nav-btn.next{background:#F3B53A;border-color:#F3B53A;color:#000C1F;}
.nav-btn.next:active:not(:disabled){opacity:.85;}
.nav-center{font-size:11px;color:var(--muted);text-align:center;flex:1;padding:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0;animation:fadeInBg .2s ease;}
.modal-box{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;border:1px solid var(--border);animation:slideUp .28s cubic-bezier(0.34,1.4,0.64,1);padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));box-sizing:border-box;overflow-x:hidden;}
.modal-box h2{font-family:var(--serif);font-size:22px;margin-bottom:5px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:18px;}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.fg label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:500;}
.fg input,.fg textarea,.fg select{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:16px;background:var(--bg);color:var(--text);width:100%;}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--accent);}
.fg textarea{resize:vertical;height:80px;}
.outcome-opts{display:flex;flex-direction:column;gap:8px;}
.outcome-opt{border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);background:var(--surface2);font-family:var(--sans);text-align:left;display:flex;align-items:center;gap:12px;}
.outcome-opt:active{transform:scale(.99);}
.outcome-opt.selected{border-color:#F3B53A;background:#1a1500;color:#F3B53A;}
.opt-icon{font-size:20px;}
.meeting-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:14px;}
.meeting-row label{font-size:14px;flex:1;}
.toggle-wrap{display:flex;gap:6px;}
.toggle-btn{padding:7px 16px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-family:var(--sans);cursor:pointer;background:none;color:var(--muted);}
.toggle-btn.on{background:#F3B53A;border-color:#F3B53A;color:#000C1F;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:10px;}
.btn-cancel{padding:12px 20px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;cursor:pointer;color:var(--text);flex:1;}
.btn-save{padding:12px 20px;background:#F3B53A;color:#000C1F;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;flex:2;}
.cal-open-btn{width:100%;padding:14px;background:#1a73e8;color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.fgi{display:flex;flex-direction:column;gap:5px;}
.fgi.full{grid-column:1/-1;}
.fgi label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:500;}
.fgi input,.fgi select{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:16px;background:var(--bg);color:var(--text);width:100%;min-width:0;}
.fgi input:focus,.fgi select:focus{outline:none;border-color:var(--accent);}
.fgi select option{background:var(--surface);}
.bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding-bottom:max(0px,env(safe-area-inset-bottom));position:fixed;bottom:0;left:0;right:0;z-index:60;}
.bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;background:none;border:none;cursor:pointer;font-family:var(--sans);color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;transition:color .15s;}
.bottom-nav-btn.active{color:#F3B53A;}
.bottom-nav-btn svg{width:20px;height:20px;}
.tides-screen{position:absolute;top:0;left:0;right:0;bottom:0;z-index:50;background:var(--bg);flex-direction:column;overflow:hidden;display:none;}
.wing-fade{position:fixed;inset:0;background:#000;z-index:55;opacity:0;pointer-events:none;transition:opacity .15s ease;}
.wing-fade.show{opacity:1;pointer-events:all;}
.tides-screen.visible{display:flex;}
.tides-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:60px;}
.tides-list::-webkit-scrollbar{width:3px;}
.tides-list::-webkit-scrollbar-thumb{background:var(--border);}
.tide-entry{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s;}
.tide-entry:active{background:var(--surface);}
.tide-entry.overdue{border-left:3px solid #e05555;}
.tide-entry.upcoming{border-left:3px solid #f0b429;}
.tide-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.tide-content{flex:1;min-width:0;}
.tide-pastor{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tide-church{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tide-details{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tide-due{font-size:11px;font-weight:600;}
.tide-due.overdue{color:#e05555;}
.tide-due.upcoming{color:#f0b429;}
.tide-due.today{color:#4cd68a;}
.tide-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.tide-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.tide-btn:active{background:var(--surface2);}
.tide-btn.complete{border-color:#f0b42944;color:#f0b429;}
.tide-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--muted);}
.tide-entry-wrap{position:relative;overflow:hidden;}
.tide-swipe-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:#2a6b3a;display:flex;align-items:center;justify-content:center;color:#4cd68a;font-size:11px;font-weight:600;gap:4px;transform:translateX(100%);transition:transform .2s;}
.snooze-modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));border:1px solid var(--border);}
@media(min-width:600px){
  .top-bar{flex-wrap:nowrap;padding:8px 20px;}
  .list-header{grid-template-columns:44px 1.5fr 1fr 60px 48px;}
  .contact-row{grid-template-columns:44px 1.5fr 1fr 60px 48px;min-height:52px;}
  .card-hero-name{font-size:30px;}
  .card-actions{grid-template-columns:repeat(4,1fr);}
  .contact-submenu.open{flex-direction:row;}
  .modal-backdrop{align-items:center;padding:20px;}
  .modal-box{border-radius:16px;max-height:85vh;}
  .outcome-opts{display:grid;grid-template-columns:1fr 1fr 1fr;}
}
@keyframes fadeInBg{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOutBg{from{opacity:1}to{opacity:0}}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOutRight{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
.manifest-list-row{transition:background .12s;}
.manifest-list-row:active{background:rgba(243,181,58,.06);}
#manifest-card-screen.visible{animation:slideInRight .22s cubic-bezier(0.25,0.46,0.45,0.94);}
#manifest-card-screen.slide-out{animation:slideOutRight .2s cubic-bezier(0.55,0,1,0.45);}
@keyframes expandDown{0%{opacity:0;transform:translateY(-4px)}100%{opacity:1;transform:translateY(0)}}
@keyframes collapseUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-4px)}}
@keyframes slideDownOut{from{transform:translateY(0);opacity:1}to{transform:translateY(30px);opacity:0}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.contact-row{transition:background .12s;}
.contact-row:active{background:rgba(243,181,58,.06);}
.tide-entry:active{background:rgba(255,255,255,.03);}
</style>
</head>
<body>

function fmtRemDate(remDate,remTime){
  const parts2=parseRemDate(remDate);
  if(!parts2)return '';
  const [y,m,d]=parts2;
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let str=`${months[m-1]} ${d}`;
  if(remTime){
    const [hh,mm]=remTime.split(':').map(Number);
    const ampm=hh>=12?'PM':'AM';
    const h12=hh%12||12;
    str+=` at ${h12}:${String(mm).padStart(2,'0')} ${ampm}`;
  }
  return str;
}

function getReminders(){
  const now=new Date();const result=[];
  contacts.forEach(c=>{
    const rems=(c.calls||[]).filter(x=>x.outcome==='reminder');if(!rems.length)return;
    const sorted=rems.slice().sort((a,b)=>{
      const da=a.remDate?new Date(a.remDate+'T'+(a.remTime||'12:00')+':00'):new Date(0);
      const db=b.remDate?new Date(b.remDate+'T'+(b.remTime||'12:00')+':00'):new Date(0);
      return da-db;
    });
    const soonest=sorted[0];
    const due=soonest.remDate?new Date(soonest.remDate+'T'+(soonest.remTime||'12:00')+':00'):null;
    result.push({contact:c,reminder:soonest,due,overdue:due&&due<now});
  });
  result.sort((a,b)=>{if(a.overdue&&!b.overdue)return -1;if(!a.overdue&&b.overdue)return 1;if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;return a.due-b.due;});
  return result;
}

function fuzzyMatch(str, q) {
  if (!q) return true;
  str = (str||'').toLowerCase();
  q = q.toLowerCase();
  if (str.includes(q)) return true;
  // Check if all chars of q appear in order in str
  let si = 0;
  for (let i = 0; i < q.length; i++) {
    si = str.indexOf(q[i], si);
    if (si === -1) return false;
    si++;
  }
  return true;
}

function contactMatchesQuery(c, q) {
  if (!q) return true;
  return fuzzyMatch(c.pastor, q) || fuzzyMatch(c.church, q) || 
         fuzzyMatch(c.city, q) || fuzzyMatch(c.phone, q) || fuzzyMatch(c.state, q);
}

  let f=contacts.filter(c=>{const ms=fState==='All'||(fState==='Starred'?c.starred:(c.state||'').toUpperCase()===fState);const mq=!q||contactMatchesQuery(c,q);const mp=!filterHasPhone||splitField(c.phone).length>0;return ms&&mq&&mp;});

}

// ── SWIPE TO COMPLETE ──
function initTidesSwipe() {
  document.querySelectorAll('.tide-entry[data-cid]').forEach(el => {
    let startX = 0, startY = 0, dx = 0, swiping = false;
    const cid = el.dataset.cid;
    const xid = el.dataset.xid;
    const bg = document.getElementById('swipebg-' + xid);

    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      dx = 0; swiping = false;
    }, {passive:true});

    el.addEventListener('touchmove', e => {
      dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (!swiping && Math.abs(dy) > Math.abs(dx)) return;
      swiping = true;
      if (dx < 0) {
        el.style.transform = `translateX(${dx}px)`;
        if (bg) bg.style.transform = `translateX(${Math.max(dx + 80, 0)}px)`;
        e.preventDefault();
      }
    }, {passive:false});

    el.addEventListener('touchend', () => {
      if (dx < -60) {
        el.style.transform = 'translateX(-100%)';
        el.style.transition = 'transform .25s';
        setTimeout(() => completeTideReminder(cid, xid), 250);
      } else {
        el.style.transform = '';
        if (bg) bg.style.transform = '';
      }
      swiping = false;
    });
  });
}

// ── TIDES BADGE ──
function updateTidesBadge() {
  const now = new Date();
  const todayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  let count = 0;
  contacts.forEach(c => {
    (c.calls || []).forEach(call => {
      if (call.outcome !== 'reminder' || call.completed) return;
      const parts = parseRemDate(call.remDate);
      if (!parts) return;
      const due = new Date(parts[0], parts[1]-1, parts[2], 23, 59, 59);
      if (due < todayEnd) count++;
    });
  });
  const badge = document.getElementById('tides-badge');
  if (!badge) return;
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

  const fade = document.getElementById('wing-fade');

  setTimeout(() => {
    currentWing = wing;
    const tidesScreen = document.getElementById('tides-screen');
    const manifestScreen = document.getElementById('manifest-screen');
    const voyageEls = ['state-filter-row','list-header','main-list','proximity-screen'];

    document.querySelectorAll('.bottom-nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-' + wing)?.classList.add('active');

    // Always close any open calling card cleanly without animation
    const card = document.getElementById('fullscreen-card');
    if (card) { card.classList.remove('visible','slide-out','slide-in'); card.innerHTML=''; contactMenuOpen=false; }

    // Always close manifest card screen too
    const manifestCardScreen = document.getElementById('manifest-card-screen');
    if (manifestCardScreen) { manifestCardScreen.classList.remove('visible','slide-out'); }
    window._currentManifestId = null;

    // Hide all
    tidesScreen.classList.remove('visible');
    manifestScreen.classList.remove('visible');
    voyageEls.forEach(id => { const el = document.getElementById(id); if(el) el.style.display = 'none'; });

    if (wing === 'tides') {
      tidesScreen.classList.add('visible');
      renderTides();
    } else if (wing === 'manifest') {
      manifestScreen.classList.add('visible');
      renderManifest();
      // If no data yet, kick off a fresh load
      if (manifestContacts.length === 0) { loadManifest(); loadVisits(); }
    } else {
      voyageEls.forEach(id => { const el = document.getElementById(id); if(el) el.style.display = ''; });
      renderList();
    }

    setTimeout(() => { fade.classList.remove('show'); }, 20);
  }, 150);
}

// ── TIDES WING ──
function fmtCallDate(d) {
  if (!d) return '';
  const s = String(d).trim();
  if (s.includes('T')) {
    const parts = s.split('T')[0].split('-').map(Number);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parts[1]-1] + ' ' + parts[2] + ', ' + parts[0];
  }
  if (s.match(/^\d{4}-\d{2}-\d{2}$/)) {
    const parts = s.split('-').map(Number);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parts[1]-1] + ' ' + parts[2] + ', ' + parts[0];
  }
  return s;
}

function parseRemDate(remDate) {
  if (!remDate || !String(remDate).trim()) return null;
  const s = String(remDate).trim();
  // ISO timestamp: 2026-05-23T05:00:00.000Z
  if (s.includes('T')) return s.split('T')[0].split('-').map(Number); // [y,m,d]
  // YYYY-MM-DD
  if (s.match(/^\d{4}-\d{2}-\d{2}$/)) return s.split('-').map(Number);
  // M/D/YYYY or MM/DD/YYYY (from getDisplayValues)
  if (s.includes('/')) {
    const parts = s.split('/').map(Number);
    if (parts.length === 3) return [parts[2], parts[0], parts[1]]; // [y,m,d]
  }
  return null;
}

function fmtDueLabel(remDate, remTime) {
  const parts = parseRemDate(remDate);
  if (!parts) return { label: 'No date set', cls: 'upcoming' };
  const [y, m, d] = parts;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const due = new Date(y, m - 1, d);
  const diff = Math.round((due - today) / (1000 * 60 * 60 * 24));

  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let dateStr = `${months[m-1]} ${d}`;
  if (remTime) {
    const [hh, mm] = remTime.split(':').map(Number);
    const ampm = hh >= 12 ? 'PM' : 'AM';
    const h12 = hh % 12 || 12;
    dateStr += ` at ${h12}:${String(mm).padStart(2,'0')} ${ampm}`;
  }

  if (diff < 0) return { label: `Overdue · ${dateStr}`, cls: 'overdue' };
  if (diff === 0) return { label: `Today · ${dateStr}`, cls: 'today' };
  if (diff === 1) return { label: `Tomorrow · ${dateStr}`, cls: 'upcoming' };
  return { label: dateStr, cls: 'upcoming' };
}

function renderTides() {
  const list = document.getElementById('tides-list');
  if (!list) return;

  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const todayEnd = new Date(todayStart.getTime() + 86400000);

  // Gather all active (non-completed) reminders
  const allItems = [];
  contacts.forEach(c => {
    (c.calls || []).forEach(call => {
      if (call.outcome !== 'reminder') return;
      if (call.completed) return;
      const rdParts = parseRemDate(call.remDate); const due = rdParts ? new Date(rdParts[0], rdParts[1]-1, rdParts[2], 12, 0, 0) : null;
      allItems.push({ contact: c, call, due });
    });
  });

  // Gather completed reminders for history
  // Supports both old format (outcome=reminder,completed=true) and new (outcome=note,completed=true)
  const completedItems = [];
  contacts.forEach(c => {
    (c.calls || []).forEach(call => {
      if (!call.completed) return;
      if (call.outcome !== 'note' && call.outcome !== 'reminder') return;
      completedItems.push({ contact: c, call });
    });
  });
  completedItems.sort((a,b) => (b.call.date||'').localeCompare(a.call.date||''));

  if (!allItems.length) {
    let emptyHtml = `<div class="tide-empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12c1.5-3 3.5-4 6-4s4.5 1 6 4 3.5 4 6 4"/><path d="M2 18c1.5-3 3.5-4 6-4s4.5 1 6 4 3.5 4 6 4"/></svg><div style="font-size:14px">No active reminders</div><div style="font-size:12px;color:var(--muted)">All clear — smooth sailing</div></div>`;
    if (completedItems.length) emptyHtml += renderCompletedSection(completedItems);
    list.innerHTML = emptyHtml;
    return;
  }

  // Split into due today/overdue vs upcoming
  const dueToday = allItems.filter(i => !i.due || i.due < todayEnd);
  const upcoming = allItems.filter(i => i.due && i.due >= todayEnd);

  // Sort each group
  const sortMode = document.getElementById('tides-sort')?.value || 'date';
  const regionOrder = {'Northeast':1,'North':2,'Central East':3,'Central':4,'Central West':5,'East':6,'West':7,'South':8,'Southeast':9,'Southwest':10,'Northwest':11,'NonCon':12};
  const sortItems = (items) => items.sort((a, b) => {
    if (sortMode === 'region') {
      const ra = regionOrder[a.contact.region] || 99;
      const rb = regionOrder[b.contact.region] || 99;
      if (ra !== rb) return ra - rb;
    }
    if (!a.due && !b.due) return 0;
    if (!a.due) return 1;
    if (!b.due) return -1;
    return a.due - b.due;
  });
  sortItems(dueToday);
  sortItems(upcoming);

  function renderItem({ contact: c, call }) {
    const rc = getRegionColor(c);
    const { label, cls } = fmtDueLabel(call.remDate, call.remTime);
    const isOverdue = cls === 'overdue';
    const detailLine = call.details ? call.details.split('\n').slice(1).join(' ').trim() : '';
    const churchCity = [c.church, c.city && c.state ? c.city+', '+c.state : c.city].filter(Boolean).join(' · ');
    return `<div class="tide-entry-wrap" id="wrap-${call.id}"><div class="tide-swipe-bg" id="swipebg-${call.id}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Done</div><div class="tide-entry ${isOverdue ? 'overdue' : 'upcoming'}" onclick="openTideDetail('${c.id}','${call.id}')" data-cid="${c.id}" data-xid="${call.id}">
      <div class="tide-avatar" style="background:${rc.bg};color:${rc.text};border:1.5px solid ${rc.border}">${ini(c.pastor || c.church || '?')}</div>
      <div class="tide-content" style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;">
          <div style="flex:1;min-width:0;">
            <div class="tide-pastor">${esc(c.pastor || '—')}</div>
            <div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(churchCity)}</div>
            ${detailLine ? `<div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;">${esc(detailLine)}</div>` : ''}
            <div class="tide-due ${cls}" style="margin-top:2px;">${label}</div>
          </div>
          <div onclick="event.stopPropagation()" style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
            <button class="tide-btn" onclick="openCallingCardFromTides('${c.id}')" title="Go to contact" style="border-color:#5b9fd444;color:#5b9fd4;width:26px;height:26px;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
            <button class="tide-btn complete" onclick="completeTideReminder('${c.id}','${call.id}')" title="Mark done" style="width:26px;height:26px;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div></div>`;
  }

  let html = '';

  if (dueToday.length) {
    html += `<div style="padding:10px 16px 6px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:500;">Due Today</span>
      <span style="background:#e05555;color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:1px 7px;">${dueToday.length}</span>
    </div>`;
    html += dueToday.map(renderItem).join('');
  }

  if (upcoming.length) {
    html += `<div style="padding:14px 16px 6px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:500;">Upcoming</span>
      <span style="background:#2e1f00;color:#f0b429;font-size:10px;font-weight:700;border-radius:20px;padding:1px 7px;">${upcoming.length}</span>
    </div>`;
    html += upcoming.map(renderItem).join('');
  }

  if (completedItems.length) html += renderCompletedSection(completedItems);
  list.innerHTML = html;
  setTimeout(initTidesSwipe, 50);
  reInitScrollHaptics();
}

function renderCompletedSection(items) {
  const shown = items.slice(0, 10);
  const rows = shown.map(({contact: c, call}) => {
    const rc = getRegionColor(c);
    const dateLabel = call.date ? fmtCallDate(call.date) : '';
    return `<div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">
      <div class="tide-avatar" style="width:28px;height:28px;font-size:10px;background:${rc.bg};color:${rc.text};border:1px solid ${rc.border};border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0.5;">${ini(c.pastor||c.church||'?')}</div>
      <div style="flex:1;min-width:0;opacity:0.5;">
        <div style="font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.pastor||'—')}</div>
        <div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.church||'')}${c.city?' · '+esc(c.city):''}${dateLabel?' · '+dateLabel:''}</div>

    </div>`;
  }).join('');
  return `<div style="padding:14px 16px 6px;display:flex;align-items:center;gap:8px;">
    <span style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:500;">Completed</span>
    <span style="background:var(--surface);color:var(--muted);font-size:10px;font-weight:600;border-radius:20px;padding:1px 7px;border:1px solid var(--border);">${items.length}</span>
  </div>${rows}`;
}

  const existingNote = (call.details || '').split('\n').slice(1).join('\n').trim();

    const parts = parseRemDate(call.remDate);

  const otherIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`;

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">

        <button onclick="closeMKeepCard();completeTideReminder('${cid}','${xid}')" style="flex:1;padding:11px;background:#2e1f00;border:1px solid #f0b42944;border-radius:var(--radius-sm);font-family:var(--sans);font-size:12px;font-weight:600;color:#f0b429;cursor:pointer;">Done</button>
      </div>

function setTideDetailType(t) {
  window._remType = t;
  ['call','email','other'].forEach(type => {
    const btn = document.getElementById('td-' + type);
    if (!btn) return;
    const active = type === t;
    btn.style.borderColor = active ? '#F3B53A' : 'var(--border)';
    btn.style.background  = active ? '#2e1f00' : 'var(--surface2)';
    btn.style.color       = active ? '#F3B53A' : 'var(--muted)';
  });
}

function saveTideDetail() {
  const cid = window._editRemCid;
  const xid = window._editRemXid;
  const c = contacts.find(x => x.id === cid); if (!c) return;
  const call = c.calls.find(x => x.id === xid); if (!call) return;

  const d = document.getElementById('td-date')?.value;
  const t = document.getElementById('td-time')?.value || '';
  const note = (document.getElementById('td-note')?.value || '').trim();
  const rtype = window._remType || 'call';

  if (!d) { alert('Please pick a date.'); return; }

  const dateLabel = fmtRemDate(d, t);
  const typeLabel = rtype === 'call' ? 'Call' : rtype === 'email' ? 'Email' : 'Other';
  call.remDate = d;
  call.remTime = t;
  call.remType = rtype;
  call.details = `${typeLabel} reminder · ${dateLabel}${note ? '\n' + note : ''}`;

  haptic(10);
  save();
  saveCallEntry(cid, call);
  closeMKeepCard();
  renderTides();
  renderCallingCard();
}

function haptic(ms=10) { try { navigator.vibrate && navigator.vibrate(ms); } catch(e){} }

function completeTideReminder(cid, xid) {
  haptic(15);
  const c = contacts.find(x => x.id === cid); if (!c) return;
  const call = c.calls.find(x => x.id === xid); if (!call) return;
  call.outcome = 'note'; call.completed = true;
  save(); saveCallEntry(cid, call); renderTides(); renderList(); updateTidesBadge();
  // Show undo toast for 5 seconds
  showUndoToast(cid, xid);
}

function showUndoToast(cid, xid) {
  let toast = document.getElementById('undo-toast');
  if (toast) clearTimeout(toast._t);
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'undo-toast';

function snoozeBy(cid, xid, days) {
  const c = contacts.find(x => x.id === cid); if (!c) return;
  const call = c.calls.find(x => x.id === xid); if (!call) return;
  const base = call.remDate ? new Date(call.remDate + 'T12:00:00') : new Date();
  base.setDate(base.getDate() + days);
  call.remDate = base.toISOString().split('T')[0];
  const [y,m,d] = call.remDate.split('-').map(Number);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const typeLabel = call.remType === 'call' ? 'Call' : call.remType === 'email' ? 'Email' : 'Other';
  call.details = `${typeLabel} reminder · ${months[m-1]} ${d}`;
  save(); saveCallEntry(cid, call); closeMKeepCard(); renderTides();
}

function snoozeToDate(cid, xid) {
  const d = document.getElementById('snooze-custom-date')?.value;

  const c = contacts.find(x => x.id === cid); if (!c) return;

  call.remDate = d;
  const [y,m,day] = d.split('-').map(Number);

}

// ── SCROLL HAPTICS ──
function initScrollHaptics() {
  if (!navigator.vibrate) return;
  let lastTick = 0;

  function onScroll() {
    const now = Date.now();
    if (now - lastTick < 40) return;
    const rows = document.querySelectorAll('.contact-row, .tide-entry-wrap');
    const midY = window.innerHeight / 2;
    rows.forEach(row => {
      const rect = row.getBoundingClientRect();
      const rowMid = rect.top + rect.height / 2;
      if (Math.abs(rowMid - midY) < rect.height * 0.5) {
        navigator.vibrate(3);
        lastTick = now;
      }
    });
  }

  // Attach to every scrollable container and window
  ['main-list','tides-list','app','fullscreen-card'].forEach(id => {
    const el = document.getElementById(id);
    if (el && !el._hapticBound) {
      el._hapticBound = true;
      el.addEventListener('scroll', onScroll, {passive:true});
    }
  });
  if (!window._hapticWindowBound) {
    window._hapticWindowBound = true;
    window.addEventListener('scroll', onScroll, {passive:true});
  }
}

function reInitScrollHaptics() {
  if (!navigator.vibrate) return;
  setTimeout(initScrollHaptics, 150);
}

function initPullToRefresh() {
  const app = document.getElementById('app');
  const ptr = document.getElementById('ptr-area');
  if (!app || !ptr) return;
  let startY = 0, pulling = false, triggered = false;

  app.addEventListener('touchstart', e => {
    if (app.scrollTop === 0 && currentWing === 'voyage') {
      startY = e.touches[0].clientY;
      pulling = true; triggered = false;
    }
  }, {passive:true});

  app.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0 && dy < 80) {
      ptr.style.height = (dy * 0.6) + 'px';
    }
    if (dy > 60 && !triggered) {
      triggered = true;
      haptic(15);
    }
  }, {passive:true});

  app.addEventListener('touchend', async () => {
    if (!pulling) return;
    pulling = false;
    if (triggered) {
      ptr.style.height = '36px';
      await load();
      renderFilters(); renderList(); updateTidesBadge();
    }
    ptr.style.height = '0';
  });
}

// ── MANIFEST RENDER ──
function renderManifest() {
  const list = document.getElementById('manifest-list');
  if (!list) return;

  const filter = document.getElementById('manifest-filter')?.value || 'all';
  const mq = (document.getElementById('manifest-search')?.value || '').trim().toLowerCase();
  let items = [...manifestContacts];

  if (filter === 'Supporting') items = items.filter(m => m.support_status === 'Supporting');
  else if (filter === 'Non-supporting') items = items.filter(m => m.support_status === 'Non-supporting');
  else if (filter === 'Scheduled') items = items.filter(m => (m.groups||'').includes('Scheduled'));
  else if (filter === 'prayer') items = items.filter(m => m.prayer_list === 'Yes');

  if (mq) items = items.filter(m =>
    (m.pastor||'').toLowerCase().includes(mq) ||
    (m.church||'').toLowerCase().includes(mq) ||
    (m.city||'').toLowerCase().includes(mq) ||
    (m.state||'').toLowerCase().includes(mq)
  );

  if (filter === 'sort-scheduled') {
    const now = new Date();
    items.sort((a,b) => {
      const aNext = manifestVisits.filter(v=>v.manifestId===a.id&&v.date&&new Date(v.date)>=now).sort((x,y)=>new Date(x.date)-new Date(y.date))[0];
      const bNext = manifestVisits.filter(v=>v.manifestId===b.id&&v.date&&new Date(v.date)>=now).sort((x,y)=>new Date(x.date)-new Date(y.date))[0];
      if (!aNext && !bNext) return 0;
      if (!aNext) return 1;
      if (!bNext) return -1;
      return new Date(aNext.date) - new Date(bNext.date);
    });
  } else {
    items.sort((a,b) => (a.pastor||'').localeCompare(b.pastor||''));
  }

  if (!items.length) {
    // If manifestContacts is truly empty (not just filtered), show loading
    if (manifestContacts.length === 0) {
      list.innerHTML = '<div class="tide-empty"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg><div style="font-size:13px;color:var(--muted);margin-top:8px;">Loading...</div></div>';
    } else {
      list.innerHTML = '<div class="tide-empty"><div style="font-size:14px">No contacts</div></div>';
    }
    return;
  }

  list.innerHTML = items.map(m => {
    const initials = (m.pastor||m.church||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
    const mRegion = m.groups ? (m.groups.toLowerCase().includes('illinois')||m.state==='IL' ? 'central' : STATE_REGION[m.state] || 'noncont') : (STATE_REGION[m.state] || 'noncont');
    const mFakeContact = {region: mRegion, state: m.state};
    const rcM = getRegionColor(mFakeContact);
    const ringColor = m.support_status==='Supporting' ? '#2d7a4a' : m.support_status==='Non-supporting' ? '#6b2020' : 'transparent';
    const ringWidth = m.support_status ? '2px' : '1.5px';

    const visits = manifestVisits.filter(v => v.manifestId === m.id);
    const now = new Date();
    const futureVisits = visits.filter(v => v.date && new Date(v.date) >= now).sort((a,b)=>new Date(a.date)-new Date(b.date));
    const pastVisits = visits.filter(v => !v.date || new Date(v.date) < now).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const nextVisit = futureVisits[0];
    const lastVisit = pastVisits[0];
    const lastVisitStr = lastVisit ? fmtCallDate(lastVisit.date) : 'No visits yet';
    const scheduledTag = nextVisit ? `<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#1a2e22;border:1px solid #4a9e6b44;color:#4cd68a;margin-left:4px;display:inline-flex;align-items:center;gap:3px;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${fmtCallDate(nextVisit.date)}</span>` : '';

    return `<div class="tide-entry-wrap manifest-list-row" onclick="openManifestCard('${m.id}')">
      <div class="tide-entry upcoming" style="border-left:none;">
        <div class="tide-avatar" style="background:${rcM.bg};color:${rcM.text};border:${ringWidth} solid ${ringColor||rcM.border};flex-shrink:0;">${initials}</div>
        <div class="tide-content" style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;"><span class="tide-pastor">${esc(m.pastor||'—')}</span>${scheduledTag}</div>
          <div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(m.church||'')}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">Last visit: ${lastVisitStr}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

      <select id="v-capacity" style="width:100%;padding:9px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);margin-bottom:10px;">
        <option value="">Select...</option>
        <option>Sunday AM</option>
        <option>Sunday PM</option>
        <option>Wednesday</option>
        <option>Mission Conference</option>
        <option>Revival</option>
        <option>Other</option>
      </select>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;">Bible Handout?</div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button id="v-handout-yes" onclick="setVisitHandout('Yes')" style="flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--sans);font-size:13px;cursor:pointer;">Yes</button>
        <button id="v-handout-no" onclick="setVisitHandout('No')" style="flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--sans);font-size:13px;cursor:pointer;">No</button>
      </div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;">Notes</div>
      <textarea id="v-notes" placeholder="Anything else to remember..." style="width:100%;padding:9px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);min-height:60px;resize:vertical;margin-bottom:14px;box-sizing:border-box;"></textarea>
      <div style="display:flex;gap:8px;">
        <button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button>
        <button onclick="saveVisit('${mid}')" style="flex:2;padding:13px;background:#F3B53A;color:#000C1F;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;">Save Visit</button>
      </div>
    </div>
  </div>`);
  window._visitHandout = '';
}

function setVisitHandout(val) {
  window._visitHandout = val;
  ['Yes','No'].forEach(v => {
    const btn = document.getElementById('v-handout-' + v.toLowerCase());
    if (!btn) return;
    const active = v === val;
    btn.style.borderColor = active ? '#F3B53A' : 'var(--border)';
    btn.style.background  = active ? '#2e1f00' : 'var(--surface2)';
    btn.style.color       = active ? '#F3B53A' : 'var(--muted)';
  });
}

function saveVisit(mid) {
  const d = document.getElementById('v-date')?.value;
  if (!d) { alert('Please pick a date.'); return; }
  const visit = {
    id: uid(),
    manifestId: mid,
    date: d,
    days: document.getElementById('v-days')?.value || '',
    sermon: document.getElementById('v-sermon')?.value || '',
    capacity: document.getElementById('v-capacity')?.value || '',
    handout: window._visitHandout || '',
    notes: document.getElementById('v-notes')?.value || '',
  };
  manifestVisits.push(visit);
  saveVisitEntry(visit);
  haptic(10);
  closeMKeepCard();
  setTimeout(() => openManifestCard(mid), 220);
}

function openSetSailModal(cid) {
  const c = contacts.find(x => x.id === cid); if (!c) return;
  const meetingCall = (c.calls||[]).filter(x=>x.meetingBooked).slice(-1)[0];
  const meetingDate = meetingCall?.meetingDate || '';
  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)">
    <div class="modal-box" onclick="event.stopPropagation()" style="background:linear-gradient(180deg,#0e1a12,var(--surface));border-color:#4a9e6b44;">
      <div style="text-align:center;margin-bottom:16px;">
        <div style="font-size:36px;margin-bottom:8px;">⚓</div>
        <h2 style="font-family:var(--serif);font-size:22px;color:#4cd68a;margin-bottom:6px;">Set Sail to Manifest</h2>
        <div style="font-size:13px;color:var(--muted);line-height:1.5;">
          <strong style="color:var(--text);">${esc(c.pastor||c.church||'This contact')}</strong> has a meeting booked${meetingDate?' for <strong style="color:#4cd68a;">'+esc(meetingDate)+'</strong>':''}.
          <br/><br/>Move them to Manifest and remove from Voyage?
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn-cancel" onclick="closeMKeepCard()">Not yet</button>
        <button onclick="setSailToManifest('${cid}')" style="flex:2;padding:13px;background:linear-gradient(135deg,#1a3a28,#1e2244);border:1px solid #4a9e6b66;border-radius:var(--radius-sm);font-family:var(--serif);font-size:15px;color:#4cd68a;cursor:pointer;">⚓ Set Sail</button>
      </div>
    </div>
  </div>`);
}

function setSailToManifest(cid) {
  const c = contacts.find(x => x.id === cid); if (!c) return;
  haptic(20);
  // Create new Manifest entry from Voyage contact
  const newId = 'mfst-' + uid();
  const m = {
    id: newId,
    pastor: c.pastor || '',
    church: c.church || '',
    city: c.city || '',
    state: c.state || '',
    phone: c.phone || '',
    cell: c.cell || '',
    email: c.email || '',
    church_email: '',
    address: c.address || '',
    website: '',
    groups: 'Scheduled',
    lodging: '',
    rv_hookup: '',
    bible_handouts: '',
    support_status: '',
    support_amount: '',
    support_cadence: '',
    relay_group: '',
    prayer_list: '',
    notes: c.notes ? (Array.isArray(c.notes) ? c.notes.join('\n') : c.notes) : '',
    starred: c.starred || false,
  };
  manifestContacts.push(m);
  saveManifestContact(m);
  // Remove from Voyage
  contacts = contacts.filter(x => x.id !== cid);
  save();
  deleteContactEntry(cid);
  closeMKeepCard();
  closeCard();
  renderFilters();
  renderList();
  showStatus('Set sail to Manifest ⚓', 'ok');
}

function deleteNextMeeting(mid, visitId) {
  if (!confirm('Remove this scheduled meeting?')) return;
  if (visitId) {
    manifestVisits = manifestVisits.filter(x => x.id !== visitId);
    if (sheetsReady) api({action:'deleteVisit', id: visitId}).catch(()=>{});
  }
  const m = manifestContacts.find(x => x.id === mid);
  if (m) { m.next_visit_date = ''; saveManifestContact(m); }
  renderManifest();
  setTimeout(() => openManifestCard(mid), 50);
}

function openEditNextMeeting(mid) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;
  const now = new Date();
  const nextVisit = manifestVisits.filter(v => v.manifestId === mid && v.date && new Date(v.date) >= now).sort((a,b)=>new Date(a.date)-new Date(b.date))[0];
  const existingDate = nextVisit ? nextVisit.date : (m.next_visit_date || '');
  const existingSermon = nextVisit ? (nextVisit.sermon || '') : '';
  const existingId = nextVisit ? nextVisit.id : null;

  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)">
    <div class="snooze-modal" onclick="event.stopPropagation()" style="padding:20px 16px 24px;">
      <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;"></div>
      <h2 style="font-family:var(--serif);font-size:18px;margin-bottom:14px;color:#4cd68a;">Next Meeting</h2>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;">Date</div>
      <input type="date" id="nm-date" value="${existingDate}" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:15px;background:var(--bg);color:var(--text);margin-bottom:12px;box-sizing:border-box;"/>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;">Sermon / Message <span style="opacity:.5;">(optional)</span></div>
      <input type="text" id="nm-sermon" value="${esc(existingSermon)}" placeholder="What will you preach?" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);margin-bottom:14px;box-sizing:border-box;"/>
      <div style="display:flex;gap:8px;">
        <button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button>
        <button onclick="saveNextMeeting('${mid}','${existingId||''}')" style="flex:2;padding:12px;background:linear-gradient(135deg,#1a3a28,#1e2244);border:1px solid #4a9e6b44;border-radius:var(--radius-sm);font-family:var(--serif);font-size:15px;color:#4cd68a;cursor:pointer;">Save</button>
      </div>
    </div>
  </div>`);
}

function saveNextMeeting(mid, existingId) {
  const d = document.getElementById('nm-date')?.value;
  if (!d) { alert('Please pick a date.'); return; }
  const sermon = document.getElementById('nm-sermon')?.value?.trim() || '';
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;

  if (existingId) {
    // Update existing visit
    const v = manifestVisits.find(x => x.id === existingId);
    if (v) { v.date = d; v.sermon = sermon; saveVisitEntry(v); }
  } else {
    // Create new future visit
    const visit = { id: uid(), manifestId: mid, date: d, sermon, capacity: '', days: '', handout: '', notes: '' };
    manifestVisits.push(visit);
    saveVisitEntry(visit);
  }
  // Also store on the contact for easy access
  m.next_visit_date = d;
  saveManifestContact(m);
  haptic(10);
  closeMKeepCard();
  renderManifest();
  setTimeout(() => openManifestCard(mid), 220);
}

function openManifestEmailCopy() {
  const filter = document.getElementById('manifest-filter')?.value || 'all';
  const mq = (document.getElementById('manifest-search')?.value || '').trim().toLowerCase();
  let items = [...manifestContacts];

  if (filter === 'Supporting') items = items.filter(m => m.support_status === 'Supporting');
  else if (filter === 'Non-supporting') items = items.filter(m => m.support_status === 'Non-supporting');
  else if (filter === 'Scheduled') items = items.filter(m => (m.groups||'').includes('Scheduled'));
  else if (filter === 'prayer') items = items.filter(m => m.prayer_list === 'Yes');
  if (mq) items = items.filter(m =>
    (m.pastor||'').toLowerCase().includes(mq) ||
    (m.church||'').toLowerCase().includes(mq) ||
    (m.city||'').toLowerCase().includes(mq) ||
    (m.state||'').toLowerCase().includes(mq)
  );

  // Collect all unique emails
  const emails = [];
  items.forEach(m => {
    [m.email, m.church_email].forEach(e => {
      if (e && e.trim() && !emails.includes(e.trim())) emails.push(e.trim());
    });
  });

  const filterLabel = filter === 'all' ? 'All contacts' : filter === 'prayer' ? 'Prayer list' : filter;
  const emailStr = emails.join(', ');

  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h2 style="font-family:var(--serif);font-size:20px;margin-bottom:4px;">Email List</h2>
      <div style="font-size:13px;color:var(--muted);margin-bottom:14px;">${filterLabel}${mq?' · "'+mq+'"':''} · ${emails.length} address${emails.length!==1?'es':''}</div>
      <textarea readonly onclick="this.select()" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:13px;background:var(--bg);color:var(--text);min-height:120px;resize:none;box-sizing:border-box;line-height:1.6;">${esc(emailStr)}</textarea>
      ${emails.length ? `<button onclick="navigator.clipboard.writeText('${emailStr.replace(/'/g,"\\'")}').then(()=>showStatus('Copied!','ok'))" style="width:100%;margin-top:10px;padding:12px;background:#F3B53A;color:#000C1F;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;">Copy to Clipboard</button>` : '<div style="font-size:13px;color:var(--muted);text-align:center;padding:8px 0;">No emails found for this filter</div>'}
      <button class="btn-cancel" onclick="closeMKeepCard()" style="width:100%;margin-top:8px;">Close</button>
    </div>
  </div>`);
}

function deleteManifestContact(mid) {
  if (!confirm('Delete this contact? This cannot be undone.')) return;
  manifestContacts = manifestContacts.filter(x => x.id !== mid);
  const l = document.getElementById('modal-layer');
  if (l) { l.innerHTML = ''; l.style.pointerEvents = 'none'; }
  closeManifestCard();
  renderManifest();
  if (sheetsReady) api({action:'deleteManifest', id: mid}).catch(()=>{});
}

function closeManifestEditModal() {
  const l = document.getElementById('modal-layer');
  if (l) { l.innerHTML = ''; l.style.pointerEvents = 'none'; }
  const mid = window._editModalMid;
  const fromCard = window._editModalFromCard;
  if (fromCard && mid) {
    // Opened from a card — re-render it
    setTimeout(() => openManifestCard(mid), 50);
  } else if (mid) {
    // Opened from Add — remove blank entry if unsaved, re-render list
    manifestContacts = manifestContacts.filter(x => x.id !== mid || x.pastor || x.church);
    renderManifest();
  }
}

function openManifestEditModal(mid) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;
  window._editModalMid = mid;
  showM(`<div class="modal-backdrop" onclick="closeManifestEditModal()" ontouchend="if(event.target===this){event.preventDefault();closeManifestEditModal();}" style="cursor:default;">
    <div class="modal-box" onclick="event.stopPropagation()" ontouchend="event.stopPropagation()" style="padding:20px 16px 24px;max-height:85vh;overflow-y:auto;cursor:auto;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <h2 style="font-family:var(--serif);font-size:20px;margin:0;">Edit Contact</h2>
        <button onclick="deleteManifestContact('${mid}')" style="background:#3a0a0a;border:1px solid #5a1a1a;border-radius:6px;padding:6px 8px;cursor:pointer;color:#e05555;display:flex;align-items:center;">${ICONS.trash}</button>
      </div>
      ${['pastor','church','city','state','phone','cell','email','church_email','address','website'].map(f=>`
        <div style="margin-bottom:10px;">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;">${f.replace('_',' ')}</div>
          <input type="text" id="me-${f}" value="${esc(m[f]||'')}" style="width:100%;padding:9px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);box-sizing:border-box;"/>
        </div>`).join('')}
      <div style="margin-bottom:10px;">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;">Support Status</div>
        <select id="me-support_status" style="width:100%;padding:9px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);">
          <option value="" ${!m.support_status?'selected':''}>None</option>
          <option value="Supporting" ${m.support_status==='Supporting'?'selected':''}>Supporting</option>
          <option value="Non-supporting" ${m.support_status==='Non-supporting'?'selected':''}>Non-supporting</option>
        </select>
      </div>
      ${['support_amount','support_cadence'].map(f=>`
        <div style="margin-bottom:10px;">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;">${f.replace('_',' ')}</div>
          <input type="text" id="me-${f}" value="${esc(m[f]||'')}" style="width:100%;padding:9px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);box-sizing:border-box;"/>
        </div>`).join('')}
      ${["lodging","rv_hookup","bible_handouts"].map(f=>`
        <div style="margin-bottom:10px;">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;">${f.replace(/_/g,' ')}</div>
          <div style="display:flex;gap:8px;">
            <button onclick="setManifestToggle('${f}','')" id="mt-${f}-none" style="flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid ${!m[f]?'#F3B53A':'var(--border)'};background:${!m[f]?'#2e1f00':'var(--surface2)'};color:${!m[f]?'#F3B53A':'var(--muted)'};font-family:var(--sans);font-size:13px;cursor:pointer;">—</button>
            <button onclick="setManifestToggle('${f}','Yes')" id="mt-${f}-yes" style="flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid ${m[f]==='Yes'?'#4cd68a':'var(--border)'};background:${m[f]==='Yes'?'#0a2a1a':'var(--surface2)'};color:${m[f]==='Yes'?'#4cd68a':'var(--muted)'};font-family:var(--sans);font-size:13px;cursor:pointer;">Yes</button>
            <button onclick="setManifestToggle('${f}','No')" id="mt-${f}-no" style="flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid ${m[f]==='No'?'#e05555':'var(--border)'};background:${m[f]==='No'?'#2a0a0a':'var(--surface2)'};color:${m[f]==='No'?'#e05555':'var(--muted)'};font-family:var(--sans);font-size:13px;cursor:pointer;">No</button>
          </div>
        </div>`).join('')}
      <div style="margin-bottom:14px;">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;">Notes</div>
        <textarea id="me-notes" style="width:100%;padding:9px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);min-height:80px;resize:vertical;box-sizing:border-box;">${esc(m.notes||'')}</textarea>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-cancel" onclick="closeManifestEditModal()">Cancel</button>
        <button onclick="saveManifestEdit('${mid}')" style="flex:2;padding:13px;background:#F3B53A;color:#000C1F;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;">Save</button>
      </div>
    </div>
  </div>`);
  window._manifestToggles = {lodging: m.lodging||'', rv_hookup: m.rv_hookup||'', bible_handouts: m.bible_handouts||''};
}

function setManifestToggle(field, val) {
  if (!window._manifestToggles) window._manifestToggles = {};
  window._manifestToggles[field] = val;
  const states = {
    '': { border: '#F3B53A', bg: '#2e1f00', color: '#F3B53A' },
    'Yes': { border: '#4cd68a', bg: '#0a2a1a', color: '#4cd68a' },
    'No': { border: '#e05555', bg: '#2a0a0a', color: '#e05555' },
  };
  ['','Yes','No'].forEach(v => {
    const suffix = v === '' ? 'none' : v.toLowerCase();
    const btn = document.getElementById('mt-' + field + '-' + suffix);
    if (!btn) return;
    const active = v === val;
    btn.style.borderColor = active ? states[v].border : 'var(--border)';
    btn.style.background  = active ? states[v].bg : 'var(--surface2)';
    btn.style.color       = active ? states[v].color : 'var(--muted)';
  });
}

function saveManifestEdit(mid) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;
  ['pastor','church','city','state','phone','cell','email','church_email','address','website','support_amount','support_cadence'].forEach(f => {
    const el = document.getElementById('me-' + f);
    if (el) m[f] = el.value;
  });
  const ss = document.getElementById('me-support_status');
  if (ss) m.support_status = ss.value;
  const notes = document.getElementById('me-notes');
  if (notes) m.notes = notes.value;
  if (window._manifestToggles) {
    Object.assign(m, window._manifestToggles);
  }
  saveManifestContact(m);
  haptic(10);
  closeMKeepCard();
  setTimeout(() => { renderManifest(); openManifestCard(mid); }, 220);
}

function openManifestAddModal() {
  const newId = 'mfst-' + uid();
  const m = {id: newId, pastor:'', church:'', city:'', state:'', phone:'', cell:'', email:'', church_email:'', address:'', website:'', groups:'', lodging:'', rv_hookup:'', bible_handouts:'', support_status:'', support_amount:'', support_cadence:'', relay_group:'', prayer_list:'', notes:''};
  manifestContacts.push(m);
  window._editModalFromCard = false;
  openManifestEditModal(newId);
}

function openReminderFromManifest(mid) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;
  
  // Ensure a pseudo contact exists in the contacts array for this manifest contact
  let pseudo = contacts.find(c => c.id === mid);
  if (!pseudo) {
    pseudo = { id: mid, pastor: m.pastor||'', church: m.church||'', city: m.city||'', state: m.state||'', region: '', phone: m.phone||'', email: m.email||'', calls: [] };
    contacts.push(pseudo);
  }
  
  // Build filteredList with this contact so openReminderModal works
  if (!filteredList.find(c => c.id === mid)) {
    filteredList = [pseudo, ...filteredList];
    callingIdx = 0;
  } else {
    callingIdx = filteredList.findIndex(c => c.id === mid);
  }
  
  // Open reminder modal directly without switching wings
  openReminderModal(mid);
}

load().then(()=>{renderFilters();renderList();updateTidesBadge();initPullToRefresh();initLongPress();setTimeout(initScrollHaptics,500);loadManifest();loadVisits();});
window.addEventListener('resize',renderList);
const _origRenderList = renderList;
renderList = function(...a) { _origRenderList(...a); reInitScrollHaptics(); };
</script>
</body>
</html>
