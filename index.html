<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IL Cold Calls</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --text: #e8e6e1; --muted: #6b6860; --accent: #4a9e6b; --accent-light: #1a2e22;
    --danger: #e05555; --warn: #c47d3a;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
    --radius: 10px; --radius-sm: 6px;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── App shell ── */
  #app { display: flex; height: 100vh; flex-direction: column; }

  /* ── Top bar ── */
  .top-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; min-height: 54px; display: flex; align-items: center;
    gap: 12px; flex-shrink: 0; flex-wrap: wrap; padding-top: 8px; padding-bottom: 8px;
  }
  .top-bar-title { font-family: var(--serif); font-size: 20px; font-weight: 400; margin-right: 8px; }
  .search-wrap { position: relative; flex: 1; max-width: 320px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 14px; height: 14px; }
  #search { width: 100%; padding: 7px 10px 7px 30px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px; background: var(--surface2); color: var(--text); }
  #search:focus { outline: none; border-color: var(--accent); }
  .filter-row { display: flex; gap: 5px; flex-wrap: nowrap; overflow-x: auto; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-pill { font-size: 11px; padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border); background: none; cursor: pointer; font-family: var(--sans); color: var(--muted); transition: all .12s; white-space: nowrap; flex-shrink: 0; }
  .filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .top-bar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-shrink: 0; }
  .count-badge { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; color: var(--muted); white-space: nowrap; }
  .add-btn { display: flex; align-items: center; gap: 5px; padding: 7px 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s; white-space: nowrap; }
  .add-btn:hover { opacity: .88; }

  /* ── Main list ── */
  .main-list { flex: 1; overflow-y: auto; padding: 0; }
  .main-list::-webkit-scrollbar { width: 4px; }
  .main-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Column header ── */
  .list-header {
    display: grid;
    grid-template-columns: 44px 1fr 1fr 1fr 1fr 110px;
    gap: 0;
    padding: 0 16px;
    height: 36px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 10;
  }
  .list-header-cell { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 500; padding: 0 8px; }

  /* ── Contact row ── */
  .contact-row {
    display: grid;
    grid-template-columns: 44px 1fr 1fr 1fr 1fr 110px;
    gap: 0;
    padding: 0 16px;
    min-height: 56px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .contact-row:hover { background: var(--surface); }
  .contact-row:nth-child(even) { background: rgba(255,255,255,.015); }
  .contact-row:nth-child(even):hover { background: var(--surface); }

  .row-avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; overflow: hidden; }
  .row-cell { padding: 8px; min-width: 0; }
  .row-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-sub  { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .row-plain { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .row-muted { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-style: italic; }

  /* last call badge */
  .last-call-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 20px; }
  .lcb-pastor    { background: #1a3a28; color: #4cd68a; }
  .lcb-voicemail { background: #1e2244; color: #8899ee; }
  .lcb-secretary { background: #2e2010; color: #d4934a; }
  .lcb-none      { background: var(--surface2); color: var(--muted); }

  /* ── Action buttons ── */
  .row-actions { display: flex; align-items: center; gap: 6px; padding: 0 8px; justify-content: flex-end; }
  .action-btn {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    font-family: var(--sans); font-size: 15px;
    cursor: pointer; border: 1px solid var(--border);
    background: none; color: var(--text); transition: all .12s;
  }
  .action-btn:hover { background: var(--surface2); }
  .action-btn.call { border-color: #4a9e6b33; color: #4a9e6b; }
  .action-btn.call:hover { background: var(--accent-light); border-color: var(--accent); }
  .action-btn.log { border-color: #6b7fd433; color: #8899ee; }
  .action-btn.log:hover { background: #1e2244; border-color: #6b7fd4; }
  .action-btn.details { border-color: var(--border); color: var(--muted); }
  .action-btn { text-decoration: none; }

  /* ── Empty state ── */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; color: var(--muted); gap: 10px; }
  .empty-state p { font-size: 13px; }

  /* ── Modal backdrop ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; padding: 20px;
  }

  /* ── Contact detail card ── */
  .detail-card {
    background: var(--surface); border-radius: 16px;
    width: 560px; max-width: 100%; max-height: 88vh;
    overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,.6);
    border: 1px solid var(--border);
  }
  .detail-card::-webkit-scrollbar { width: 3px; }
  .detail-card::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .card-header {
    padding: 24px 24px 0;
    display: flex; align-items: flex-start; gap: 16px;
  }
  .card-avatar { width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 500; overflow: hidden; }
  .card-header-info { flex: 1; min-width: 0; }
  .card-name { font-family: var(--serif); font-size: 24px; font-weight: 400; line-height: 1.1; margin-bottom: 3px; }
  .card-church { font-size: 13px; color: var(--muted); }
  .card-header-actions { display: flex; gap: 6px; flex-shrink: 0; margin-top: 4px; }
  .card-close { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 10px; font-size: 13px; cursor: pointer; color: var(--muted); transition: all .12s; }
  .card-close:hover { color: var(--text); background: var(--surface2); }
  .card-edit { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 10px; font-size: 12px; cursor: pointer; color: var(--text); transition: background .12s; }
  .card-edit:hover { background: var(--surface2); }
  .card-delete { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 10px; font-size: 12px; cursor: pointer; color: var(--danger); border-color: var(--danger); transition: background .12s; }
  .card-delete:hover { background: rgba(224,85,85,.1); }

  .card-body { padding: 20px 24px 24px; }
  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .field-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
  .field-card.full { grid-column: 1 / -1; }
  .field-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 3px; }
  .field-value { font-size: 13px; word-break: break-word; line-height: 1.5; }
  .field-value a { color: var(--accent); text-decoration: none; }
  .field-value a:hover { text-decoration: underline; }
  .field-value.empty { color: var(--muted); font-style: italic; font-size: 12px; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); font-weight: 500; }
  .log-call-btn { display: flex; align-items: center; gap: 5px; padding: 5px 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: var(--sans); font-size: 11px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
  .log-call-btn:hover { opacity: .88; }

  .call-log-list { display: flex; flex-direction: column; gap: 8px; }
  .call-entry { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; position: relative; }
  .call-entry-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .outcome-badge { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 20px; }
  .outcome-pastor    { background: #1a3a28; color: #4cd68a; }
  .outcome-voicemail { background: #1e2244; color: #8899ee; }
  .outcome-secretary { background: #2e2010; color: #d4934a; }
  .outcome-imported  { background: var(--surface2); color: var(--muted); }
  .call-date { font-size: 11px; color: var(--muted); margin-left: auto; }
  .meeting-badge { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 20px; background: #1a2e22; color: #4a9e6b; }
  .call-details { font-size: 13px; color: var(--text); line-height: 1.6; white-space: pre-wrap; }
  .call-delete { position: absolute; top: 9px; right: 9px; background: none; border: none; cursor: pointer; color: var(--border); font-size: 14px; padding: 2px 5px; border-radius: 4px; transition: color .12s; }
  .call-delete:hover { color: var(--danger); }
  .no-calls { font-size: 12px; color: var(--muted); font-style: italic; }

  /* ── Log call modal (stacked above detail card) ── */
  .log-modal {
    background: var(--surface); border-radius: 14px;
    width: 440px; max-width: 100%; max-height: 88vh;
    overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,.7);
    border: 1px solid var(--border); padding: 24px;
  }
  .log-modal h2 { font-family: var(--serif); font-size: 20px; font-weight: 400; margin-bottom: 18px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-group label { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea { padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px; background: var(--bg); color: var(--text); width: 100%; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
  .form-group textarea { resize: vertical; height: 80px; }
  .outcome-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .outcome-opt { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 6px; text-align: center; cursor: pointer; transition: all .12s; font-size: 11px; font-weight: 500; color: var(--muted); background: none; font-family: var(--sans); line-height: 1.4; }
  .outcome-opt:hover { border-color: var(--accent); color: var(--text); }
  .outcome-opt.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
  .outcome-opt .opt-icon { font-size: 18px; display: block; margin-bottom: 4px; }
  .meeting-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--surface2); border-radius: var(--radius-sm); margin-bottom: 14px; }
  .meeting-row label { font-size: 13px; flex: 1; }
  .toggle-wrap { display: flex; gap: 6px; }
  .toggle-btn { padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; font-family: var(--sans); cursor: pointer; background: none; color: var(--muted); transition: all .12s; }
  .toggle-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-cancel { padding: 7px 16px; background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px; cursor: pointer; color: var(--text); transition: background .12s; }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save { padding: 7px 16px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
  .btn-save:hover { opacity: .88; }

  /* ── Contact edit modal ── */
  .edit-modal {
    background: var(--surface); border-radius: 14px;
    width: 500px; max-width: 100%; max-height: 90vh;
    overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,.7);
    border: 1px solid var(--border); padding: 26px;
  }
  .edit-modal h2 { font-family: var(--serif); font-size: 20px; font-weight: 400; margin-bottom: 18px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 11px; }
  .form-group-inline { display: flex; flex-direction: column; gap: 5px; }
  .form-group-inline.full { grid-column: 1 / -1; }
  .form-group-inline label { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); font-weight: 500; }
  .form-group-inline input, .form-group-inline select { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px; background: var(--bg); color: var(--text); }
  .form-group-inline input:focus, .form-group-inline select:focus { outline: none; border-color: var(--accent); }
  .form-group-inline select option { background: var(--surface); }

  /* ── Photo upload ── */
  .photo-upload-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
  .photo-preview { width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; overflow: hidden; position: relative; cursor: pointer; border: 2px dashed var(--border); transition: border-color .15s; }
  .photo-preview:hover { border-color: var(--accent); }
  .photo-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .photo-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; font-size: 14px; }
  .photo-preview:hover .photo-overlay { opacity: 1; }
  .photo-upload-info p { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .photo-btns { display: flex; gap: 6px; }
  .photo-btn { font-size: 11px; padding: 4px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: none; color: var(--text); cursor: pointer; font-family: var(--sans); transition: background .12s; }
  .photo-btn:hover { background: var(--surface2); }
  .photo-btn.remove { color: var(--danger); border-color: var(--danger); }
  .photo-btn.remove:hover { background: rgba(224,85,85,.1); }
  #f-photo-input { display: none; }

  @media (max-width: 900px) {
    .list-header, .contact-row { grid-template-columns: 44px 1fr 1fr 160px; }
    .col-region, .col-last-call { display: none; }
  }
  @media (max-width: 600px) {
    .list-header, .contact-row { grid-template-columns: 44px 1fr 140px; }
    .col-location { display: none; }
    .outcome-options { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

    <div class="list-header-cell col-last-call">Last call</div>
    <div class="list-header-cell" style="text-align:right">Actions</div>
  </div>

  <div class="main-list" id="main-list"></div>
</div>

<!-- Modal layer -->
<div id="modal-layer" style="display:none"></div>

function avatarColor(n){ let h=0; for(let c of(n||'X')) h=(h*31+c.charCodeAt(0))&0xffffffff; return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length]; }
function initials(n){ return(n||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join(''); }
function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function esc(s){ return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(d){ return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

function load(){
  try{ contacts=JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; }catch{ contacts=[]; }
  if(!localStorage.getItem(SEED_KEY)||contacts.length===0){
    contacts=SEED_DATA.map(c=>({...c,calls:c.calls||[],notes:c.notes||[],photo:c.photo||'',state:c.state||'IL'}));
    localStorage.setItem(SEED_KEY,'1');
    localStorage.setItem(STORAGE_KEY,JSON.stringify(contacts));
  }
}
function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(contacts));
  // count-label updated in renderList
}

function renderAll(){ renderFilters(); renderList(); save(); }

function renderFilters(){
  const states = ['All', ...Array.from(new Set(contacts.map(c=>(c.state||'').trim()).filter(Boolean))).sort()];
  document.getElementById('state-filter-row').innerHTML = states.map(s=>
    `<button class="filter-pill${filterState===s?' active':''}" onclick="setStateFilter('${s}')">${s==='All'?'All States':s}</button>`
  ).join('');

  const visibleContacts = filterState==='All' ? contacts : contacts.filter(c=>(c.state||'').toUpperCase()===filterState);
  const regions = ['All', ...Array.from(new Set(visibleContacts.map(c=>c.region||'').filter(Boolean))).sort()];
  document.getElementById('region-filter-row').innerHTML = regions.map(r=>
    `<button class="filter-pill${filterReg===r?' active':''}" onclick="setRegionFilter('${r}')">${r==='All'?'All Regions':r}</button>`
  ).join('');
}

function setStateFilter(s){ filterState=s; filterReg='All'; renderFilters(); renderList(); }
function setRegionFilter(r){ filterReg=r; renderFilters(); renderList(); }

function lastCall(c){
  const real=(c.calls||[]).filter(x=>x.outcome!=='imported');
  return real.length?real[real.length-1]:null;
}

function renderList(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  let filtered=contacts.filter(c=>{
    const matchState = filterState==='All' || (c.state||'').toUpperCase()===filterState;
    const matchReg = filterReg==='All' || (c.region||'')===filterReg;
    const matchQ=!q||(c.pastor||'').toLowerCase().includes(q)||(c.church||'').toLowerCase().includes(q)||(c.city||'').toLowerCase().includes(q)||(c.state||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q)||(c.phone||'').toLowerCase().includes(q);
    return matchState&&matchReg&&matchQ;
  });
  filtered.sort((a,b)=>(a.pastor||a.church||'').localeCompare(b.pastor||b.church||''));

  document.getElementById('count-label').textContent=filtered.length+' / '+contacts.length;
  const list=document.getElementById('main-list');

  if(!filtered.length){
    list.innerHTML=`<div class="empty-state"><p>No contacts found</p></div>`;
    return;
  }

  list.innerHTML=filtered.map(c=>{
    const[bg,fg]=avatarColor(c.pastor||c.church||'?');
    const av=c.photo?`<img src="${c.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`:(initials(c.pastor||c.church||'?'));
    const avStyle=c.photo?'':`background:${bg};color:${fg}`;
    const lc=lastCall(c);
    const meta=lc?OUTCOME_META[lc.outcome]||OUTCOME_META.imported:null;
    const lcBadge=meta
      ?`<span class="last-call-badge ${meta.lcb}">${meta.icon} ${meta.label}</span>`
      :`<span class="last-call-badge lcb-none">No calls yet</span>`;
    const loc=[c.city,c.state].filter(Boolean).join(', ')+(c.region?' · '+c.region:'');
    const telHref=c.phone?`tel:${c.phone.replace(/[^+0-9]/g,'')}`:'';

    return `<div class="contact-row">
      <div style="padding:0 5px"><div class="row-avatar" style="${avStyle}">${av}</div></div>
      <div class="row-cell">
        <div class="row-name">${esc(c.pastor||'—')}</div>
        <div class="row-sub">${esc(c.church||'')}</div>
      </div>
      <div class="row-cell col-location">
        <div class="row-plain">${esc(loc)||'—'}</div>
      </div>
      <div class="row-cell col-region">
        <div class="row-plain">${esc(c.phone)||'—'}</div>
      </div>
      <div class="row-cell col-last-call">${lcBadge}</div>
      <div class="row-actions">
        ${telHref
          ?`<a href="${telHref}" class="action-btn call" title="Call ${esc(c.pastor||c.church)}">📞</a>`
          :`<button class="action-btn call" disabled style="opacity:.35;cursor:default">📞</button>`}
        <button class="action-btn log" onclick="openCallModal('${c.id}')" title="Log a call">📋</button>
        <button class="action-btn details" onclick="openDetailCard('${c.id}')" title="View details">👁</button>
      </div>
    </div>`;
  }).join('');
}

/* ─── Field helper ─── */
function fld(label,value,full){
  const empty=!value;
  return `<div class="field-card${full?' full':''}"><div class="field-label">${label}</div><div class="field-value${empty?' empty':''}">${empty?'—':esc(value)}</div></div>`;
}

/* ─── Detail card ─── */

  const c=contacts.find(x=>x.id===cid); if(!c) return;

  const avStyle=c.photo?'':`background:${bg};color:${fg}`;
  const calls=(c.calls||[]).slice().reverse();
  const realCalls=calls.filter(x=>x.outcome!=='imported');

  showModal(`
  <div class="modal-backdrop" onclick="closeModal(event)">
    <div class="detail-card" onclick="event.stopPropagation()">
      <div class="card-header">
        <div class="card-avatar" style="${avStyle}">${av}</div>
        <div class="card-header-info">
          <div class="card-name">${esc(c.pastor||'Unknown Pastor')}</div>
          <div class="card-church">${esc(c.church||'')}${(c.city||c.state)?' · '+[c.city,c.state].filter(Boolean).join(', '):''}</div>
        </div>
        <div class="card-header-actions">
          <button class="card-edit" onclick="openContactModal('${c.id}')">✏️ Edit</button>
          <button class="card-delete" onclick="deleteContact('${c.id}')">🗑</button>
          <button class="card-close" onclick="closeModal()">✕</button>
        </div>
      </div>
      <div class="card-body">
        <div class="fields-grid">
          ${fld('Region',c.region)}
          ${fld('Phone',c.phone)}
          ${c.email?`<div class="field-card full"><div class="field-label">Email</div><div class="field-value"><a href="mailto:${esc(c.email)}">${esc(c.email)}</a></div></div>`:fld('Email',null)}
          ${fld('Address',c.address,true)}
        </div>

        <div class="section-header">
          <span class="section-title">Call log (${realCalls.length} calls)</span>
          <button class="log-call-btn" onclick="openCallModal('${c.id}')">📞 Log a call</button>
        </div>
        <div class="call-log-list">
          ${calls.length?calls.map(call=>{
            const meta=OUTCOME_META[call.outcome]||OUTCOME_META.imported;
            const mb=call.meetingBooked?`<span class="meeting-badge">📅 ${call.meetingDate?esc(call.meetingDate):'Meeting booked'}</span>`:'';
            return `<div class="call-entry">
              <div class="call-entry-top">
                <span class="outcome-badge ${meta.cls}">${meta.icon} ${meta.label}</span>
                ${mb}
                <span class="call-date">${call.date}</span>
              </div>
              ${call.details?`<div class="call-details">${esc(call.details)}</div>`:''}
              <button class="call-delete" onclick="deleteCall('${c.id}','${call.id}')">×</button>
            </div>`;
          }).join(''):`<div class="no-calls">No calls logged yet.</div>`}
        </div>
      </div>
    </div>
  </div>`);
}

/* ─── Log call modal ─── */
function openCallModal(cid){
  logCallOutcome=null; logCallMeeting=false;
  showModal(`
  <div class="modal-backdrop" onclick="closeModal(event)">
    <div class="log-modal" onclick="event.stopPropagation()">
      <h2>Log a call</h2>
      <div class="form-group">
        <label>Outcome *</label>
        <div class="outcome-options">
          <button class="outcome-opt" id="opt-pastor"    onclick="selectOutcome('pastor')"><span class="opt-icon">🙋</span>Spoke to Pastor</button>
          <button class="outcome-opt" id="opt-voicemail" onclick="selectOutcome('voicemail')"><span class="opt-icon">📵</span>No Response / Voicemail</button>
          <button class="outcome-opt" id="opt-secretary" onclick="selectOutcome('secretary')"><span class="opt-icon">📋</span>Spoke to Secretary</button>
        </div>
      </div>
      <div id="meeting-section" style="display:none">
        <div class="meeting-row">
          <label>Meeting booked?</label>
          <div class="toggle-wrap">
            <button class="toggle-btn off" id="meeting-yes" onclick="setMeeting(true)">Yes</button>
            <button class="toggle-btn on"  id="meeting-no"  onclick="setMeeting(false)">No</button>
          </div>
        </div>
        <div id="meeting-date-row" style="display:none">
          <div class="form-group"><label>Meeting date</label><input type="text" id="meeting-date" placeholder="e.g. June 15, 2026" /></div>
        </div>
      </div>
      <div class="form-group">
        <label>Details <span style="color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label>
        <textarea id="call-details" placeholder="Who you spoke with, what was discussed, follow-up needed…"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveCall('${cid}')">Save call</button>
      </div>
    </div>
  </div>`);
}

function selectOutcome(o){
  logCallOutcome=o;
  ['pastor','voicemail','secretary'].forEach(k=>{
    const el=document.getElementById('opt-'+k); if(el) el.classList.toggle('selected',k===o);
  });
  const ms=document.getElementById('meeting-section');
  if(ms) ms.style.display=o==='voicemail'?'none':'block';
  if(o==='voicemail') logCallMeeting=false;
}
function setMeeting(val){
  logCallMeeting=val;
  const y=document.getElementById('meeting-yes'); if(y) y.className='toggle-btn '+(val?'on':'off');
  const n=document.getElementById('meeting-no');  if(n) n.className='toggle-btn '+(val?'off':'on');
  const dr=document.getElementById('meeting-date-row'); if(dr) dr.style.display=val?'block':'none';
}
function saveCall(cid){
  if(!logCallOutcome){ alert('Please select an outcome.'); return; }
  const c=contacts.find(x=>x.id===cid); if(!c) return;
  if(!c.calls) c.calls=[];
  const md=(document.getElementById('meeting-date')||{}).value||'';
  c.calls.push({ id:uid(), date:formatDate(new Date()), outcome:logCallOutcome, meetingBooked:logCallMeeting, meetingDate:md.trim(), details:(document.getElementById('call-details').value||'').trim() });
  closeModal(); save(); renderList();
}
function deleteCall(cid,callId){
  const c=contacts.find(x=>x.id===cid); if(!c) return;
  c.calls=(c.calls||[]).filter(x=>x.id!==callId);
  save(); closeModal(); openDetailCard(cid);
}

/* ─── Contact edit modal ─── */
function openContactModal(id){
  const c=id?contacts.find(x=>x.id===id):null;
  const v=f=>c?(c[f]||''):'';
  const regOpts=['Central','Central East','Central North','Central West','North','Northeast','Northwest','South','South Central','Southeast','Southwest','West','West Central','Other'].map(o=>`<option${v('region')===o?' selected':''}>${o}</option>`).join('');
  const[bg,fg]=avatarColor((c&&c.pastor)||'?');
  const prevInner=(c&&c.photo)?`<img src="${c.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`:`<span style="color:${fg}">${initials((c&&c.pastor)||'?')}</span>`;
  const prevStyle=(c&&c.photo)?'':`background:${bg};`;
  pendingPhoto=null;
  showModal(`
  <div class="modal-backdrop" onclick="closeModal(event)">
    <div class="edit-modal" onclick="event.stopPropagation()">
      <h2>${c?'Edit contact':'New contact'}</h2>
      <div class="photo-upload-wrap">
        <div class="photo-preview" id="photo-preview" style="${prevStyle}" onclick="document.getElementById('f-photo-input').click()">
          ${prevInner}<div class="photo-overlay">📷</div>
        </div>
        <div class="photo-upload-info">
          <p>Click to upload a photo</p>
          <div class="photo-btns">
            <button class="photo-btn" type="button" onclick="document.getElementById('f-photo-input').click()">Upload</button>
            <button class="photo-btn remove" type="button" id="remove-photo-btn" style="${(c&&c.photo)?'':'display:none'}" onclick="removePhoto()">Remove</button>
          </div>
        </div>
        <input type="file" id="f-photo-input" accept="image/*" onchange="handlePhotoUpload(event)" />
      </div>
      <div class="form-row">
        <div class="form-group-inline"><label>Pastor name</label><input id="f-pastor" value="${esc(v('pastor'))}" placeholder="First Last" /></div>
        <div class="form-group-inline"><label>Church</label><input id="f-church" value="${esc(v('church'))}" placeholder="Church name" /></div>
      </div>
      <div class="form-row">
        <div class="form-group-inline"><label>City</label><input id="f-city" value="${esc(v('city'))}" placeholder="City" /></div>
        <div class="form-group-inline"><label>State</label><input id="f-state" value="${esc(v('state')||'IL')}" placeholder="IL" maxlength="2" style="text-transform:uppercase" /></div>
      </div>
      <div class="form-row">
        <div class="form-group-inline"><label>Region</label><select id="f-region"><option value="">—</option>${regOpts}</select></div>
        <div class="form-group-inline"><label>Phone</label><input id="f-phone" value="${esc(v('phone'))}" placeholder="(000) 000-0000" /></div>
      </div>
      <div class="form-row">
        <div class="form-group-inline full"><label>Address</label><input id="f-address" value="${esc(v('address'))}" placeholder="Street address" /></div>
      </div>
      <div class="form-row">
        <div class="form-group-inline full"><label>Email</label><input id="f-email" type="email" value="${esc(v('email'))}" placeholder="pastor@church.com" /></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveContactModal('${id||''}')">Save</button>
      </div>
    </div>
  </div>`);
}

function handlePhotoUpload(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    pendingPhoto=ev.target.result;
    const p=document.getElementById('photo-preview'); if(!p) return;
    p.style.background='';
    p.innerHTML=`<img src="${pendingPhoto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"><div class="photo-overlay">📷</div>`;
    const rb=document.getElementById('remove-photo-btn'); if(rb) rb.style.display='';
  };
  reader.readAsDataURL(file);
}
function removePhoto(){
  pendingPhoto='';
  const nm=(document.getElementById('f-pastor')||{}).value||'';
  const[bg,fg]=avatarColor(nm||'?');
  const p=document.getElementById('photo-preview'); if(!p) return;
  p.style.background=bg;
  p.innerHTML=`<span style="color:${fg}">${initials(nm||'?')}</span><div class="photo-overlay">📷</div>`;
  const rb=document.getElementById('remove-photo-btn'); if(rb) rb.style.display='none';
}
function saveContactModal(id){
  const church=(document.getElementById('f-church')||{}).value||'';
  const pastor=(document.getElementById('f-pastor')||{}).value||'';
  if(!church.trim()&&!pastor.trim()){ alert('Church or pastor name is required.'); return; }
  const data={
    pastor:pastor.trim(), church:church.trim(),
    city:(document.getElementById('f-city')||{}).value?.trim()||'',
    state:((document.getElementById('f-state')||{}).value||'').trim().toUpperCase(),
    region:(document.getElementById('f-region')||{}).value||'',
    phone:(document.getElementById('f-phone')||{}).value?.trim()||'',
    address:(document.getElementById('f-address')||{}).value?.trim()||'',
    email:(document.getElementById('f-email')||{}).value?.trim()||'',
  };
  if(pendingPhoto!==null) data.photo=pendingPhoto;
  if(id){ const c=contacts.find(x=>x.id===id); Object.assign(c,data); }
  else { contacts.push({id:uid(),calls:[],notes:[],photo:'',...data}); }
  pendingPhoto=null; closeModal(); save(); renderAll();
}
function deleteContact(id){
  if(!confirm('Delete this contact? This cannot be undone.')) return;
  contacts=contacts.filter(c=>c.id!==id);
  closeModal(); save(); renderAll();
}

/* ─── Modal layer helpers ─── */
function showModal(html){
  const layer=document.getElementById('modal-layer');
  layer.style.display='block';
  layer.innerHTML=html;
}
function closeModal(e){
  if(e&&e.target!==e.currentTarget) return;
  pendingPhoto=null; logCallOutcome=null; logCallMeeting=false;
  const layer=document.getElementById('modal-layer');
  layer.style.display='none';
  layer.innerHTML='';
}

load(); renderAll();
</script>
</body>
</html>
