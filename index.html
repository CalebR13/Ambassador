<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --text: #e8e6e1; --muted: #6b6860; --accent: #4a9e6b; --accent-light: #1a2e22;
    --danger: #e05555;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
    --radius: 10px; --radius-sm: 6px;
  }
  html, body { height: 100%; margin: 0; padding: 0; background: #0f0f0f; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); overflow: hidden; }

  /* APP SHELL */
  #app { display: flex; flex-direction: column; height: 100vh; position: relative; overflow: hidden; }

  /* TOP BAR */
  .top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; }
  .top-bar-title { font-family: var(--serif); font-size: 18px; color: var(--accent); margin-right: 4px; }
  .search-wrap { position: relative; flex: 1; max-width: 280px; }
  .search-wrap svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 13px; height: 13px; }
  #search { width: 100%; padding: 6px 8px 6px 26px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; background: var(--surface2); color: var(--text); font-family: var(--sans); }
  #search:focus { outline: none; border-color: var(--accent); }
  .filter-row { display: flex; gap: 4px; overflow-x: auto; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-pill { font-size: 10px; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); background: none; cursor: pointer; font-family: var(--sans); color: var(--muted); white-space: nowrap; }
  .filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .top-bar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .count-badge { font-size: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; color: var(--muted); }
  .add-btn { padding: 5px 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; }

  /* LIST */
  .list-header { display: grid; grid-template-columns: 38px 1.4fr 1fr 1fr 80px; padding: 0 12px; height: 32px; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; }
  .list-header-cell { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 500; padding: 0 6px; }
  .main-list { flex: 1; overflow-y: auto; }
  .main-list::-webkit-scrollbar { width: 3px; }
  .main-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .contact-row { display: grid; grid-template-columns: 38px 1.4fr 1fr 1fr 80px; padding: 0 12px; min-height: 50px; align-items: center; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; border-left: 3px solid transparent; }
  .contact-row.status-pastor    { border-left-color: #4cd68a; }
  .contact-row.status-voicemail { border-left-color: #8899ee; }
  .contact-row.status-secretary { border-left-color: #d4934a; }
  .contact-row.status-reminder  { border-left-color: #f0b429; }
  .contact-row.status-none      { border-left-color: transparent; }
  .contact-row:hover { background: var(--surface); }
  .row-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; }
  .row-cell { padding: 6px; min-width: 0; }
  .row-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-sub { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-plain { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); }
  .last-call-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; }
  .lcb-pastor { background: #1a3a28; color: #4cd68a; }
  .lcb-voicemail { background: #1e2244; color: #8899ee; }
  .lcb-secretary { background: #2e2010; color: #d4934a; }
  .lcb-none { background: var(--surface2); color: var(--muted); }
  .lcb-reminder { background: #2e1f00; color: #f0b429; }
  .row-actions { display: flex; align-items: center; gap: 5px; padding: 0 6px; justify-content: flex-end; }
  .action-btn { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--text); text-decoration: none; transition: all .12s; }
  .action-btn:hover { background: var(--surface2); }
  .action-btn.log { border-color: #6b7fd433; color: #8899ee; }
  .action-btn.log:hover { background: #1e2244; }
  .empty-state { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); font-size: 13px; }
  .status-pill { display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; letter-spacing: .04em; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; }
  .pill-pastor    { background: #1a3a28; color: #4cd68a; }
  .pill-voicemail { background: #1e2244; color: #8899ee; }
  .pill-secretary { background: #2e2010; color: #d4934a; }
  .pill-reminder  { background: #2e1f00; color: #f0b429; }
  .pill-none      { background: var(--surface2); color: var(--muted); }
  .reminder-dot { width: 7px; height: 7px; border-radius: 50%; background: #f0b429; display: inline-block; margin-left: 4px; vertical-align: middle; } border-radius: 50%; background: #f0b429; display: inline-block; margin-left: 4px; vertical-align: middle; }

  /* FULL SCREEN CALLING CARD */
  .fullscreen-card {
    position: absolute; inset: 0; z-index: 100;
    background: var(--bg);
    flex-direction: column;
    overflow: hidden;
  }
  .fullscreen-card.visible { display: flex; }

  /* Card top bar */
  .card-topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .card-back-btn {
    background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 5px 12px; font-family: var(--sans); font-size: 12px;
    color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 5px;
  }
  .card-back-btn:hover { background: var(--surface2); }
  .card-topbar-center { flex: 1; text-align: center; }
  .card-progress-label { font-size: 11px; color: var(--muted); }
  .card-progress-bar-wrap { width: 120px; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 4px auto 0; }
  .card-progress-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
  .card-edit-btn {
    background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 4px 10px; font-family: var(--sans); font-size: 11px;
    color: var(--muted); cursor: pointer;
  }
  .card-edit-btn:hover { background: var(--surface2); color: var(--text); }

  /* Card scroll body */
  .card-body { flex: 1; overflow-y: auto; }
  .card-body::-webkit-scrollbar { width: 3px; }
  .card-body::-webkit-scrollbar-thumb { background: var(--border); }

  /* Hero section */
  .card-hero {
    padding: 28px 32px 20px;
    display: flex; align-items: center; gap: 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
  }
  .card-hero-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 500; flex-shrink: 0;
  }
  .card-hero-info { flex: 1; min-width: 0; }
  .card-hero-name { font-family: var(--serif); font-size: 32px; line-height: 1.1; margin-bottom: 4px; }
  .card-hero-church { font-size: 14px; color: var(--muted); margin-bottom: 6px; }
  .card-hero-location { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .card-hero-region { font-size: 11px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; }

  /* Info strip */
  .card-info-strip {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .info-item {
    flex: 1; padding: 12px 16px;
    border-right: 1px solid var(--border);
  }
  .info-item:last-child { border-right: none; }
  .info-label { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 3px; }
  .info-value { font-size: 12px; color: var(--text); line-height: 1.4; word-break: break-word; }
  .info-value.empty { color: var(--muted); font-style: italic; }

  /* Action buttons */
  .card-actions {
    display: flex; gap: 10px; padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .card-action-btn {
    flex: 1; min-width: 90px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 12px 8px; border-radius: var(--radius);
    border: 1px solid var(--border); background: none;
    font-family: var(--sans); cursor: pointer; transition: all .15s;
    color: var(--text); position: relative;
  }
  .card-action-btn .btn-icon { font-size: 22px; }
  .card-action-btn .btn-label { font-size: 10px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
  .card-action-btn.green { border-color: #4a9e6b44; }
  .card-action-btn.green:hover, .card-action-btn.green.active { background: var(--accent-light); border-color: var(--accent); }
  .card-action-btn.blue { border-color: #6b7fd444; }
  .card-action-btn.blue:hover { background: #1e2244; border-color: #8899ee; }
  .card-action-btn.yellow { border-color: #f0b42944; }
  .card-action-btn.yellow:hover { background: #2e1f00; border-color: #f0b429; }
  .card-action-btn.teal { border-color: #2a7a8a44; }
  .card-action-btn.teal:hover { background: #0e2226; border-color: #4ac4d4; }

  /* Contact sub-menu */
  .contact-submenu {
    display: none; flex-direction: column; gap: 6px;
    padding: 12px 32px; background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .contact-submenu.open { display: flex; flex-direction: row; flex-wrap: wrap; gap: 8px; }
  .contact-sub-btn {
    flex: 1; min-width: 80px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--bg);
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    cursor: pointer; color: var(--text); text-decoration: none;
    transition: all .12s;
  }
  .contact-sub-btn:hover { border-color: var(--accent); color: var(--accent); }
  .contact-sub-btn.call-sub { border-color: #4a9e6b44; color: #4a9e6b; }
  .contact-sub-btn.call-sub:hover { background: var(--accent-light); }
  .contact-sub-btn.text-sub { border-color: #6b7fd444; color: #8899ee; }
  .contact-sub-btn.text-sub:hover { background: #1e2244; }
  .contact-sub-btn.email-sub { border-color: #d4b06b44; color: #d4b06b; }
  .contact-sub-btn.email-sub:hover { background: #2e2a1a; }

  /* History */
  .card-history { padding: 20px 32px 24px; }
  .history-title { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 12px; font-weight: 500; }
  .call-entry { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; position: relative; }
  .call-top { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 4px; }
  .outcome-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .outcome-pastor { background: #1a3a28; color: #4cd68a; }
  .outcome-voicemail { background: #1e2244; color: #8899ee; }
  .outcome-secretary { background: #2e2010; color: #d4934a; }
  .outcome-imported { background: var(--surface2); color: var(--muted); }
  .outcome-reminder { background: #2e1f00; color: #f0b429; }
  .call-date { font-size: 10px; color: var(--muted); margin-left: auto; }
  .call-details-text { font-size: 13px; color: var(--text); line-height: 1.6; white-space: pre-wrap; margin-top: 5px; }
  .call-del { position: absolute; top: 9px; right: 9px; background: none; border: none; cursor: pointer; color: var(--border); font-size: 14px; padding: 2px 5px; border-radius: 3px; }
  .call-del:hover { color: var(--danger); }
  .no-calls { font-size: 12px; color: var(--muted); font-style: italic; }

  /* Card nav footer */
  .card-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; border-top: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .nav-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 9px 20px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: none;
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    cursor: pointer; color: var(--text); transition: all .12s;
  }
  .nav-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

  .nav-btn.next { background: var(--accent); border-color: var(--accent); color: #fff; }
  .nav-btn.next:hover:not(:disabled) { opacity: .88; }

  /* MODALS (for log/reminder/calendar/edit) */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
  .modal-box { background: var(--surface); border-radius: 14px; width: 440px; max-width: 100%; max-height: 88vh; overflow-y: auto; border: 1px solid var(--border); padding: 24px; box-shadow: 0 24px 80px rgba(0,0,0,.8); }
  .modal-box h2 { font-family: var(--serif); font-size: 20px; margin-bottom: 6px; }
  .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .fg label { font-size: 9px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); font-weight: 500; }
  .fg input, .fg textarea, .fg select { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px; background: var(--bg); color: var(--text); width: 100%; }
  .fg input:focus, .fg textarea:focus, .fg select:focus { outline: none; border-color: var(--accent); }

  .outcome-opt.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
  .opt-icon { font-size: 18px; display: block; margin-bottom: 4px; }

  .meeting-row label { font-size: 13px; flex: 1; }
  .toggle-wrap { display: flex; gap: 5px; }

  .cal-open-btn { width: 100%; padding: 11px; background: #1a73e8; color: #fff; border: none; border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .fgi { display: flex; flex-direction: column; gap: 4px; }
  .fgi.full { grid-column: 1/-1; }
  .fgi label { font-size: 9px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); font-weight: 500; }
  .fgi input, .fgi select { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px; background: var(--bg); color: var(--text); }
  .fgi input:focus, .fgi select:focus { outline: none; border-color: var(--accent); }
  .fgi select option { background: var(--surface); }
</style>

  {id:'c5',pastor:'Ralph Warren',church:'Lake County Baptist Temple',city:'Waukegan',state:'IL',region:'Northeast',email:'PastorRLW@aol.com',phone:'(847) 623-7600',address:'1550 W Yorkhouse Rd',notes:[],photo:'',calls:[{id:'l4',date:'May 10, 2026',outcome:'voicemail',meetingBooked:false,meetingDate:'',details:'Left detailed voicemail'}]},
  {id:'c6',pastor:'Tommy McMurtry',church:'Liberty Baptist Church',city:'Rock Falls',state:'IL',region:'Northwest',email:'',phone:'(815) 625-4101',address:'2002 9th Ave',notes:[],photo:'',calls:[]},
  {id:'c7',pastor:'Sean Hicks',church:'Cornerstone Baptist Church',city:'Salem',state:'IL',region:'South',email:'pastor@cornerstonesalem.com',phone:'(618) 548-1547',address:'3561 Boone St Rd',notes:[],photo:'',calls:[{id:'l5',date:'May 14, 2026',outcome:'reminder',meetingBooked:false,meetingDate:'',details:'Call back May 22'}]}
];

function ac(n){let h=0;for(let c of(n||'X'))h=(h*31+c.charCodeAt(0))&0xffffffff;return AC[Math.abs(h)%AC.length];}
function ini(n){return(n||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function primaryPhone(p){return(p||'').split(/[,;\/]/)[0].trim();}
function load(){contacts=JSON.parse(localStorage.getItem('relay_v5')||'null')||SAMPLE.map(c=>({...c}));}
function save(){localStorage.setItem('relay_v5',JSON.stringify(contacts));}
function lc(c){const r=(c.calls||[]).filter(x=>x.outcome!=='imported');return r.length?r[r.length-1]:null;}

function renderFilters(){
  const states=['All',...Array.from(new Set(contacts.map(c=>(c.state||'').trim()).filter(Boolean))).sort()];
  document.getElementById('state-filter-row').innerHTML=states.map(s=>`<button class="filter-pill${fState===s?' active':''}" onclick="setSF('${s}')">${s==='All'?'All States':s}</button>`).join('');
  const vis=fState==='All'?contacts:contacts.filter(c=>(c.state||'').toUpperCase()===fState);
  const regs=['All',...Array.from(new Set(vis.map(c=>c.region||'').filter(Boolean))).sort()];
  document.getElementById('region-filter-row').innerHTML=regs.map(r=>`<button class="filter-pill${fReg===r?' active':''}" onclick="setRF('${r}')">${r==='All'?'All Regions':r}</button>`).join('');
}
function setSF(s){fState=s;fReg='All';renderFilters();renderList();}
function setRF(r){fReg=r;renderList();}

function buildFilteredList(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  let f=contacts.filter(c=>{
    const ms=fState==='All'||(c.state||'').toUpperCase()===fState;
    const mr=fReg==='All'||(c.region||'')===fReg;
    const mq=!q||(c.pastor||'').toLowerCase().includes(q)||(c.church||'').toLowerCase().includes(q)||(c.city||'').toLowerCase().includes(q)||(c.phone||'').toLowerCase().includes(q);
    return ms&&mr&&mq;
  });
  f.sort((a,b)=>(a.pastor||a.church||'').localeCompare(b.pastor||b.church||''));
  return f;
}

function renderList(){
  filteredList=buildFilteredList();
  document.getElementById('count-label').textContent=filteredList.length+' / '+contacts.length;
  const list=document.getElementById('main-list');
  if(!filteredList.length){list.innerHTML='<div class="empty-state">No contacts found</div>';return;}
  list.innerHTML=filteredList.map((c,i)=>{
    const[bg,fg]=ac(c.pastor||c.church||'?');
    const lcall=lc(c);
    const statusCls=lcall?('status-'+(lcall.outcome==='imported'?'none':lcall.outcome)):'status-none';
    const pillMap={pastor:['P','pill-pastor'],voicemail:['VM','pill-voicemail'],secretary:['S','pill-secretary'],reminder:['R','pill-reminder']};
    const pillData=lcall&&pillMap[lcall.outcome]?pillMap[lcall.outcome]:null;
    const pill=pillData?`<span class="status-pill ${pillData[1]}">${pillData[0]}</span>`:`<span class="status-pill pill-none">—</span>`;
    const loc=[c.city,c.state].filter(Boolean).join(', ');
    const hasReminder=(c.calls||[]).some(x=>x.outcome==='reminder');
    return `<div class="contact-row ${statusCls}" onclick="openCallingCard(${i})">
      <div style="padding:0 4px"><div class="row-avatar" style="background:${bg};color:${fg}">${ini(c.pastor||c.church||'?')}</div></div>
      <div class="row-cell"><div class="row-name">${esc(c.pastor||'—')}${hasReminder?'<span class="reminder-dot"></span>':''}</div><div class="row-sub">${esc(c.church||'')}</div></div>
      <div class="row-cell"><div class="row-plain">${esc(loc)||'—'}</div></div>
      <div class="row-cell">${pill}</div>
      <div class="row-actions" onclick="event.stopPropagation()">
        <button class="action-btn log" onclick="openLogModal('${c.id}')" title="Log call">📋</button>
      </div>
    </div>`;
  }).join('');
}

/* ── FULL SCREEN CALLING CARD ── */
function openCallingCard(idx){
  filteredList=buildFilteredList();
  callingIdx=idx;
  contactMenuOpen=false;
  renderCallingCard();
}

function renderCallingCard(){
  const c=filteredList[callingIdx];
  if(!c){closeCard();return;}
  const[bg,fg]=ac(c.pastor||c.church||'?');
  const total=filteredList.length;
  const pct=Math.round(((callingIdx+1)/total)*100);
  const ph=primaryPhone(c.phone);
  const tel=ph?`tel:${ph.replace(/[^+0-9]/g,'')}`:null;
  const sms=ph?`sms:${ph.replace(/[^+0-9]/g,'')}`:null;
  const mailto=c.email?`mailto:${c.email}`:null;
  const calls=(c.calls||[]).slice().reverse();
  const realCalls=calls.filter(x=>x.outcome!=='imported');
  const menuOpen=contactMenuOpen;

  const card=document.getElementById('fullscreen-card');
  card.classList.add('visible');
  card.style.display='';
  card.innerHTML=`
    <!-- Top bar -->
    <div class="card-topbar">
      <button class="card-back-btn" onclick="closeCard()">← Back</button>
      <div class="card-topbar-center">
        <div class="card-progress-label">${callingIdx+1} of ${total}</div>
        <div class="card-progress-bar-wrap"><div class="card-progress-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <button class="card-edit-btn" onclick="openContactModal('${c.id}')">✏️ Edit</button>
    </div>

    <!-- Scrollable body -->
    <div class="card-body">

      <!-- Hero -->
      <div class="card-hero">
        <div class="card-hero-avatar" style="background:${bg};color:${fg}">${ini(c.pastor||c.church||'?')}</div>
        <div class="card-hero-info">
          <div class="card-hero-name">${esc(c.pastor||'Unknown Pastor')}</div>
          <div class="card-hero-church">${esc(c.church||'—')}</div>
          <div class="card-hero-location">
            📍 ${esc([c.city,c.state].filter(Boolean).join(', ')||'—')}
            ${c.region?`<span class="card-hero-region">${esc(c.region)}</span>`:''}
          </div>
        </div>
      </div>

      <!-- Info strip: phone / email / address -->
      <div class="card-info-strip">
        <div class="info-item">
          <div class="info-label">Phone</div>
          <div class="info-value${!c.phone?' empty':''}">${c.phone?esc(c.phone):'—'}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Email</div>
          <div class="info-value${!c.email?' empty':''}">${c.email?esc(c.email):'—'}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Address</div>
          <div class="info-value${!c.address?' empty':''}">${c.address?esc(c.address):'—'}</div>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="card-actions">
        <button class="card-action-btn green${menuOpen?' active':''}" onclick="toggleContactMenu()">
          <span class="btn-icon">👤</span>
          <span class="btn-label">Contact</span>
        </button>
        <button class="card-action-btn blue" onclick="openLogModal('${c.id}')">
          <span class="btn-icon">📋</span>
          <span class="btn-label">Log Call</span>
        </button>
        <button class="card-action-btn yellow" onclick="openReminderModal('${c.id}')">
          <span class="btn-icon">🔔</span>
          <span class="btn-label">Reminder</span>
        </button>
        <button class="card-action-btn teal" onclick="openCalendarModal('${c.id}')">
          <span class="btn-icon">📅</span>
          <span class="btn-label">Calendar</span>
        </button>
      </div>

      <!-- Contact sub-menu -->
      <div class="contact-submenu${menuOpen?' open':''}" id="contact-submenu">
        ${tel?`<a href="${tel}" class="contact-sub-btn call-sub">📞 Call</a>`:`<span class="contact-sub-btn" style="opacity:.3;cursor:default">📞 Call</span>`}
        ${sms?`<a href="${sms}" class="contact-sub-btn text-sub">💬 Text</a>`:`<span class="contact-sub-btn" style="opacity:.3;cursor:default">💬 Text</span>`}
        ${mailto?`<a href="${mailto}" class="contact-sub-btn email-sub">✉️ Email</a>`:`<span class="contact-sub-btn" style="opacity:.3;cursor:default">✉️ Email</span>`}
      </div>

      <!-- Call history -->
      <div class="card-history">
        <div class="history-title">Call history (${realCalls.length})</div>
        ${calls.length
          ? calls.map(x=>{
              const m=OM[x.outcome]||OM.imported;
              const mb=x.meetingBooked?`<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;background:#1a2e22;color:#4a9e6b;margin-left:4px">📅 ${x.meetingDate?esc(x.meetingDate):'Meeting booked'}</span>`:'';
              return `<div class="call-entry">
                <div class="call-top"><span class="outcome-badge ${m.cls}">${m.icon} ${m.label}</span>${mb}<span class="call-date">${x.date}</span></div>
                ${x.details?`<div class="call-details-text">${esc(x.details)}</div>`:''}
                <button class="call-del" onclick="delCall('${c.id}','${x.id}')">×</button>
              </div>`;
            }).join('')
          : `<div class="no-calls">No calls logged yet.</div>`
        }
      </div>
    </div>

    <!-- Nav footer -->
    <div class="card-nav">
      <button class="nav-btn" onclick="navCard(-1)" ${callingIdx===0?'disabled':''}>← Prev</button>
      <span style="font-size:11px;color:var(--muted);text-align:center;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.pastor||c.church||'')}</span>
      <button class="nav-btn next" onclick="navCard(1)" ${callingIdx===total-1?'disabled':''}>Next →</button>
    </div>
  `;
}

function toggleContactMenu(){
  contactMenuOpen=!contactMenuOpen;
  renderCallingCard();
}

function closeCard(){
  document.getElementById('fullscreen-card').classList.remove('visible');
  document.getElementById('fullscreen-card').style.display='none';
  document.getElementById('fullscreen-card').innerHTML='';
  contactMenuOpen=false;
  renderList();
}

function navCard(dir){
  const next=callingIdx+dir;
  if(next<0||next>=filteredList.length)return;
  callingIdx=next;
  contactMenuOpen=false;
  renderCallingCard();
}

/* ── LOG MODAL ── */
function openLogModal(cid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  logOut=null;logMtg=false;
  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h2>Log a call</h2>
      <div class="modal-sub">${esc(c.pastor||c.church||'')} · ${esc([c.city,c.state].filter(Boolean).join(', '))}</div>
      <div class="fg"><label>Outcome *</label>
        <div class="outcome-opts">
          <button class="outcome-opt" id="op-pastor" onclick="selOut('pastor')"><span class="opt-icon">🙋</span>Spoke to Pastor</button>
          <button class="outcome-opt" id="op-voicemail" onclick="selOut('voicemail')"><span class="opt-icon">📵</span>No Response / Voicemail</button>
          <button class="outcome-opt" id="op-secretary" onclick="selOut('secretary')"><span class="opt-icon">📋</span>Spoke to Secretary</button>
        </div>
      </div>
      <div id="mtg-sec" style="display:none">
        <div class="meeting-row"><label>Meeting booked?</label>
          <div class="toggle-wrap">
            <button class="toggle-btn off" id="mtg-yes" onclick="setMtg(true)">Yes</button>
            <button class="toggle-btn on" id="mtg-no" onclick="setMtg(false)">No</button>
          </div>
        </div>
        <div id="mtg-date" style="display:none"><div class="fg"><label>Meeting date</label><input type="text" id="mtg-d" placeholder="e.g. June 15, 2026"/></div></div>
      </div>
      <div class="fg"><label>Details <span style="color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label>
        <textarea id="call-det" placeholder="Who you spoke with, what was discussed…"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button>
        <button class="btn-save" onclick="saveLog('${cid}')">Save call</button>
      </div>
    </div>
  </div>`);
}
function selOut(o){logOut=o;['pastor','voicemail','secretary'].forEach(k=>{const el=document.getElementById('op-'+k);if(el)el.classList.toggle('selected',k===o);});const ms=document.getElementById('mtg-sec');if(ms)ms.style.display=o==='voicemail'?'none':'block';if(o==='voicemail')logMtg=false;}
function setMtg(v){logMtg=v;const y=document.getElementById('mtg-yes');if(y)y.className='toggle-btn '+(v?'on':'off');const n=document.getElementById('mtg-no');if(n)n.className='toggle-btn '+(v?'off':'on');const d=document.getElementById('mtg-date');if(d)d.style.display=v?'block':'none';}
function saveLog(cid){
  if(!logOut){alert('Please select an outcome.');return;}
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  if(!c.calls)c.calls=[];
  const md=(document.getElementById('mtg-d')||{}).value||'';
  c.calls.push({id:uid(),date:fmtDate(new Date()),outcome:logOut,meetingBooked:logMtg,meetingDate:md.trim(),details:(document.getElementById('call-det').value||'').trim()});
  save();closeMKeepCard();renderCallingCard();renderList();
}
function delCall(cid,xid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  c.calls=(c.calls||[]).filter(x=>x.id!==xid);
  save();renderCallingCard();renderList();
}

/* ── REMINDER MODAL ── */
function openReminderModal(cid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h2>🔔 Set Reminder</h2>
      <div class="modal-sub">Set a call-back reminder for ${esc(c.pastor||c.church||'this contact')}.</div>
      <div class="fg"><label>Call back on</label><input type="date" id="rem-date"/></div>
      <div class="fg"><label>Note <span style="color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label>
        <textarea id="rem-note" placeholder="e.g. Call back after 10am, ask about missions budget…" style="height:60px"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button>
        <button class="btn-save" onclick="saveReminder('${cid}')">Save reminder</button>
      </div>
    </div>
  </div>`);
}
function saveReminder(cid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  const d=document.getElementById('rem-date').value;
  const note=document.getElementById('rem-note').value||'';
  if(!d){alert('Please pick a date.');return;}
  const label=new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  if(!c.calls)c.calls=[];
  c.calls.push({id:uid(),date:fmtDate(new Date()),outcome:'reminder',meetingBooked:false,meetingDate:'',details:`Call back ${label}${note?'\n'+note:''}`});
  save();closeMKeepCard();renderCallingCard();renderList();
}

/* ── CALENDAR MODAL ── */
function openCalendarModal(cid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h2>📅 Add to Calendar</h2>
      <div class="modal-sub">Pick a date and we'll open Google Calendar with the event pre-filled.</div>
      <div class="fg"><label>Meeting date</label><input type="date" id="cal-date"/></div>
      <div class="fg"><label>Meeting time <span style="color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label><input type="time" id="cal-time"/></div>
      <button class="cal-open-btn" onclick="openGCal('${cid}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
        Open Google Calendar
      </button>
      <div class="modal-actions" style="margin-top:10px">
        <button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button>
      </div>
    </div>
  </div>`);
}
function openGCal(cid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  const d=document.getElementById('cal-date').value;
  const t=document.getElementById('cal-time').value;
  if(!d){alert('Please pick a date.');return;}
  const title=encodeURIComponent(`Meeting: ${c.pastor||c.church||'Pastor'} — ${c.church||''}`);
  const loc=encodeURIComponent([c.address,c.city,c.state].filter(Boolean).join(', '));
  const details=encodeURIComponent(`Pastor: ${c.pastor||''}\nChurch: ${c.church||''}\nPhone: ${c.phone||''}\nEmail: ${c.email||''}`);
  let dates='';
  if(t){const s=d.replace(/-/g,'')+'T'+t.replace(':','')+'00';const eh=String(Number(t.split(':')[0])+1).padStart(2,'0');const e=d.replace(/-/g,'')+'T'+eh+t.split(':')[1]+'00';dates=`${s}/${e}`;}
  else{const day=d.replace(/-/g,'');dates=`${day}/${day}`;}
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&location=${loc}&details=${details}`,'_blank');
  if(!c.calls)c.calls=[];
  const lbl=new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  c.calls.push({id:uid(),date:fmtDate(new Date()),outcome:'pastor',meetingBooked:true,meetingDate:lbl,details:`Meeting scheduled for ${lbl}`});
  save();closeMKeepCard();renderCallingCard();renderList();
}

/* ── EDIT MODAL ── */
function openContactModal(id){
  const c=id?contacts.find(x=>x.id===id):null;
  const v=f=>c?(c[f]||''):'';
  const ro=REGS.map(o=>`<option${v('region')===o?' selected':''}>${o}</option>`).join('');
  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h2>${c?'Edit contact':'New contact'}</h2>
      <div class="form-row">
        <div class="fgi"><label>Pastor name</label><input id="fp" value="${esc(v('pastor'))}" placeholder="First Last"/></div>
        <div class="fgi"><label>Church</label><input id="fc" value="${esc(v('church'))}" placeholder="Church name"/></div>
      </div>
      <div class="form-row">
        <div class="fgi"><label>City</label><input id="fci" value="${esc(v('city'))}" placeholder="City"/></div>
        <div class="fgi"><label>State</label><input id="fst" value="${esc(v('state')||'IL')}" placeholder="IL" maxlength="2" style="text-transform:uppercase"/></div>
      </div>
      <div class="form-row">
        <div class="fgi"><label>Region</label><select id="fr"><option value="">—</option>${ro}</select></div>
        <div class="fgi"><label>Phone</label><input id="fph" value="${esc(v('phone'))}" placeholder="(000) 000-0000"/></div>
      </div>
      <div class="form-row"><div class="fgi full"><label>Address</label><input id="fa" value="${esc(v('address'))}" placeholder="Street address"/></div></div>
      <div class="form-row"><div class="fgi full"><label>Email</label><input id="fe" type="email" value="${esc(v('email'))}" placeholder="pastor@church.com"/></div></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button>
        <button class="btn-save" onclick="saveCM('${id||''}')">Save</button>
      </div>
    </div>
  </div>`);
}
function saveCM(id){
  const ch=(document.getElementById('fc')||{}).value||'';
  const pa=(document.getElementById('fp')||{}).value||'';
  if(!ch.trim()&&!pa.trim()){alert('Church or pastor name required.');return;}
  const d={pastor:pa.trim(),church:ch.trim(),city:(document.getElementById('fci')||{}).value?.trim()||'',state:((document.getElementById('fst')||{}).value||'').trim().toUpperCase(),region:(document.getElementById('fr')||{}).value||'',phone:(document.getElementById('fph')||{}).value?.trim()||'',address:(document.getElementById('fa')||{}).value?.trim()||'',email:(document.getElementById('fe')||{}).value?.trim()||''};
  if(id){const c=contacts.find(x=>x.id===id);Object.assign(c,d);}
  else{contacts.push({id:uid(),calls:[],notes:[],photo:'',...d});}
  save();closeMKeepCard();renderFilters();renderList();
  if(id) renderCallingCard();
}

/* ── HELPERS ── */
function showM(h){const l=document.getElementById('modal-layer');l.innerHTML=h;l.style.pointerEvents='all';}
function closeMKeepCard(e){if(e&&e.target!==e.currentTarget)return;logOut=null;logMtg=false;const l=document.getElementById('modal-layer');l.innerHTML='';l.style.pointerEvents='none';}

load(); renderFilters(); renderList();
</script>
</body>
</html>
