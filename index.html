    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;" onclick="document.getElementById('mc-log-${mid}').style.display=document.getElementById('mc-log-${mid}').style.display==='none'?'block':'none'">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span style="font-size:11px;font-weight:600;color:var(--text);">Contact Log</span>
        </div>
        ${lastCall ? `<div style="font-size:11px;color:var(--muted);margin-bottom:3px;">${fmtCallDate(lastCall.date||'')}</div><div style="font-size:12px;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${esc((lastCall.details||'').split('\n')[0]||lastCall.outcome||'—')}</div>` : `<div style="font-size:12px;color:var(--muted);">No logs yet</div>`}
        <button onclick="event.stopPropagation();openManifestLogEntry('${mid}')" style="margin-top:8px;width:100%;padding:6px;background:none;border:1px solid var(--accent);border-radius:var(--radius-sm);font-family:var(--sans);font-size:11px;font-weight:600;color:var(--accent);cursor:pointer;position:sticky;bottom:0;">+ Log</button>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;cursor:pointer;" onclick="document.getElementById('mc-visits-${mid}').style.display=document.getElementById('mc-visits-${mid}').style.display==='none'?'block':'none'">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span style="font-size:11px;font-weight:600;color:var(--text);">Visit History</span>
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--text);">${visitCount} visit${visitCount!==1?'s':''}</div>
        ${lastVisit?`<div style="font-size:11px;color:var(--muted);margin-top:2px;">Last ${fmtCallDate(lastVisit.date)||lastVisit.date}</div>`:'<div style="font-size:11px;color:var(--muted);">No visits yet</div>'}
        <button onclick="event.stopPropagation();openAddVisitModal('${mid}')" style="margin-top:8px;width:100%;padding:6px;background:none;border:1px solid var(--accent);border-radius:var(--radius-sm);font-family:var(--sans);font-size:11px;font-weight:600;color:var(--accent);cursor:pointer;">+ Add Visit</button>
      </div>

    <!-- LOG ROWS (collapsible) -->
    <div id="mc-log-${mid}" style="display:none;background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:10px;">
      ${manifestCallLog.length ? manifestCallLog.map(x => {
        const outcomeLabels = {call:'Call',text:'Text',email:'Email',note:'Note',pastor:'Pastor',secretary:'Secretary',voicemail:'Voicemail'};

            <span style="font-size:11px;font-weight:600;color:var(--accent);">${label}</span>

function openManifestLog(mid) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;
  
  // Get or create pseudo contact entry for manifest calls
  let pseudo = contacts.find(c => c.id === mid);
  if (!pseudo) {
    pseudo = { id: mid, pastor: m.pastor, church: m.church, city: m.city, state: m.state, calls: [] };
    contacts.push(pseudo);
  }

  const callLog = (pseudo.calls||[]).filter(x=>x.outcome!=='imported').sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const logRows = callLog.length ? callLog.map(x => {
    const outcomeLabels = {pastor:'Pastor',secretary:'Secretary',voicemail:'Voicemail',no_answer:'No Answer',note:'Note',reminder:'Reminder',call:'Call',text:'Text',email:'Email'};
    const label = outcomeLabels[x.outcome] || x.outcome || 'Note';
    return `<div style="padding:10px 16px;border-bottom:1px solid var(--border);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
        <span style="font-size:11px;font-weight:600;color:var(--accent);">${label}</span>
        <span style="font-size:11px;color:var(--muted);">${fmtCallDate(x.date||'')}</span>
      </div>
      ${x.details?`<div style="font-size:12px;color:var(--text);line-height:1.4;white-space:pre-wrap;">${esc(x.details)}</div>`:''}
    </div>`;
  }).join('') : '<div style="padding:14px 16px;font-size:13px;color:var(--muted);">No logs yet</div>';

  showM(`<div class="modal-backdrop" onclick="if(event.target===this){const l=document.getElementById('modal-layer');l.innerHTML='';l.style.pointerEvents='none';}">
    <div class="modal-box" onclick="event.stopPropagation()" style="max-height:85vh;display:flex;flex-direction:column;padding:0;overflow:hidden;">
      <div style="padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <span style="font-family:var(--serif);font-size:18px;color:var(--text);">Contact Log</span>
        <button onclick="openManifestLogEntry('${mid}')" style="background:#F3B53A;border:none;border-radius:var(--radius-sm);padding:6px 14px;font-family:var(--sans);font-size:12px;font-weight:600;color:#000C1F;cursor:pointer;">+ Log</button>
      </div>
      <div style="overflow-y:auto;flex:1;">${logRows}</div>
      <div style="padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;">
        <button onclick="const l=document.getElementById('modal-layer');l.innerHTML='';l.style.pointerEvents='none';" style="width:100%;padding:10px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:13px;color:var(--muted);cursor:pointer;">Close</button>
      </div>
    </div>
  </div>`);
}

  const now = new Date();

function setMLogType(t) {
  window._mlogType = t;
  ['call','text','email','note'].forEach(type => {
    const btn = document.getElementById('mlt-' + type);
    if (!btn) return;
    const active = type === t;
    btn.style.borderColor = active ? '#F3B53A' : 'var(--border)';
    btn.style.background  = active ? '#2e1f00' : 'var(--surface2)';
    btn.style.color       = active ? '#F3B53A' : 'var(--muted)';
  });
}

function saveManifestLogEntry(mid) {
  const details = document.getElementById('mlog-details')?.value?.trim() || '';
  const type = window._mlogType || 'call';
  const now = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dateStr = `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

  let pseudo = contacts.find(c => c.id === mid);
  if (!pseudo) {
    const m = manifestContacts.find(x => x.id === mid);
    pseudo = { id: mid, pastor: m?.pastor||'', church: m?.church||'', city: m?.city||'', state: m?.state||'', calls: [] };
    contacts.push(pseudo);
  }
  if (!pseudo.calls) pseudo.calls = [];

  const entry = { id: uid(), contactId: mid, date: dateStr, outcome: type, meetingBooked: false, meetingDate: '', details, remDate: '', remTime: '', remType: '', completed: false };
  pseudo.calls.push(entry);
  save();
  saveCallEntry(mid, entry);
  haptic(10);
  closeMKeepCard();
  setTimeout(() => openManifestCard(mid), 220);
}

function saveManifestPhoto(mid) {

function closeManifestCard() {
  const screen = document.getElementById('manifest-card-screen');

  screen.classList.add('slide-out');
  setTimeout(() => {
    screen.classList.remove('visible', 'slide-out');
    window._currentManifestId = null;
  }, 190);
}

function setSailToManifest(cid) {
  const c = contacts.find(x => x.id === cid); if (!c) return;
  haptic(20);

  // Find the most recent booked meeting date
  const meetingCall = (c.calls||[]).filter(x=>x.meetingBooked).sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0];
  const nextVisitDate = meetingCall?.meetingDate || '';

  const newId = 'mfst-' + uid();
  const m = {
    id: newId,
    pastor: c.pastor || '',
    church: c.church || '',
    city: c.city || '',
    state: c.state || '',
    phone: c.phone || '',
    cell: c.cell || '',
    email: c.email || '',
    church_email: '',
    address: c.address || '',
    website: '',
    groups: 'Scheduled',
    lodging: '',
    rv_hookup: '',
    bible_handouts: '',
    support_status: 'Non-supporting',
    support_amount: '',
    support_cadence: '',
    relay_group: '',
    prayer_list: '',
    notes: c.notes ? (Array.isArray(c.notes) ? c.notes.join('\n') : c.notes) : '',
    starred: c.starred || false,
    next_visit_date: nextVisitDate,
    lat: c.lat || '',
    lng: c.lng || '',
  };
  manifestContacts.push(m);
  saveManifestContact(m);

  // Create a manifestVisit entry for the booked meeting date if one exists
  if (nextVisitDate) {
    const cleanDate = nextVisitDate.split(' – ')[0].split(' - ')[0].trim();
    const parsedDate = new Date(cleanDate);
    if (!isNaN(parsedDate.getTime())) {
      const isoDate = parsedDate.toISOString().slice(0,10);
      const endPart = meetingCall?.meetingEndDate || '';
      const visit = { id: uid(), manifestId: newId, date: isoDate, endDate: endPart, sermon: '', capacity: '', days: '', handout: '', notes: '' };
      manifestVisits.push(visit);
      saveVisitEntry(visit);
    }
  }

  // Migrate full call history — re-save each call under the new manifest ID
  if (c.calls && c.calls.length) {
    c.calls.forEach(call => {
      const migratedCall = {...call, contactId: newId};
      // Add to contacts array under new ID so manifest card can show them
      let pseudo = contacts.find(x => x.id === newId);
      if (!pseudo) {
        pseudo = {id: newId, pastor: m.pastor, church: m.church, city: m.city, state: m.state, calls: []};
        contacts.push(pseudo);
      }
      pseudo.calls = pseudo.calls || [];
      pseudo.calls.push(migratedCall);
      saveCallEntry(newId, migratedCall);
    });
  }

  // Remove from Voyage (including any pseudo entry we just created)
  contacts = contacts.filter(x => x.id !== cid && x.id !== newId);
  save();
  deleteContactEntry(cid);
  closeMKeepCard();
  closeCard();
  renderFilters();
  renderList();
  showStatus('Set sail to Manifest ⚓', 'ok');
}

  const scheduledV = manifestVisits.filter(v => v.manifestId === mid && v.date).find(v => nvMsE(v.endDate||v.date) >= todayMsE);
  const isScheduled = !!(scheduledV || (m.next_visit_date && nvMsE(m.next_visit_end_date||m.next_visit_date) >= todayMsE));

  function tagRow(label, active, color, onclick, readonly) {
    const activeStyle = active
      ? `background:${color}22;border-color:${color}88;`
      : 'background:var(--surface2);border-color:var(--border);';
    const indicator = active
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="${color}" stroke="${color}" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>`;
    const cursor = readonly ? 'default' : 'pointer';
    const opacity = readonly ? '0.6' : '1';
    return `<div onclick="${readonly ? '' : onclick}" style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:var(--radius-sm);border:1px solid;margin-bottom:8px;cursor:${cursor};opacity:${opacity};${activeStyle}">
      <span style="font-size:14px;font-weight:500;color:${active ? color : 'var(--text)'};">${label}</span>
      <div style="display:flex;align-items:center;gap:6px;">${active && readonly ? '<span style="font-size:10px;color:var(--muted);">auto</span>' : ''}${indicator}</div>
    </div>`;
  }

  const rows = [
    tagRow('Scheduled', isScheduled, '#4cd68a', '', true),
    tagRow('Supporting', m.support_status==='Supporting', '#4cd68a', `toggleManifestTag('${mid}','supporting')`, false),
    tagRow('Non-supporting', m.support_status==='Non-supporting', '#e05555', `toggleManifestTag('${mid}','nonsupporting')`, false),
    tagRow('Handouts', m.bible_handouts==='Yes', '#f0b429', `toggleManifestTag('${mid}','handouts')`, false),
    tagRow('Lodging', m.lodging==='Yes', '#8899ee', `toggleManifestTag('${mid}','lodging')`, false),
    tagRow('RV', m.rv_hookup==='Yes', '#8899ee', `toggleManifestTag('${mid}','rv')`, false),
    tagRow('Prayer List', m.prayer_list==='Yes', '#aaaaaa', `toggleManifestTag('${mid}','prayer')`, false),
  ].join('');

  showM(`<div class="modal-backdrop" onclick="if(event.target===this){const l=document.getElementById('modal-layer');l.innerHTML='';l.style.pointerEvents='none';setTimeout(()=>{ const mc=document.getElementById('manifest-card-${mid}');if(mc){ const b=mc.querySelector('.card-body');const s=b?b.scrollTop:0;openManifestCard('${mid}');requestAnimationFrame(()=>{const nb=document.getElementById('manifest-card-${mid}')?.querySelector('.card-body');if(nb)nb.scrollTop=s;}); } },50);}">
    <div class="snooze-modal" onclick="event.stopPropagation()" style="padding:20px 16px 28px;">
      <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;"></div>
      <h2 style="font-family:var(--serif);font-size:18px;margin-bottom:16px;">Tags</h2>
      <div id="tag-editor-rows">${rows}</div>
      <button onclick="const l=document.getElementById('modal-layer');l.innerHTML='';l.style.pointerEvents='none';setTimeout(()=>openManifestCard('${mid}'),50);" style="width:100%;margin-top:6px;padding:12px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;color:var(--muted);cursor:pointer;">Done</button>
    </div>
  </div>`);
}

function toggleManifestTag(mid, tag) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;
  if (tag === 'supporting') {
    m.support_status = 'Supporting';
  } else if (tag === 'nonsupporting') {
    m.support_status = 'Non-supporting';
  } else if (tag === 'handouts') {
    m.bible_handouts = m.bible_handouts === 'Yes' ? '' : 'Yes';
  } else if (tag === 'lodging') {
    m.lodging = m.lodging === 'Yes' ? '' : 'Yes';
  } else if (tag === 'rv') {
    m.rv_hookup = m.rv_hookup === 'Yes' ? '' : 'Yes';
  } else if (tag === 'prayer') {
    m.prayer_list = m.prayer_list === 'Yes' ? '' : 'Yes';
  }
  saveManifestContact(m);
  haptic(8);
  // Re-render the tag rows in place without closing the modal
  const todayTE = new Date().toISOString().slice(0,10);
  const nvMsE = t => { if(!t)return 0; const c=t.split(' – ')[0].split(' - ')[0].trim(); const x=new Date(c).getTime(); return isNaN(x)?0:x; };
  const todayMsE = Date.now();
  const scheduledV = manifestVisits.filter(v => v.manifestId === mid && v.date).find(v => nvMsE(v.endDate||v.date) >= todayMsE);
  const isScheduled = !!(scheduledV || (m.next_visit_date && nvMsE(m.next_visit_end_date||m.next_visit_date) >= todayMsE));
  function tagRow(label, active, color, onclick, readonly) {
    const activeStyle = active ? `background:${color}22;border-color:${color}88;` : 'background:var(--surface2);border-color:var(--border);';
    const indicator = active ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="${color}" stroke="${color}" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>` : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>`;
    const cursor = readonly ? 'default' : 'pointer';
    const opacity = readonly ? '0.6' : '1';
    return `<div onclick="${readonly ? '' : onclick}" style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:var(--radius-sm);border:1px solid;margin-bottom:8px;cursor:${cursor};opacity:${opacity};${activeStyle}"><span style="font-size:14px;font-weight:500;color:${active ? color : 'var(--text)'};">${label}</span><div style="display:flex;align-items:center;gap:6px;">${active && readonly ? '<span style="font-size:10px;color:var(--muted);">auto</span>' : ''}${indicator}</div></div>`;
  }
  const rows = [
    tagRow('Scheduled', isScheduled, '#4cd68a', '', true),
    tagRow('Supporting', m.support_status==='Supporting', '#4cd68a', `toggleManifestTag('${mid}','supporting')`, false),
    tagRow('Non-supporting', m.support_status==='Non-supporting', '#e05555', `toggleManifestTag('${mid}','nonsupporting')`, false),
    tagRow('Handouts', m.bible_handouts==='Yes', '#f0b429', `toggleManifestTag('${mid}','handouts')`, false),
    tagRow('Lodging', m.lodging==='Yes', '#8899ee', `toggleManifestTag('${mid}','lodging')`, false),
    tagRow('RV', m.rv_hookup==='Yes', '#8899ee', `toggleManifestTag('${mid}','rv')`, false),
    tagRow('Prayer List', m.prayer_list==='Yes', '#aaaaaa', `toggleManifestTag('${mid}','prayer')`, false),
  ].join('');
  const container = document.getElementById('tag-editor-rows');
  if (container) container.innerHTML = rows;
  renderManifest();
}

let manifestStarFilter = false;
function toggleManifestStarFilter() {
  manifestStarFilter = !manifestStarFilter;
  const btn = document.getElementById('manifest-star-btn');
  const icon = document.getElementById('manifest-star-icon');
  if (btn) btn.style.borderColor = manifestStarFilter ? '#F3B53A' : 'var(--border)';
  if (icon) { icon.setAttribute('fill', manifestStarFilter ? '#F3B53A' : 'none'); icon.setAttribute('stroke', manifestStarFilter ? '#F3B53A' : 'currentColor'); }
  renderManifest();
}

function openManifestEmailCopy() {
  const filter = document.getElementById('manifest-filter')?.value || 'all';
  const mq = (document.getElementById('manifest-search')?.value || '').trim().toLowerCase();
  let items = [...manifestContacts];

  if (filter === 'Supporting') items = items.filter(m => m.support_status === 'Supporting');
  else if (filter === 'Non-supporting') items = items.filter(m => m.support_status === 'Non-supporting');
  else if (filter === 'Scheduled') {
    const todayF = new Date().toISOString().slice(0,10);
    items = items.filter(m => {
      const todayMs2 = Date.now();
      const nvMs = t => { if(!t)return 0; const c=t.split(' – ')[0].split(' - ')[0].trim(); const x=new Date(c).getTime(); return isNaN(x)?0:x; };
      const nv = manifestVisits.filter(v => v.manifestId === m.id && v.date).find(v => nvMs(v.endDate||v.date) >= todayMs2);
      return nv || (m.next_visit_date && nvMs(m.next_visit_end_date||m.next_visit_date) >= todayMs2);
    });
  }
  else if (filter === 'prayer') items = items.filter(m => m.prayer_list === 'Yes');
  else if (filter === 'lodging') items = items.filter(m => m.lodging === 'Yes');
  else if (filter === 'rv') items = items.filter(m => m.rv_hookup === 'Yes');
  else if (filter === 'handouts') items = items.filter(m => m.bible_handouts === 'Yes');
  if (mq) items = items.filter(m =>
    (m.pastor||'').toLowerCase().includes(mq) ||
    (m.church||'').toLowerCase().includes(mq) ||
    (m.city||'').toLowerCase().includes(mq) ||
    (m.state||'').toLowerCase().includes(mq)
  );

  // Collect all unique emails
  const emails = [];
  items.forEach(m => {
    [m.email, m.church_email].forEach(e => {
      if (e && e.trim() && !emails.includes(e.trim())) emails.push(e.trim());
    });
  });

  const filterLabel = filter === 'all' ? 'All contacts' : filter === 'prayer' ? 'Prayer list' : filter;
  const emailStr = emails.join(', ');

  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h2 style="font-family:var(--serif);font-size:20px;margin-bottom:4px;">Email List</h2>
      <div style="font-size:13px;color:var(--muted);margin-bottom:14px;">${filterLabel}${mq?' · "'+mq+'"':''} · ${emails.length} address${emails.length!==1?'es':''}</div>
      <textarea readonly onclick="this.select()" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:13px;background:var(--bg);color:var(--text);min-height:120px;resize:none;box-sizing:border-box;line-height:1.6;">${esc(emailStr)}</textarea>
      ${emails.length ? `<button onclick="navigator.clipboard.writeText('${emailStr.replace(/'/g,"\\'")}').then(()=>showStatus('Copied!','ok'))" style="width:100%;margin-top:10px;padding:12px;background:#F3B53A;color:#000C1F;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;">Copy to Clipboard</button>` : '<div style="font-size:13px;color:var(--muted);text-align:center;padding:8px 0;">No emails found for this filter</div>'}
      <button class="btn-cancel" onclick="closeMKeepCard()" style="width:100%;margin-top:8px;">Close</button>
    </div>
  </div>`);
}

function deleteManifestContact(mid) {
  if (!confirm('Delete this contact? This cannot be undone.')) return;
  manifestContacts = manifestContacts.filter(x => x.id !== mid);
  const l = document.getElementById('modal-layer');
  if (l) { l.innerHTML = ''; l.style.pointerEvents = 'none'; }
  closeManifestCard();
  renderManifest();
  if (sheetsReady) api({action:'deleteManifest', id: mid}).catch(()=>{});
}

function closeManifestEditModal() {
  const l = document.getElementById('modal-layer');
  if (l) { l.innerHTML = ''; l.style.pointerEvents = 'none'; }
  const mid = window._editModalMid;
  const fromCard = window._editModalFromCard;
  if (fromCard && mid) {
    // Opened from a card — re-render it
    setTimeout(() => openManifestCard(mid), 50);
  } else if (mid) {
    // Opened from Add — remove blank entry if unsaved, re-render list
    manifestContacts = manifestContacts.filter(x => x.id !== mid || x.pastor || x.church);
    renderManifest();
  }
}

function openManifestEditModal(mid) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;
  window._editModalMid = mid;
  showM(`<div class="modal-backdrop" onclick="closeManifestEditModal()" ontouchend="if(event.target===this){event.preventDefault();closeManifestEditModal();}" style="cursor:default;">
    <div class="modal-box" onclick="event.stopPropagation()" ontouchend="event.stopPropagation()" style="padding:20px 16px 24px;max-height:85vh;overflow-y:auto;cursor:auto;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <h2 style="font-family:var(--serif);font-size:20px;margin:0;">Edit Contact</h2>
        <button onclick="deleteManifestContact('${mid}')" style="background:#3a0a0a;border:1px solid #5a1a1a;border-radius:6px;padding:6px 8px;cursor:pointer;color:#e05555;display:flex;align-items:center;">${ICONS.trash}</button>
      </div>

        </div>`).join('')}
      <div style="margin-bottom:10px;">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;">Support Status</div>
        <select id="me-support_status" style="width:100%;padding:9px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);">
          <option value="Supporting" ${m.support_status==='Supporting'?'selected':''}>Supporting</option>
          <option value="Non-supporting" ${m.support_status!=='Supporting'?'selected':''}>Non-supporting</option>
        </select>
      </div>
      ${['support_amount','support_cadence'].map(f=>`
        <div style="margin-bottom:10px;">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;">${f.replace('_',' ')}</div>
          <input type="text" id="me-${f}" value="${esc(m[f]||'')}" style="width:100%;padding:9px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);box-sizing:border-box;"/>
        </div>`).join('')}
      ${["lodging","rv_hookup","bible_handouts"].map(f=>`
        <div style="margin-bottom:10px;">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;">${f.replace(/_/g,' ')}</div>
          <div style="display:flex;gap:8px;">
            <button onclick="setManifestToggle('${f}','')" id="mt-${f}-none" style="flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid ${!m[f]?'#F3B53A':'var(--border)'};background:${!m[f]?'#2e1f00':'var(--surface2)'};color:${!m[f]?'#F3B53A':'var(--muted)'};font-family:var(--sans);font-size:13px;cursor:pointer;">—</button>
            <button onclick="setManifestToggle('${f}','Yes')" id="mt-${f}-yes" style="flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid ${m[f]==='Yes'?'#4cd68a':'var(--border)'};background:${m[f]==='Yes'?'#0a2a1a':'var(--surface2)'};color:${m[f]==='Yes'?'#4cd68a':'var(--muted)'};font-family:var(--sans);font-size:13px;cursor:pointer;">Yes</button>
            <button onclick="setManifestToggle('${f}','No')" id="mt-${f}-no" style="flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid ${m[f]==='No'?'#e05555':'var(--border)'};background:${m[f]==='No'?'#2a0a0a':'var(--surface2)'};color:${m[f]==='No'?'#e05555':'var(--muted)'};font-family:var(--sans);font-size:13px;cursor:pointer;">No</button>
          </div>
        </div>`).join('')}
      <div style="margin-bottom:14px;">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;">Notes</div>
        <textarea id="me-notes" style="width:100%;padding:9px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);min-height:80px;resize:vertical;box-sizing:border-box;">${esc(m.notes||'')}</textarea>
      </div>
      <div style="display:flex;gap:8px;">

function setManifestToggle(field, val) {
  if (!window._manifestToggles) window._manifestToggles = {};
  window._manifestToggles[field] = val;
  const states = {
    '': { border: '#F3B53A', bg: '#2e1f00', color: '#F3B53A' },
    'Yes': { border: '#4cd68a', bg: '#0a2a1a', color: '#4cd68a' },
    'No': { border: '#e05555', bg: '#2a0a0a', color: '#e05555' },
  };
  ['','Yes','No'].forEach(v => {
    const suffix = v === '' ? 'none' : v.toLowerCase();
    const btn = document.getElementById('mt-' + field + '-' + suffix);
    if (!btn) return;
    const active = v === val;
    btn.style.borderColor = active ? states[v].border : 'var(--border)';
    btn.style.background  = active ? states[v].bg : 'var(--surface2)';
    btn.style.color       = active ? states[v].color : 'var(--muted)';
  });
}

function saveManifestEdit(mid) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;
  ['pastor','church','city','state','phone','cell','email','church_email','address','website','support_amount','support_cadence'].forEach(f => {
    const el = document.getElementById('me-' + f);
    if (el) m[f] = el.value;
  });
  const ss = document.getElementById('me-support_status');
  if (ss) m.support_status = ss.value;
  const notes = document.getElementById('me-notes');
  if (notes) m.notes = notes.value;
  if (window._manifestToggles) {
    Object.assign(m, window._manifestToggles);
  }
  saveManifestContact(m);
  haptic(10);
  closeMKeepCard();
  setTimeout(() => { renderManifest(); openManifestCard(mid); }, 220);
}

function openManifestAddModal() {
  const newId = 'mfst-' + uid();
  const m = {id: newId, pastor:'', church:'', city:'', state:'', phone:'', cell:'', email:'', church_email:'', address:'', website:'', groups:'', lodging:'', rv_hookup:'', bible_handouts:'', support_status:'Non-supporting', support_amount:'', support_cadence:'', relay_group:'', prayer_list:'', notes:''};
  manifestContacts.push(m);
  window._editModalFromCard = false;
  openManifestEditModal(newId);
}

function openReminderFromManifest(mid) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;
  
  // Ensure a pseudo contact exists in the contacts array for this manifest contact
  let pseudo = contacts.find(c => c.id === mid);
  if (!pseudo) {
    pseudo = { id: mid, pastor: m.pastor||'', church: m.church||'', city: m.city||'', state: m.state||'', region: '', phone: m.phone||'', email: m.email||'', calls: [] };
    contacts.push(pseudo);
  }
  
  // Build filteredList with this contact so openReminderModal works
  if (!filteredList.find(c => c.id === mid)) {
    filteredList = [pseudo, ...filteredList];
    callingIdx = 0;
  } else {
    callingIdx = filteredList.findIndex(c => c.id === mid);
  }
  
  // Open reminder modal directly without switching wings
  openReminderModal(mid);
}

load().then(()=>{renderFilters();renderList();updateTidesBadge();initPullToRefresh();initLongPress();setTimeout(initScrollHaptics,500);
  Promise.all([loadManifest(), loadVisits()]).then(() => {
    // Migrate legacy next_visit_date entries that have no matching manifestVisit
    const parseClean = d => { if(!d)return null; const c=d.split(' – ')[0].split(' - ')[0].trim(); const dt=new Date(c); return isNaN(dt.getTime())?null:dt; };
    manifestContacts.forEach(m => {
      if (!m.next_visit_date) return;
      const dt = parseClean(m.next_visit_date);
      if (!dt) return;
      const isoDate = dt.toISOString().slice(0,10);
      const already = manifestVisits.find(v => v.manifestId === m.id && v.date === isoDate);
      if (!already) {
        // Extract end date if present in range string
        let endDate = m.next_visit_end_date || '';
        if (!endDate && m.next_visit_date.includes(' – ')) {
          const endPart = m.next_visit_date.split(' – ')[1]?.trim();
          if (endPart) { const ed = new Date(endPart); if (!isNaN(ed.getTime())) endDate = ed.toISOString().slice(0,10); }
        }
        const visit = { id: uid(), manifestId: m.id, date: isoDate, endDate, sermon: '', capacity: '', days: '', handout: '', notes: '' };
        manifestVisits.push(visit);
        saveVisitEntry(visit);
      }
    });
  });
});
window.addEventListener('resize',renderList);
const _origRenderList = renderList;
renderList = function(...a) { _origRenderList(...a); reInitScrollHaptics(); };
