<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contacts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ec;
    --surface: #fdfcf9;
    --surface2: #f0ece3;
    --border: #ddd8cc;
    --text: #1a1814;
    --muted: #7a7468;
    --accent: #2d5a3d;
    --accent-light: #e8f0eb;
    --accent2: #8b4513;
    --danger: #c0392b;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Lock screen ── */
  #lock-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .lock-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 48px 44px; width: 340px; text-align: center;
  }
  .lock-icon { font-size: 36px; margin-bottom: 16px; }
  .lock-card h1 { font-family: var(--serif); font-size: 26px; font-weight: 400; margin-bottom: 6px; }
  .lock-card p { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .lock-card input {
    width: 100%; padding: 11px 14px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-family: var(--sans); font-size: 14px;
    background: var(--bg); color: var(--text); margin-bottom: 12px;
    letter-spacing: 0.05em; text-align: center;
  }
  .lock-card input:focus { outline: none; border-color: var(--accent); }
  .lock-card button {
    width: 100%; padding: 11px; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm); font-family: var(--sans);
    font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s;
  }
  .lock-card button:hover { opacity: .88; }
  .lock-error { font-size: 12px; color: var(--danger); margin-top: 10px; min-height: 16px; }

  /* ── App shell ── */
  #app { display: none; height: 100vh; flex-direction: column; }
  #app.visible { display: flex; }

  .top-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 54px; display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0;
  }
  .top-bar-title { font-family: var(--serif); font-size: 20px; font-weight: 400; letter-spacing: .01em; }
  .top-bar-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 6px 10px; font-size: 13px; cursor: pointer; color: var(--text);
    display: flex; align-items: center; gap: 5px; font-family: var(--sans);
    transition: background .12s;
  }
  .icon-btn:hover { background: var(--surface2); }
  .icon-btn.danger:hover { background: #fdecea; color: var(--danger); border-color: #f0b0aa; }

  .body-wrap { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 256px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
  }
  .sidebar-top { padding: 14px 14px 10px; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 14px; height: 14px; }
  #search { width: 100%; padding: 8px 10px 8px 30px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px; background: var(--bg); color: var(--text); }
  #search:focus { outline: none; border-color: var(--accent); }

  .filter-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .filter-pill {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    border: 1px solid var(--border); background: none; cursor: pointer;
    font-family: var(--sans); color: var(--muted); transition: all .12s;
  }
  .filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .contact-list { flex: 1; overflow-y: auto; padding: 6px 8px; }
  .contact-list::-webkit-scrollbar { width: 4px; }
  .contact-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .contact-row {
    display: flex; align-items: center; gap: 10px; padding: 9px 10px;
    border-radius: var(--radius-sm); cursor: pointer; transition: background .1s;
  }
  .contact-row:hover { background: var(--surface2); }
  .contact-row.active { background: var(--accent-light); }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
  }
  .contact-row-info { min-width: 0; }
  .contact-row-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .contact-row-sub { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
  .add-btn {
    width: 100%; padding: 9px; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px;
    font-weight: 500; cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 6px; transition: opacity .15s;
  }
  .add-btn:hover { opacity: .88; }

  /* ── Detail pane ── */
  .detail-pane { flex: 1; overflow-y: auto; background: var(--bg); }
  .detail-pane::-webkit-scrollbar { width: 4px; }
  .detail-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .empty-state {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: var(--muted); gap: 10px;
  }
  .empty-state svg { width: 48px; height: 48px; opacity: .3; }
  .empty-state p { font-size: 14px; }

  .detail-inner { max-width: 600px; margin: 0 auto; padding: 32px 28px 60px; }

  .detail-header { display: flex; align-items: flex-start; gap: 18px; margin-bottom: 28px; }
  .detail-avatar { width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; }
  .detail-header-info { flex: 1; min-width: 0; }
  .detail-name { font-family: var(--serif); font-size: 28px; font-weight: 400; line-height: 1.1; margin-bottom: 4px; }
  .detail-sub { font-size: 13px; color: var(--muted); }
  .detail-header-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
  .field-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
  }
  .field-card-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; }
  .field-card-value { font-size: 14px; font-weight: 400; word-break: break-word; }
  .field-card-value a { color: var(--accent); text-decoration: none; }
  .field-card-value a:hover { text-decoration: underline; }
  .field-card-value.empty { color: var(--muted); font-style: italic; font-size: 13px; }

  .section-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted); margin-bottom: 12px; font-weight: 500;
  }

  .notes-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .note-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; position: relative;
  }
  .note-card-date { font-size: 10px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
  .note-card-text { font-size: 14px; line-height: 1.65; white-space: pre-wrap; }
  .note-card-delete {
    position: absolute; top: 10px; right: 10px; background: none; border: none;
    cursor: pointer; color: var(--border); font-size: 16px; line-height: 1;
    padding: 2px 5px; border-radius: 4px; transition: color .12s;
  }
  .note-card-delete:hover { color: var(--danger); }

  .note-compose {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .note-compose textarea {
    width: 100%; padding: 12px 14px; border: none; resize: none;
    font-family: var(--sans); font-size: 14px; line-height: 1.6;
    background: transparent; color: var(--text); height: 80px;
  }
  .note-compose textarea:focus { outline: none; }
  .note-compose-footer {
    padding: 8px 12px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end;
  }
  .save-note-btn {
    padding: 6px 16px; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px;
    font-weight: 500; cursor: pointer; transition: opacity .15s;
  }
  .save-note-btn:hover { opacity: .88; }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center; z-index: 50;
  }
  .modal {
    background: var(--surface); border-radius: 14px; padding: 28px 28px 24px;
    width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.15);
  }
  .modal h2 { font-family: var(--serif); font-size: 22px; font-weight: 400; margin-bottom: 20px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea {
    padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-family: var(--sans); font-size: 13px; background: var(--bg); color: var(--text);
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
  .form-group textarea { resize: vertical; height: 70px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel {
    padding: 8px 18px; background: none; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px;
    cursor: pointer; color: var(--text); transition: background .12s;
  }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save {
    padding: 8px 18px; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px;
    font-weight: 500; cursor: pointer; transition: opacity .15s;
  }
  .btn-save:hover { opacity: .88; }

  .count-badge {
    font-size: 11px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 1px 8px; color: var(--muted); margin-left: 8px;
  }

  @media (max-width: 600px) {
    .sidebar { width: 200px; }
    .fields-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .detail-inner { padding: 20px 16px 40px; }
  }
</style>
</head>
<body>

<!-- App -->
<div id="app" class="visible">
  <div class="top-bar">
    <span class="top-bar-title">My Contacts</span>
    <div class="top-bar-actions">
      <span id="count-label" class="count-badge">0 contacts</span>
    </div>
  </div>
  <div class="body-wrap">
    <div class="sidebar">
      <div class="sidebar-top">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search" placeholder="Search contacts…" oninput="renderList()" />
        </div>
        <div class="filter-row" id="filter-row"></div>
      </div>
      <div class="contact-list" id="contact-list"></div>
      <div class="sidebar-footer">
        <button class="add-btn" onclick="openModal()">＋ Add contact</button>
      </div>
    </div>
    <div class="detail-pane" id="detail-pane">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <p>Select a contact or add one to get started</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal" style="display:none"></div>

<script>
  const STORAGE_KEY = 'caleb_contacts_v1';
  let contacts = [];
  let activeId = null;
  let filterCat = 'All';

  const CATEGORIES = ['All','Friend','Family','Work','Acquaintance','Other'];
  const AVATAR_COLORS = [
    ['#e8f0eb','#2d5a3d'],['#e8eaf6','#3949ab'],['#fce4ec','#c2185b'],
    ['#fff3e0','#e65100'],['#f3e5f5','#7b1fa2'],['#e0f7fa','#00695c'],
    ['#fafafa','#424242'],['#f9fbe7','#558b2f'],
  ];

  function avatarColor(name) {
    let h = 0;
    for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
    return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
  }

  function initials(name) {
    return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
  }

  function load() {
    try { contacts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { contacts = []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(contacts));
    document.getElementById('count-label').textContent =
      contacts.length + ' contact' + (contacts.length !== 1 ? 's' : '');
  }

  function renderAll() { renderFilters(); renderList(); save(); }

  function renderFilters() {
    const row = document.getElementById('filter-row');
    row.innerHTML = CATEGORIES.map(c =>
      `<button class="filter-pill${filterCat===c?' active':''}" onclick="setFilter('${c}')">${c}</button>`
    ).join('');
  }

  function setFilter(cat) { filterCat = cat; renderList(); renderFilters(); }

  function renderList() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    const list = document.getElementById('contact-list');
    let filtered = contacts.filter(c => {
      const matchCat = filterCat === 'All' || c.category === filterCat;
      const matchQ = !q || c.name.toLowerCase().includes(q) ||
        (c.email||'').toLowerCase().includes(q) ||
        (c.phone||'').toLowerCase().includes(q) ||
        (c.location||'').toLowerCase().includes(q);
      return matchCat && matchQ;
    });
    filtered.sort((a,b) => a.name.localeCompare(b.name));

    if (!filtered.length) {
      list.innerHTML = `<div style="padding:20px 12px;font-size:13px;color:var(--muted);text-align:center">No contacts found</div>`;
      return;
    }
    list.innerHTML = filtered.map(c => {
      const [bg,fg] = avatarColor(c.name);
      return `<div class="contact-row${activeId===c.id?' active':''}" onclick="selectContact('${c.id}')">
        <div class="avatar" style="background:${bg};color:${fg}">${initials(c.name)}</div>
        <div class="contact-row-info">
          <div class="contact-row-name">${esc(c.name)}</div>
          <div class="contact-row-sub">${[c.category, c.location].filter(Boolean).join(' · ')}</div>
        </div>
      </div>`;
    }).join('');
  }

  function selectContact(id) {
    activeId = id;
    renderList();
    renderDetail();
  }

  function renderDetail() {
    const pane = document.getElementById('detail-pane');
    const c = contacts.find(x => x.id === activeId);
    if (!c) {
      pane.innerHTML = `<div class="empty-state"><p>Select a contact or add one to get started</p></div>`;
      return;
    }
    const [bg,fg] = avatarColor(c.name);
    const notes = (c.notes||[]).slice().reverse();
    pane.innerHTML = `
    <div class="detail-inner">
      <div class="detail-header">
        <div class="detail-avatar" style="background:${bg};color:${fg}">${initials(c.name)}</div>
        <div class="detail-header-info">
          <div class="detail-name">${esc(c.name)}</div>
          <div class="detail-sub">${[c.category, c.location].filter(Boolean).join(' · ')}</div>
        </div>
        <div class="detail-header-actions">
          <button class="icon-btn" onclick="openModal('${c.id}')">✏️ Edit</button>
          <button class="icon-btn danger" onclick="deleteContact('${c.id}')">🗑</button>
        </div>
      </div>

      <div class="fields-grid">
        ${field('Email', c.email ? `<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>` : null)}
        ${field('Phone', c.phone)}
        ${field('Birthday', c.birthday)}
        ${field('Location', c.location)}
        ${c.website ? field('Website', `<a href="${esc(c.website)}" target="_blank">${esc(c.website)}</a>`) : ''}
        ${c.notes_intro ? `<div class="field-card" style="grid-column:1/-1"><div class="field-card-label">Quick note</div><div class="field-card-value">${esc(c.notes_intro)}</div></div>` : ''}
      </div>

      <div class="section-title">Notes log</div>
      <div class="notes-list" id="notes-list-${c.id}">
        ${notes.length ? notes.map(n => `
          <div class="note-card">
            <div class="note-card-date">${n.date}</div>
            <div class="note-card-text">${esc(n.text)}</div>
            <button class="note-card-delete" onclick="deleteNote('${c.id}','${n.id}')" title="Delete note">×</button>
          </div>`).join('') : `<div style="font-size:13px;color:var(--muted);font-style:italic">No notes yet.</div>`}
      </div>

      <div class="note-compose" style="margin-top:10px">
        <textarea id="note-input-${c.id}" placeholder="Add a note… what did you talk about? anything to remember?"></textarea>
        <div class="note-compose-footer">
          <button class="save-note-btn" onclick="addNote('${c.id}')">Save note</button>
        </div>
      </div>
    </div>`;
  }

  function field(label, value) {
    const empty = !value;
    return `<div class="field-card">
      <div class="field-card-label">${label}</div>
      <div class="field-card-value${empty?' empty':''}">${value || 'Not set'}</div>
    </div>`;
  }

  function addNote(cid) {
    const inp = document.getElementById('note-input-' + cid);
    const text = (inp.value||'').trim();
    if (!text) return;
    const c = contacts.find(x => x.id === cid);
    if (!c) return;
    if (!c.notes) c.notes = [];
    c.notes.push({ id: uid(), date: formatDate(new Date()), text });
    inp.value = '';
    save(); renderDetail();
  }

  function deleteNote(cid, nid) {
    const c = contacts.find(x => x.id === cid);
    if (!c) return;
    c.notes = (c.notes||[]).filter(n => n.id !== nid);
    save(); renderDetail();
  }

  function deleteContact(id) {
    if (!confirm('Delete this contact? This cannot be undone.')) return;
    contacts = contacts.filter(c => c.id !== id);
    activeId = null;
    save(); renderAll();
    document.getElementById('detail-pane').innerHTML =
      `<div class="empty-state"><p>Contact deleted. Select another or add a new one.</p></div>`;
  }

  function openModal(id) {
    const c = id ? contacts.find(x => x.id === id) : null;
    const title = c ? 'Edit contact' : 'New contact';
    const v = f => c ? (c[f]||'') : '';
    const catOptions = ['Friend','Family','Work','Acquaintance','Other'].map(o =>
      `<option${v('category')===o?' selected':''}>${o}</option>`).join('');
    document.getElementById('modal').style.display = 'block';
    document.getElementById('modal').innerHTML = `
    <div class="modal-backdrop" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h2>${title}</h2>
        <div class="form-row">
          <div class="form-group full"><label>Full name *</label><input id="f-name" value="${v('name')}" placeholder="Jane Smith" /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Email</label><input id="f-email" type="email" value="${v('email')}" placeholder="jane@example.com" /></div>
          <div class="form-group"><label>Phone</label><input id="f-phone" value="${v('phone')}" placeholder="(555) 000-0000" /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Category</label><select id="f-category"><option value="">—</option>${catOptions}</select></div>
          <div class="form-group"><label>Birthday</label><input id="f-birthday" value="${v('birthday')}" placeholder="e.g. March 14" /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Location</label><input id="f-location" value="${v('location')}" placeholder="Chicago, IL" /></div>
          <div class="form-group"><label>Website</label><input id="f-website" value="${v('website')}" placeholder="https://…" /></div>
        </div>
        <div class="form-row">
          <div class="form-group full"><label>Quick note</label><textarea id="f-notes_intro" placeholder="A short description or reminder about this person…">${v('notes_intro')}</textarea></div>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn-save" onclick="saveModal('${id||''}')">Save</button>
        </div>
      </div>
    </div>`;
  }

  function closeModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('modal').style.display = 'none';
    document.getElementById('modal').innerHTML = '';
  }

  function saveModal(id) {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { alert('Name is required.'); return; }
    if (id) {
      const c = contacts.find(x => x.id === id);
      Object.assign(c, fields());
    } else {
      contacts.push({ id: uid(), notes: [], ...fields() });
    }
    closeModal();
    save(); renderAll();
    if (id) { renderDetail(); }
    else { selectContact(contacts[contacts.length-1].id); }
  }

  function fields() {
    return {
      name: document.getElementById('f-name').value.trim(),
      email: document.getElementById('f-email').value.trim(),
      phone: document.getElementById('f-phone').value.trim(),
      category: document.getElementById('f-category').value,
      birthday: document.getElementById('f-birthday').value.trim(),
      location: document.getElementById('f-location').value.trim(),
      website: document.getElementById('f-website').value.trim(),
      notes_intro: document.getElementById('f-notes_intro').value.trim(),
    };
  }

  function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function formatDate(d) {
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }

  load(); renderAll();
</script>
</body>
</html>
