<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Relay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
  --text:#e8e6e1;--muted:#6b6860;--accent:#4a9e6b;--accent-light:#1a2e22;
  --danger:#e05555;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --radius:12px;--radius-sm:8px;
}
html,body{height:100%;margin:0;padding:0;background:#0f0f0f;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;overflow:hidden;}

/* ── TOP BAR ── */
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.top-bar-title{font-family:var(--serif);font-size:20px;color:var(--accent);flex-shrink:0;}
.search-wrap{position:relative;flex:1;min-width:100px;}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);width:14px;height:14px;pointer-events:none;}
#search{width:100%;padding:9px 10px 9px 30px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--surface2);color:var(--text);font-family:var(--sans);}
#search:focus{outline:none;border-color:var(--accent);}
.filter-row{display:flex;gap:5px;overflow-x:auto;width:100%;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-pill{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;cursor:pointer;font-family:var(--sans);color:var(--muted);white-space:nowrap;flex-shrink:0;}
.filter-pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.top-bar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.count-badge{font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;color:var(--muted);white-space:nowrap;}
.add-btn{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}

/* ── LIST — mobile first, 3 columns ── */
.list-header{display:grid;grid-template-columns:44px 1fr 48px 48px;padding:0 14px;height:34px;align-items:center;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;}
.list-header-cell{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:500;padding:0 4px;}
.main-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.main-list::-webkit-scrollbar{width:3px;}
.main-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.contact-row{display:grid;grid-template-columns:44px 1fr 48px 48px;padding:0 14px;min-height:64px;align-items:center;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.contact-row:active{background:var(--surface);}






.row-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.row-cell{padding:6px 4px;min-width:0;}
.row-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.row-loc{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.status-pill{display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;letter-spacing:.04em;padding:3px 6px;border-radius:20px;text-transform:uppercase;}
.pill-pastor   {background:#1a3a28;color:#4cd68a;}
.pill-voicemail{background:#1e2244;color:#8899ee;}
.pill-secretary{background:#2a1f35;color:#c9a0f0;}
.pill-reminder {background:#2e1f00;color:#f0b429;}
.pill-none     {background:var(--surface2);color:var(--muted);}
.pill-noanswer1{background:#2a2a2a;color:#e8e6e1;border:1.5px solid #666;font-size:9px;padding:3px 7px;border-radius:20px;font-weight:700;letter-spacing:.04em;}
.pill-noanswer2{background:transparent;color:#b0aea9;border:1.5px solid #6b6860;font-size:9px;padding:3px 7px;border-radius:20px;font-weight:700;letter-spacing:.04em;}
.row-pill-cell{display:flex;align-items:center;justify-content:center;}
.row-actions{display:flex;align-items:center;justify-content:flex-end;}
.log-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;cursor:pointer;border:1px solid #6b7fd433;background:none;color:#8899ee;}.log-btn svg{width:16px;height:16px;}
.log-btn:active{background:#1e2244;}
.reminder-dot{width:7px;height:7px;border-radius:50%;background:#f0b429;display:inline-block;margin-left:5px;vertical-align:middle;}
.empty-state{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:14px;}

/* ── FULLSCREEN CARD ── */
.fullscreen-card{position:absolute;inset:0;z-index:100;background:var(--bg);flex-direction:column;overflow:hidden;display:none;}
.fullscreen-card.visible{display:flex;}

.card-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.card-back-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.card-topbar-center{flex:1;text-align:center;}
.card-progress-label{font-size:11px;color:var(--muted);}
.card-progress-bar-wrap{width:80px;height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin:5px auto 0;}
.card-progress-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
.card-edit-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;font-family:var(--sans);font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;}

.card-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.card-body::-webkit-scrollbar{width:3px;}
.card-body::-webkit-scrollbar-thumb{background:var(--border);}

.card-hero{padding:20px 20px 16px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--surface) 0%,var(--bg) 100%);}
.card-hero-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;flex-shrink:0;}
.card-hero-name{font-family:var(--serif);font-size:26px;line-height:1.1;margin-bottom:3px;}
.card-hero-church{font-size:13px;color:var(--muted);margin-bottom:5px;}
.card-hero-location{font-size:13px;color:var(--text);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.card-hero-region{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;}

.card-info-strip{display:flex;border-bottom:1px solid var(--border);background:var(--surface);}
.info-item{flex:1;padding:12px 10px;border-right:1px solid var(--border);min-width:0;}
.info-item:last-child{border-right:none;}
.info-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px;}
.info-value{font-size:12px;color:var(--text);line-height:1.4;word-break:break-word;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.info-value.empty{color:var(--muted);font-style:italic;}

.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;}
.card-action-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px 8px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:var(--sans);cursor:pointer;color:var(--text);min-height:72px;}
.card-action-btn:active{transform:scale(.97);}
.btn-icon{line-height:1;display:flex;align-items:center;justify-content:center;width:24px;height:24px;}.btn-icon svg{width:22px;height:22px;}
.btn-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
.card-action-btn.green{border-color:#4a9e6b44;background:#1a2e2244;}
.card-action-btn.green:active{background:var(--accent-light);border-color:var(--accent);}
.card-action-btn.blue{border-color:#6b7fd444;background:#1e224422;}
.card-action-btn.blue:active{background:#1e2244;border-color:#8899ee;}
.card-action-btn.yellow{border-color:#f0b42944;background:#2e1f0022;}
.card-action-btn.yellow:active{background:#2e1f00;border-color:#f0b429;}
.card-action-btn.teal{border-color:#2a7a8a44;background:#0e222622;}
.card-action-btn.teal:active{background:#0e2226;border-color:#4ac4d4;}

.contact-submenu{display:none;flex-direction:column;gap:8px;padding:0 16px 16px;}
.contact-submenu.open{display:flex;}
.contact-sub-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;color:var(--text);text-decoration:none;}
.contact-sub-btn:active{transform:scale(.98);}
.call-sub{border-color:#4a9e6b44;color:#4cd68a;}
.text-sub{border-color:#6b7fd444;color:#8899ee;}
.email-sub{border-color:#d4b06b44;color:#d4b06b;}

.card-history{padding:16px;}
.history-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px;font-weight:500;}
.call-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;position:relative;}
.call-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px;}
.outcome-badge{font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;}
.outcome-pastor   {background:#1a3a28;color:#4cd68a;}
.outcome-voicemail{background:#1e2244;color:#8899ee;}
.outcome-secretary{background:#2a1f35;color:#c9a0f0;}
.outcome-noanswer1{background:#1e1e1e;color:#e8e6e1;border:1px solid #555;}
.outcome-noanswer2{background:#e8e6e1;color:#1e1e1e;}
.outcome-imported {background:var(--surface2);color:var(--muted);}
.outcome-reminder {background:#2e1f00;color:#f0b429;}
.call-date{font-size:10px;color:var(--muted);margin-left:auto;}
.call-details-text{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;margin-top:5px;}
.call-del{position:absolute;top:9px;right:9px;background:none;border:none;cursor:pointer;color:var(--border);font-size:16px;padding:4px 6px;border-radius:4px;}
.call-del:active{color:var(--danger);}
.no-calls{font-size:13px;color:var(--muted);font-style:italic;}

.card-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom));}
.nav-btn{display:flex;align-items:center;gap:6px;padding:12px 20px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;color:var(--text);min-width:90px;justify-content:center;}
.nav-btn:active:not(:disabled){background:var(--surface);}
.nav-btn:disabled{opacity:.25;cursor:default;}
.nav-btn.next{background:var(--accent);border-color:var(--accent);color:#fff;}
.nav-btn.next:active:not(:disabled){opacity:.85;}
.nav-center{font-size:11px;color:var(--muted);text-align:center;flex:1;padding:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── MODALS ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0;}
.modal-box{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;border:1px solid var(--border);padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));box-sizing:border-box;overflow-x:hidden;}
.modal-box h2{font-family:var(--serif);font-size:22px;margin-bottom:5px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:18px;}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.fg label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:500;}
.fg input,.fg textarea,.fg select{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:16px;background:var(--bg);color:var(--text);width:100%;}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--accent);}
.fg textarea{resize:vertical;height:80px;}
.outcome-opts{display:flex;flex-direction:column;gap:8px;}
.outcome-opt{border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);background:var(--surface2);font-family:var(--sans);text-align:left;display:flex;align-items:center;gap:12px;}
.outcome-opt:active{transform:scale(.99);}
.outcome-opt.selected{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.opt-icon{font-size:20px;}
.meeting-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:14px;}
.meeting-row label{font-size:14px;flex:1;}
.toggle-wrap{display:flex;gap:6px;}
.toggle-btn{padding:7px 16px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-family:var(--sans);cursor:pointer;background:none;color:var(--muted);}
.toggle-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:10px;}
.btn-cancel{padding:12px 20px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;cursor:pointer;color:var(--text);flex:1;}
.btn-save{padding:12px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;flex:2;}
.cal-open-btn{width:100%;padding:14px;background:#1a73e8;color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.fgi{display:flex;flex-direction:column;gap:5px;}
.fgi.full{grid-column:1/-1;}
.fgi label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:500;}
.fgi input,.fgi select{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:16px;background:var(--bg);color:var(--text);width:100%;min-width:0;}
.fgi input:focus,.fgi select:focus{outline:none;border-color:var(--accent);}
.fgi select option{background:var(--surface);}

/* ── DESKTOP (600px+) ── */
@media(min-width:600px){
  .top-bar{flex-wrap:nowrap;padding:8px 20px;}
  .list-header{grid-template-columns:44px 1.5fr 1fr 60px 48px;}
  .contact-row{grid-template-columns:44px 1.5fr 1fr 60px 48px;min-height:52px;}
  .card-hero-name{font-size:30px;}
  .card-actions{grid-template-columns:repeat(4,1fr);}
  .contact-submenu.open{flex-direction:row;}
  .modal-backdrop{align-items:center;padding:20px;}
  .modal-box{border-radius:16px;max-height:85vh;}
  .outcome-opts{display:grid;grid-template-columns:1fr 1fr 1fr;}
}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <span class="top-bar-title">Relay</span>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search…" oninput="renderList()"/>
    </div>
    <div class="top-bar-right">
      <span id="count-label" class="count-badge">0</span>
      <button class="add-btn" onclick="openContactModal(null)">＋ Add</button>
    </div>
  </div>
  <div class="filter-row" id="state-filter-row" style="padding:6px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;"></div>
  <div class="filter-row" id="region-filter-row" style="padding:4px 14px 6px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;"></div>
  <div class="list-header">
    <div></div>
    <div class="list-header-cell">Pastor / Church</div>
    <div class="list-header-cell" id="lh-loc" style="display:none">City, State</div>
    <div class="list-header-cell" style="text-align:center">Status</div>
    <div class="list-header-cell" style="text-align:right">Log</div>
  </div>
  <div class="main-list" id="main-list"></div>
  <div id="fullscreen-card" class="fullscreen-card"></div>
  <div id="modal-layer" style="position:fixed;inset:0;z-index:200;pointer-events:none;"></div>
</div>

<script>

// National region mapping
const STATE_REGION={
  AL:'south',AK:'noncont',AZ:'west',AR:'south',CA:'west',CO:'west',CT:'northeast',
  DE:'northeast',FL:'south',GA:'south',HI:'noncont',ID:'west',IL:'midwest',IN:'midwest',
  IA:'midwest',KS:'midwest',KY:'south',LA:'south',ME:'northeast',MD:'northeast',
  MA:'northeast',MI:'midwest',MN:'midwest',MS:'south',MO:'midwest',MT:'west',
  NE:'midwest',NV:'west',NH:'northeast',NJ:'northeast',NM:'west',NY:'northeast',
  NC:'south',ND:'midwest',OH:'midwest',OK:'south',OR:'west',PA:'northeast',
  RI:'northeast',SC:'south',SD:'midwest',TN:'south',TX:'south',UT:'west',
  VT:'northeast',VA:'south',WA:'west',WV:'south',WI:'midwest',WY:'west',DC:'northeast'
};
const REGION_COLORS={
  northeast:{bg:'#2a1018',text:'#c45c7a',border:'#c45c7a44'},
  south:    {bg:'#2a1520',text:'#e8a0b4',border:'#e8a0b444'},
  midwest:  {bg:'#101e2a',text:'#5b9fd4',border:'#5b9fd444'},
  west:     {bg:'#2a2010',text:'#d4a84b',border:'#d4a84b44'},
  noncont:  {bg:'#0e2228',text:'#4ec9d4',border:'#4ec9d444'},
  default:  {bg:'#1a1a1a',text:'#6b6860',border:'#2e2e2e'}
};
function getRegionColor(c){
  const st=(c.state||'').toUpperCase().trim();
  const key=STATE_REGION[st]||'default';
  return REGION_COLORS[key]||REGION_COLORS.default;
}

const AC=[['#1a2e22','#4a9e6b'],['#1a1f35','#6b7fd4'],['#2e1a1a','#d46b6b'],['#2e2a1a','#d4b06b'],['#251a2e','#a06bd4'],['#1a2a2e','#6bc4d4'],['#222','#999'],['#1e2a1a','#7ab06b']];
const OM={
  pastor:    {label:'Spoke to Pastor',         cls:'outcome-pastor',     icon:'personCheck'},
  noanswer1: {label:'No Answer (1st attempt)', cls:'outcome-noanswer1',  icon:'na1'},
  noanswer2: {label:'No Answer (2nd attempt)', cls:'outcome-noanswer2',  icon:'na2'},
  voicemail: {label:'Left Voicemail',          cls:'outcome-voicemail',  icon:'vm'},
  secretary: {label:'Spoke to Secretary',      cls:'outcome-secretary',  icon:'chair'},
  imported:  {label:'Imported note',           cls:'outcome-imported',   icon:''},
  reminder:  {label:'Reminder',                cls:'outcome-reminder',   icon:'bellSm'}
};
function starIcon(starred){
  return starred?ICONS.starFilled:ICONS.starEmpty;
}
function outcomeIcon(key){
  if(key==='personCheck') return ICONS.personCheck;
  if(key==='chair') return ICONS.chair;
  if(key==='bellSm') return ICONS.bellSm;
  if(key==='vm') return '<span style="font-size:10px;font-weight:700;letter-spacing:.04em">M</span>';
  if(key==='na1') return '<span style="width:16px;height:16px;background:#2a2a2a;border:1.5px solid #666;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#e8e6e1">1</span>';
  if(key==='na2') return '<span style="width:16px;height:16px;background:transparent;border:1.5px solid #888;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#b0aea9">2</span>';
  return '';
}
function suggestedNext(c){
  const calls=(c.calls||[]).filter(x=>x.outcome!=='imported'&&x.outcome!=='reminder');
  if(!calls.length) return null;

function ac(n){let h=0;for(let c of(n||'X'))h=(h*31+c.charCodeAt(0))&0xffffffff;return AC[Math.abs(h)%AC.length];}
function ini(n){return(n||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});}
function primaryPhone(p){return(p||'').split(/[,;\/]/)[0].trim();}

function save(){localStorage.setItem('relay_v7',JSON.stringify(contacts));}
function lc(c){const r=(c.calls||[]).filter(x=>x.outcome!=='imported');return r.length?r[r.length-1]:null;}
function lastContactedStr(c){
  const r=(c.calls||[]).filter(x=>x.outcome!=='imported'&&x.outcome!=='reminder');
  if(!r.length) return null;
  const last=r[r.length-1];
  const label=OM[last.outcome]?.label||last.outcome;
  return `${last.date} · ${label}`;
}

function setSF(s){fState=s;fReg='All';renderFilters();renderList();}
function setRF(r){fReg=r;renderFilters();renderList();}

function buildFilteredList(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  let f=contacts.filter(c=>{
    const ms=fState==='All'||(fState==='Starred'?c.starred:(c.state||'').toUpperCase()===fState);
    const mr=fReg==='All'||(c.region||'')===fReg;
    const mq=!q||(c.pastor||'').toLowerCase().includes(q)||(c.church||'').toLowerCase().includes(q)||(c.city||'').toLowerCase().includes(q)||(c.phone||'').toLowerCase().includes(q);
    return ms&&mr&&mq;
  });
  f.sort((a,b)=>(a.pastor||a.church||'').localeCompare(b.pastor||b.church||''));
  return f;
}

      </button>
      ${infoExpanded?`<div style="padding:0 16px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px">Phone</div><div style="font-size:12px;color:var(--text)">${c.phone?esc(c.phone):'—'}</div></div>
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;overflow:hidden;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px">Email</div><div style="font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.email?esc(c.email):'—'}</div></div>
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px">Address</div><div style="font-size:12px;color:var(--text)">${c.address?esc(c.address):'—'}</div></div>
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px">Last Contacted</div><div style="font-size:12px;color:var(--text)">${lastContactedStr(c)||'—'}</div></div>
      </div>`:''}
    </div>
    <div class="card-nav">
      <button class="nav-btn" onclick="navCard(-1)" ${callingIdx===0?'disabled':''}>← Prev</button>
      <span class="nav-center">${esc(c.pastor||c.church||'')}</span>
      <button class="nav-btn next" onclick="navCard(1)" ${callingIdx===total-1?'disabled':''}>Next →</button>
    </div>`;
}
function toggleContactMenu(){contactMenuOpen=!contactMenuOpen;renderCallingCard();}
function closeCard(){
  const card=document.getElementById('fullscreen-card');
  card.classList.remove('visible');card.innerHTML='';
  contactMenuOpen=false;renderList();
}
function navCard(dir){
  const next=callingIdx+dir;
  if(next<0||next>=filteredList.length)return;
  callingIdx=next;contactMenuOpen=false;infoExpanded=false;renderCallingCard();
}

/* ── LOG MODAL ── */
function openLogModal(cid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  logOut=null;logMtg=false;
  const suggested=suggestedNext(c);
  if(suggested){setTimeout(()=>selOut(suggested),50);}
  const suggestionHTML=suggested?`<div style="background:#1a2e22;border:1px solid #4a9e6b33;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;font-size:13px;color:#4cd68a;">💡 Suggested: <strong>${OM[suggested]?.label||suggested}</strong></div>`:'';
  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h2>Log a call</h2>
      <div class="modal-sub">${esc(c.pastor||c.church||'')} · ${esc([c.city,c.state].filter(Boolean).join(', '))}</div>
      <div id="log-suggestion">${suggestionHTML}</div>
      <div class="fg"><label>Outcome *</label>
        <div class="outcome-opts">
          <button class="outcome-opt" id="op-pastor" onclick="selOut('pastor')" style="border-color:#4a9e6b44;"><span class="opt-icon" style="display:flex;align-items:center;color:#4cd68a;">${ICONS.personCheck}</span><span style="color:#4cd68a;">Spoke to Pastor</span></button>
          <button class="outcome-opt" id="op-noanswer1" onclick="selOut('noanswer1')"><span class="opt-icon" style="font-size:14px;font-weight:700;color:#e8e6e1;">①</span>No Answer (1st)</button>
          <button class="outcome-opt" id="op-noanswer2" onclick="selOut('noanswer2')"><span class="opt-icon" style="font-size:14px;font-weight:700;color:#b0aea9;">②</span>No Answer (2nd)</button>
          <button class="outcome-opt" id="op-voicemail" onclick="selOut('voicemail')" style="border-color:#8899ee44;"><span class="opt-icon" style="display:flex;align-items:center;color:#8899ee;">${ICONS.phoneOff}</span><span style="color:#8899ee;">Left Voicemail</span></button>
          <button class="outcome-opt" id="op-secretary" onclick="selOut('secretary')" style="border-color:#c9a0f044;"><span class="opt-icon" style="display:flex;align-items:center;color:#c9a0f0;">${ICONS.chair}</span><span style="color:#c9a0f0;">Spoke to Secretary</span></button>
        </div>
      </div>
      <div id="mtg-sec" style="display:none">
        <div class="meeting-row"><label>Meeting booked?</label>
          <div class="toggle-wrap">
            <button class="toggle-btn off" id="mtg-yes" onclick="setMtg(true)">Yes</button>
            <button class="toggle-btn on" id="mtg-no" onclick="setMtg(false)">No</button>
          </div>
        </div>
        <div id="mtg-date" style="display:none"><div class="fg"><label>Meeting date</label><input type="text" id="mtg-d" placeholder="e.g. June 15, 2026"/></div></div>
      </div>
      <div class="fg"><label>Details <span style="color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label>
        <textarea id="call-det" placeholder="Who you spoke with, what was discussed…"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button>
        <button class="btn-save" onclick="saveLog('${cid}')">Save call</button>
      </div>
    </div>
  </div>`);
}
function selOut(o){logOut=o;['pastor','noanswer1','noanswer2','voicemail','secretary'].forEach(k=>{const el=document.getElementById('op-'+k);if(el)el.classList.toggle('selected',k===o);});const ms=document.getElementById('mtg-sec');const showMtg=(o==='pastor'||o==='secretary');if(ms)ms.style.display=showMtg?'block':'none';if(!showMtg)logMtg=false;}
function setMtg(v){logMtg=v;const y=document.getElementById('mtg-yes');if(y)y.className='toggle-btn '+(v?'on':'off');const n=document.getElementById('mtg-no');if(n)n.className='toggle-btn '+(v?'off':'on');const d=document.getElementById('mtg-date');if(d)d.style.display=v?'block':'none';}
function saveLog(cid){
  if(!logOut){alert('Please select an outcome.');return;}
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  if(!c.calls)c.calls=[];
  const md=(document.getElementById('mtg-d')||{}).value||'';
  c.calls.push({id:uid(),date:fmtDate(new Date()),outcome:logOut,meetingBooked:logMtg,meetingDate:md.trim(),details:(document.getElementById('call-det').value||'').trim()});
  save();closeMKeepCard();renderCallingCard();renderList();
}
function delCall(cid,xid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  c.calls=(c.calls||[]).filter(x=>x.id!==xid);
  save();renderCallingCard();renderList();
}

/* ── REMINDER MODAL ── */
function openReminderModal(cid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h2 style="display:flex;align-items:center;gap:8px;">${ICONS.bell} Set Reminder</h2>
      <div class="modal-sub">Call-back reminder for ${esc(c.pastor||c.church||'this contact')}.</div>
      <div class="fg"><label>Call back on</label><input type="date" id="rem-date"/></div>
      <div class="fg"><label>Note <span style="color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label>
        <textarea id="rem-note" placeholder="e.g. Call back after 10am…" style="height:70px"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button>
        <button class="btn-save" onclick="saveReminder('${cid}')">Save reminder</button>
      </div>
    </div>
  </div>`);
}
function saveReminder(cid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  const d=document.getElementById('rem-date').value;
  const note=document.getElementById('rem-note').value||'';
  if(!d){alert('Please pick a date.');return;}
  const label=new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  if(!c.calls)c.calls=[];
  c.calls.push({id:uid(),date:fmtDate(new Date()),outcome:'reminder',meetingBooked:false,meetingDate:'',details:`Call back ${label}${note?'\n'+note:''}`});
  save();closeMKeepCard();renderCallingCard();renderList();
}

/* ── CALENDAR MODAL ── */
function openCalendarModal(cid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h2 style="display:flex;align-items:center;gap:8px;">${ICONS.calendar} Add to Calendar</h2>
      <div class="modal-sub">Pick a date and we'll open Google Calendar with the event pre-filled.</div>
      <div class="fg"><label>Meeting date</label><input type="date" id="cal-date"/></div>
      <div class="fg"><label>Meeting time <span style="color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label><input type="time" id="cal-time"/></div>
      <button class="cal-open-btn" onclick="openGCal('${cid}')" style="display:flex;align-items:center;gap:8px;">${ICONS.calendar} Open Google Calendar</button>
      <div class="modal-actions" style="margin-top:10px">
        <button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button>
      </div>
    </div>
  </div>`);
}
function openGCal(cid){
  const c=contacts.find(x=>x.id===cid);if(!c)return;
  const d=document.getElementById('cal-date').value;
  const t=document.getElementById('cal-time').value;
  if(!d){alert('Please pick a date.');return;}
  const title=encodeURIComponent(`Meeting: ${c.pastor||c.church||'Pastor'} — ${c.church||''}`);
  const loc=encodeURIComponent([c.address,c.city,c.state].filter(Boolean).join(', '));
  const details=encodeURIComponent(`Pastor: ${c.pastor||''}\nChurch: ${c.church||''}\nPhone: ${c.phone||''}\nEmail: ${c.email||''}`);
  let dates='';
  if(t){const s=d.replace(/-/g,'')+'T'+t.replace(':','')+'00';const eh=String(Number(t.split(':')[0])+1).padStart(2,'0');const e=d.replace(/-/g,'')+'T'+eh+t.split(':')[1]+'00';dates=`${s}/${e}`;}
  else{const day=d.replace(/-/g,'');dates=`${day}/${day}`;}
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&location=${loc}&details=${details}`,'_blank');
  if(!c.calls)c.calls=[];
  const lbl=new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  c.calls.push({id:uid(),date:fmtDate(new Date()),outcome:'pastor',meetingBooked:true,meetingDate:lbl,details:`Meeting scheduled for ${lbl}`});
  save();closeMKeepCard();renderCallingCard();renderList();
}

/* ── EDIT MODAL ── */
function openContactModal(id){
  const c=id?contacts.find(x=>x.id===id):null;
  const v=f=>c?(c[f]||''):'';
  const ro=REGS.map(o=>`<option${v('region')===o?' selected':''}>${o}</option>`).join('');
  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h2 style="margin-bottom:0">${c?'Edit contact':'New contact'}</h2>
        ${id?`<button onclick="deleteContact('${id}')" style="background:#3a0a0a;border:1px solid #5a1a1a;border-radius:6px;padding:6px 8px;cursor:pointer;color:#e05555;display:flex;align-items:center;">${ICONS.trash}</button>`:''}
      </div>
      <div class="form-row">
        <div class="fgi"><label>Pastor name</label><input id="fp" value="${esc(v('pastor'))}" placeholder="First Last"/></div>
        <div class="fgi"><label>Church</label><input id="fc" value="${esc(v('church'))}" placeholder="Church name"/></div>
      </div>
      <div class="form-row">
        <div class="fgi"><label>City</label><input id="fci" value="${esc(v('city'))}" placeholder="City"/></div>
        <div class="fgi"><label>State</label><input id="fst" value="${esc(v('state')||'IL')}" placeholder="IL" maxlength="2" style="text-transform:uppercase"/></div>
      </div>
      <div class="form-row">
        <div class="fgi"><label>Region</label><select id="fr"><option value="">—</option>${ro}</select></div>
        <div class="fgi"><label>Phone</label><input id="fph" value="${esc(v('phone'))}" placeholder="(000) 000-0000"/></div>
      </div>
      <div class="form-row"><div class="fgi full"><label>Address</label><input id="fa" value="${esc(v('address'))}" placeholder="Street address"/></div></div>
      <div class="form-row"><div class="fgi full"><label>Email</label><input id="fe" type="email" value="${esc(v('email'))}" placeholder="pastor@church.com"/></div></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeMKeepCard()">Cancel</button>
        <button class="btn-save" onclick="saveCM('${id||''}')">Save</button>
      </div>
    </div>
  </div>`);
}
function saveCM(id){
  const ch=(document.getElementById('fc')||{}).value||'';
  const pa=(document.getElementById('fp')||{}).value||'';
  if(!ch.trim()&&!pa.trim()){alert('Church or pastor name required.');return;}
  const d={pastor:pa.trim(),church:ch.trim(),city:(document.getElementById('fci')||{}).value?.trim()||'',state:((document.getElementById('fst')||{}).value||'').trim().toUpperCase(),region:(document.getElementById('fr')||{}).value||'',phone:(document.getElementById('fph')||{}).value?.trim()||'',address:(document.getElementById('fa')||{}).value?.trim()||'',email:(document.getElementById('fe')||{}).value?.trim()||''};
  if(id){const c=contacts.find(x=>x.id===id);Object.assign(c,d);}
  else{contacts.push({id:uid(),calls:[],notes:[],photo:'',...d});}
  save();closeMKeepCard();renderFilters();renderList();
  if(id)renderCallingCard();
}

function deleteContact(id){
  if(!confirm('Delete this contact? This cannot be undone.'))return;
  contacts=contacts.filter(c=>c.id!==id);
  save();closeMKeepCard();closeCard();renderFilters();renderList();
}
function showM(h){const l=document.getElementById('modal-layer');l.innerHTML=h;l.style.pointerEvents='all';}
function closeMKeepCard(e){if(e&&e.target!==e.currentTarget)return;logOut=null;logMtg=false;const l=document.getElementById('modal-layer');l.innerHTML='';l.style.pointerEvents='none';}

load();renderFilters();renderList();
window.addEventListener('resize',renderList);
</script>
</body>
</html>
