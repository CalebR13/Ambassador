function addMeetingToGCal(mid, existingId) {

  if (!d) { alert('Please pick an arrival date first.'); return; }
  const dEnd = document.getElementById('nm-end-date')?.value || '';
  const notes = document.getElementById('nm-notes')?.value?.trim() || '';
  const title = encodeURIComponent(`${m.city||''}, ${m.state||''} | ${m.pastor||'Pastor'} | ${m.church||''}`);
  const loc = encodeURIComponent([m.address,m.city,m.state].filter(Boolean).join(', '));
  const detailParts = [`Pastor: ${m.pastor||''}`, `Church: ${m.church||''}`, `Phone: ${m.phone||m.cell||''}`, `Email: ${m.email||''}`];
  if (notes) detailParts.push(`Notes: ${notes}`);
  const details = encodeURIComponent(detailParts.join('\n'));
  const startDay = d.replace(/-/g,'');
  const endDateObj = new Date((dEnd||d)+'T12:00:00');
  endDateObj.setDate(endDateObj.getDate()+1);
  const endDay = endDateObj.toISOString().slice(0,10).replace(/-/g,'');
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${startDay}/${endDay}&location=${loc}&details=${details}`,'_blank');

  saveNextMeeting(mid, existingId);

function toggleManifestTag(mid, tag) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;
  if (tag === 'supporting') {
    m.support_status = 'Supporting';
  } else if (tag === 'nonsupporting') {
    m.support_status = 'Non-supporting';
  } else if (tag === 'handouts') {
    m.bible_handouts = m.bible_handouts === 'Yes' ? '' : 'Yes';
  } else if (tag === 'lodging') {
    m.lodging = m.lodging === 'Yes' ? '' : 'Yes';
  } else if (tag === 'rv') {
    m.rv_hookup = m.rv_hookup === 'Yes' ? '' : 'Yes';
  } else if (tag === 'prayer') {
    m.prayer_list = m.prayer_list === 'Yes' ? '' : 'Yes';
  }
  saveManifestContact(m);
  haptic(8);
  // Re-render the tag rows in place without closing the modal
  const todayTE = new Date().toISOString().slice(0,10);
  const nvMsE = t => { if(!t)return 0; const c=t.split(' – ')[0].split(' - ')[0].trim(); const x=new Date(c).getTime(); return isNaN(x)?0:x; };
  const todayMsE = Date.now();
  const scheduledV = manifestVisits.filter(v => v.manifestId === mid && v.date).find(v => nvMsE(v.endDate||v.date) >= todayMsE);
  const isScheduled = !!(scheduledV || (m.next_visit_date && nvMsE(m.next_visit_end_date||m.next_visit_date) >= todayMsE));
  function tagRow(label, active, color, onclick, readonly) {
    const activeStyle = active ? `background:${color}22;border-color:${color}88;` : 'background:var(--surface2);border-color:var(--border);';
    const indicator = active ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="${color}" stroke="${color}" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>` : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>`;
    const cursor = readonly ? 'default' : 'pointer';
    const opacity = readonly ? '0.6' : '1';
    return `<div onclick="${readonly ? '' : onclick}" style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:var(--radius-sm);border:1px solid;margin-bottom:8px;cursor:${cursor};opacity:${opacity};${activeStyle}"><span style="font-size:14px;font-weight:500;color:${active ? color : 'var(--text)'};">${label}</span><div style="display:flex;align-items:center;gap:6px;">${active && readonly ? '<span style="font-size:10px;color:var(--muted);">auto</span>' : ''}${indicator}</div></div>`;
  }
  const rows = [
    tagRow('Scheduled', isScheduled, '#4cd68a', '', true),
    tagRow('Supporting', m.support_status==='Supporting', '#4cd68a', `toggleManifestTag('${mid}','supporting')`, false),
    tagRow('Non-supporting', m.support_status==='Non-supporting', '#e05555', `toggleManifestTag('${mid}','nonsupporting')`, false),
    tagRow('Handouts', m.bible_handouts==='Yes', '#f0b429', `toggleManifestTag('${mid}','handouts')`, false),
    tagRow('Lodging', m.lodging==='Yes', '#8899ee', `toggleManifestTag('${mid}','lodging')`, false),
    tagRow('RV', m.rv_hookup==='Yes', '#8899ee', `toggleManifestTag('${mid}','rv')`, false),
    tagRow('Prayer List', m.prayer_list==='Yes', '#aaaaaa', `toggleManifestTag('${mid}','prayer')`, false),
  ].join('');
  const container = document.getElementById('tag-editor-rows');
  if (container) container.innerHTML = rows;
  renderManifest();
}

function openManifestEmailCopy() {
  const filter = document.getElementById('manifest-filter')?.value || 'all';
  const mq = (document.getElementById('manifest-search')?.value || '').trim().toLowerCase();
  let items = [...manifestContacts];

  if (filter === 'Supporting') items = items.filter(m => m.support_status === 'Supporting');
  else if (filter === 'Non-supporting') items = items.filter(m => m.support_status === 'Non-supporting');
  else if (filter === 'Scheduled') {
    const todayF = new Date().toISOString().slice(0,10);
    items = items.filter(m => {
      const todayMs2 = Date.now();
      const nvMs = t => { if(!t)return 0; const c=t.split(' – ')[0].split(' - ')[0].trim(); const x=new Date(c).getTime(); return isNaN(x)?0:x; };
      const nv = manifestVisits.filter(v => v.manifestId === m.id && v.date).find(v => nvMs(v.endDate||v.date) >= todayMs2);
      return nv || (m.next_visit_date && nvMs(m.next_visit_end_date||m.next_visit_date) >= todayMs2);
    });
  }
  else if (filter === 'prayer') items = items.filter(m => m.prayer_list === 'Yes');
  else if (filter === 'lodging') items = items.filter(m => m.lodging === 'Yes');
  else if (filter === 'rv') items = items.filter(m => m.rv_hookup === 'Yes');
  else if (filter === 'handouts') items = items.filter(m => m.bible_handouts === 'Yes');
  if (mq) items = items.filter(m =>
    (m.pastor||'').toLowerCase().includes(mq) ||
    (m.church||'').toLowerCase().includes(mq) ||
    (m.city||'').toLowerCase().includes(mq) ||
    (m.state||'').toLowerCase().includes(mq)
  );

  // Collect all unique emails
  const emails = [];
  items.forEach(m => {
    [m.email, m.church_email].forEach(e => {
      if (e && e.trim() && !emails.includes(e.trim())) emails.push(e.trim());
    });
  });

  const filterLabel = filter === 'all' ? 'All contacts' : filter === 'prayer' ? 'Prayer list' : filter;
  const emailStr = emails.join(', ');

  showM(`<div class="modal-backdrop" onclick="closeMKeepCard(event)">
    <div class="modal-box" onclick="event.stopPropagation()">

      <button class="btn-cancel" onclick="closeMKeepCard()" style="width:100%;margin-top:8px;">Close</button>

function setManifestToggle(field, val) {
  if (!window._manifestToggles) window._manifestToggles = {};
  window._manifestToggles[field] = val;
  const states = {
    '': { border: '#F3B53A', bg: '#2e1f00', color: '#F3B53A' },
    'Yes': { border: '#4cd68a', bg: '#0a2a1a', color: '#4cd68a' },
    'No': { border: '#e05555', bg: '#2a0a0a', color: '#e05555' },
  };
  ['','Yes','No'].forEach(v => {
    const suffix = v === '' ? 'none' : v.toLowerCase();
    const btn = document.getElementById('mt-' + field + '-' + suffix);
    if (!btn) return;
    const active = v === val;
    btn.style.borderColor = active ? states[v].border : 'var(--border)';
    btn.style.background  = active ? states[v].bg : 'var(--surface2)';
    btn.style.color       = active ? states[v].color : 'var(--muted)';
  });
}

function saveManifestEdit(mid) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;
  ['pastor','church','city','state','phone','cell','email','church_email','address','website','support_amount','support_cadence'].forEach(f => {
    const el = document.getElementById('me-' + f);
    if (el) m[f] = el.value;
  });
  const ss = document.getElementById('me-support_status');
  if (ss) m.support_status = ss.value;
  const notes = document.getElementById('me-notes');
  if (notes) m.notes = notes.value;
  if (window._manifestToggles) {
    Object.assign(m, window._manifestToggles);
  }
  saveManifestContact(m);
  haptic(10);
  closeMKeepCard();
  setTimeout(() => { renderManifest(); openManifestCard(mid); }, 220);
}

function openReminderFromManifest(mid) {
  const m = manifestContacts.find(x => x.id === mid); if (!m) return;
  
  // Ensure a pseudo contact exists in the contacts array for this manifest contact
  let pseudo = contacts.find(c => c.id === mid);
  if (!pseudo) {
    pseudo = { id: mid, pastor: m.pastor||'', church: m.church||'', city: m.city||'', state: m.state||'', region: '', phone: m.phone||'', email: m.email||'', calls: [] };
    contacts.push(pseudo);
  }
  
  // Build filteredList with this contact so openReminderModal works
  if (!filteredList.find(c => c.id === mid)) {
    filteredList = [pseudo, ...filteredList];
    callingIdx = 0;
  } else {
    callingIdx = filteredList.findIndex(c => c.id === mid);
  }
  
  // Open reminder modal directly without switching wings
  openReminderModal(mid);
}

  { text: "Be strong and of a good courage; be not afraid, neither be thou dismayed: for the LORD thy God is with thee whithersoever thou goest.", ref: "Joshua 1:9" },
  { text: "Let us rise up and build.", ref: "Nehemiah 2:18" },
  { text: "Whatsoever thy hand findeth to do, do it with thy might.", ref: "Ecclesiastes 9:10" },
  { text: "Do the work of an evangelist, make full proof of thy ministry.", ref: "2 Timothy 4:5" },
  { text: "Let us run with patience the race that is set before us.", ref: "Hebrews 12:1" },
  { text: "I press toward the mark for the prize of the high calling of God in Christ Jesus.", ref: "Philippians 3:14" },
  { text: "Let the beauty of the LORD our God be upon us: and establish thou the work of our hands upon us.", ref: "Psalm 90:17" },
  { text: "Be strong, and work: for I am with you, saith the LORD of hosts.", ref: "Haggai 2:4" },

function helmDailyVerse() {
  const doy = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
  return HELM_VERSES[doy % HELM_VERSES.length];
}

function helmGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning,';
  if (h < 17) return 'Good afternoon,';
  return 'Good evening,';
}

function helmDonutSVG(pct, size, strokeWidth, color, trackColor) {
  size = size || 52;
  strokeWidth = strokeWidth || 5;
  color = color || '#D99B2D';
  trackColor = trackColor || '#1C2640';
  const r = (size - strokeWidth * 2) / 2;
  const cx = size / 2;
  const circ = 2 * Math.PI * r;
  const dash = (Math.min(pct, 100) / 100) * circ;
  return `<svg class="helm-donut-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${trackColor}" stroke-width="${strokeWidth}"/>
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${color}" stroke-width="${strokeWidth}"
      stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ * 0.25}"
      stroke-linecap="round" transform="rotate(-90 ${cx} ${cx})"/>
  </svg>`;
}

function helmUpcomingMeetings() {
  const now = new Date();
  const in30 = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);
  const meetings = [];

  // From Voyage contacts with meetingBooked
  contacts.forEach(c => {
    (c.calls || []).forEach(call => {
      if (!call.meetingBooked || !call.meetingDate) return;
      const raw = call.meetingDate.split(' – ')[0].split(' - ')[0].trim();
      const d = new Date(raw);
      if (isNaN(d.getTime())) return;
      if (d >= now && d <= in30) {
        meetings.push({
          date: d,
          church: c.church || c.pastor || '—',
          city: c.city || '',
          state: c.state || '',
          time: call.details || '',
          type: 'Visit',
          id: c.id,
          source: 'voyage'
        });
      }
    });
  });

  // From Manifest contacts with next_visit_date
  manifestContacts.forEach(m => {
    const visits = manifestVisits.filter(v => v.manifestId === m.id && v.date);
    visits.forEach(v => {
      const d = new Date(v.date + 'T12:00:00');
      if (isNaN(d.getTime())) return;
      if (d >= now && d <= in30) {
        meetings.push({
          date: d,
          church: m.church || m.pastor || '—',
          city: m.city || '',
          state: m.state || '',
          time: v.notes || '',
          type: 'Visit',
          id: m.id,
          source: 'manifest'
        });
      }
    });
  });

  meetings.sort((a, b) => a.date - b.date);
  // Deduplicate by church+date
  const seen = new Set();
  return meetings.filter(m => {
    const key = m.church + m.date.toDateString();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function helmStats() {
  const totalVoyage = contacts.length;
  const neverCalled = contacts.filter(c => !(c.calls || []).filter(x => x.outcome !== 'imported' && x.outcome !== 'reminder').length).length;
  const totalCalled = totalVoyage - neverCalled;
  const manifestStates = [...new Set(manifestContacts.map(m => (m.state || '').toUpperCase().trim()).filter(Boolean))];
  const statesVisited = manifestStates.length;
  const statesRemaining = 50 - statesVisited;
  const supporting = manifestContacts.filter(m => m.support_status === 'Supporting').length;
  const now = new Date();
  const overdue = contacts.reduce((acc, c) => {
    return acc + (c.calls || []).filter(x => {
      if (x.outcome !== 'reminder') return false;
      if (!x.remDate) return false;
      const d = new Date(x.remDate + 'T' + (x.remTime || '12:00') + ':00');
      return d < now && !x.completed;
    }).length;
  }, 0);
  return { totalVoyage, neverCalled, totalCalled, statesVisited, statesRemaining, supporting, overdue };
}

function helmRelayProgress() {
  // Relay: Monday–Friday cadence for Manifest supporting pastors
  // relay_group 1-4, current week = group (weekOfYear % 4) + 1
  const now = new Date();
  const weekOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 1)) / (7 * 86400000));
  const currentGroup = (weekOfYear % 4) + 1;

  const supporting = manifestContacts.filter(m => m.support_status === 'Supporting');
  if (!supporting.length) return { completed: 0, total: 0 };

  // Contacts in this week's group (or all if no groups assigned)
  const hasGroups = supporting.some(m => m.relay_group);
  const thisWeek = hasGroups
    ? supporting.filter(m => String(m.relay_group) === String(currentGroup))
    : supporting;

  if (!thisWeek.length) return { completed: 0, total: supporting.length };

  // Check if contacted this week (Mon–today)
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  monday.setHours(0, 0, 0, 0);

  let completed = 0;
  thisWeek.forEach(m => {
    const v = manifestVisits.filter(v => v.manifestId === m.id && v.date >= monday.toISOString().slice(0, 10));
    if (v.length) completed++;
  });

  return { completed, total: thisWeek.length };
}

function helmOpenSundaysWeds() {
  // Calculate remaining Sundays + Wednesdays in the year
  const now = new Date();
  const end = new Date(now.getFullYear(), 11, 31);
  let count = 0;
  const d = new Date(now);
  d.setDate(d.getDate() + 1); // start from tomorrow
  while (d <= end) {
    if (d.getDay() === 0 || d.getDay() === 3) count++;
    d.setDate(d.getDate() + 1);
  }
  return count;
}

function helmSupportStats() {
  const monthlyIn = manifestContacts
    .filter(m => m.support_status === 'Supporting' && m.support_amount)
    .reduce((acc, m) => {
      const amt = parseFloat(String(m.support_amount).replace(/[^0-9.]/g, '')) || 0;
      return acc + amt;
    }, 0);
  const goal = (window.HELM_SUPPORT_GOAL_OVERRIDE || HELM_SUPPORT_GOAL);
  const pct = goal > 0 ? Math.round((monthlyIn / goal) * 100) : 0;
  const remaining = Math.max(goal - monthlyIn, 0);
  return { goal, monthlyIn, pct, remaining };
}

function helmMissingPhone() {
  return contacts.filter(c => !c.phone || !c.phone.trim()).slice(0, 20);
}

function helmNotContacted() {
  const now = new Date();
  const bucket30 = [], bucket60 = [], bucket90 = [];
  contacts.forEach(c => {
    const realCalls = (c.calls || []).filter(x => x.outcome !== 'imported' && x.outcome !== 'reminder');
    if (!realCalls.length) return;
    const lastDate = realCalls.reduce((latest, call) => {
      const d = new Date(call.date);
      return isNaN(d.getTime()) ? latest : (d > latest ? d : latest);
    }, new Date(0));
    const daysSince = Math.floor((now - lastDate) / 86400000);
    if (daysSince >= 90) bucket90.push(c);
    else if (daysSince >= 60) bucket60.push(c);
    else if (daysSince >= 30) bucket30.push(c);
  });
  return { b30: bucket30.length, b60: bucket60.length, b90: bucket90.length };
}

function helmFmtCurrency(n) {
  return '$' + Math.round(n).toLocaleString();
}

function helmFmtDate(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  return {
    month: months[d.getMonth()],
    day: d.getDate(),
    dow: days[d.getDay()]
  };
}

function helmFmtTime(details) {
  // Try to parse time from details string
  const match = (details || '').match(/\b(\d{1,2}:\d{2}\s*(?:AM|PM|am|pm)?)/);
  return match ? match[1] : '';
}

  Promise.all([loadManifest(), loadVisits()]).then(() => {
    // Backfill relay_group for any existing contacts that don't have one
    let groupCounter = 0;
    manifestContacts.forEach(m => {
      if (!m.relay_group) {
        m.relay_group = String((groupCounter % 4) + 1);
        saveManifestContact(m);
      }
      groupCounter++;
    });
    // Migrate legacy next_visit_date entries that have no matching manifestVisit
    const parseClean = d => { if(!d)return null; const c=d.split(' – ')[0].split(' - ')[0].trim(); const dt=new Date(c); return isNaN(dt.getTime())?null:dt; };
    manifestContacts.forEach(m => {
      if (!m.next_visit_date) return;
      const dt = parseClean(m.next_visit_date);
      if (!dt) return;
      const isoDate = dt.toISOString().slice(0,10);
      const already = manifestVisits.find(v => v.manifestId === m.id && v.date === isoDate);
      if (!already) {
        // Extract end date if present in range string
        let endDate = m.next_visit_end_date || '';
        if (!endDate && m.next_visit_date.includes(' – ')) {
          const endPart = m.next_visit_date.split(' – ')[1]?.trim();
          if (endPart) { const ed = new Date(endPart); if (!isNaN(ed.getTime())) endDate = ed.toISOString().slice(0,10); }
        }
        const visit = { id: uid(), manifestId: m.id, date: isoDate, endDate, sermon: '', capacity: '', days: '', handout: '', notes: '' };
        manifestVisits.push(visit);
        saveVisitEntry(visit);
      }
    });
  });
